<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ╔══════════════════════════════════════════════════════╗
// ║  ⚠️  ใส่ URL ของ Google Apps Script Web App ตรงนี้   ║
// ╚══════════════════════════════════════════════════════╝
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpU16BI_Mg3S7ugNCUbyruDIiNz8N4Ke-TQReViIztmVhpLgWS6n3ABJ72BH6pItUB/exec";

// ===== Multi-Device Concurrent Access System =====
// Unique device ID per browser session
const DEVICE_ID = (() => {
  let id = sessionStorage.getItem('mci-device-id');
  if (!id) { id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); sessionStorage.setItem('mci-device-id', id); }
  return id;
})();

// ====== SMART MERGE ENGINE (supports 5+ concurrent devices) ======
// Merges arrays of entities (patients, fleets, hospitals) by ID.
// Keeps the entity with the newer _updatedAt timestamp.
// New items from either side are included. Deleted items are respected via _deleted flag.
function mergeEntities(localArr, serverArr) {
  const map = new Map();
  // Server items first (base)
  (serverArr || []).forEach(item => { if (item && item.id) map.set(item.id, item); });
  // Local items override if newer
  (localArr || []).forEach(item => {
    if (!item || !item.id) return;
    const existing = map.get(item.id);
    if (!existing) {
      map.set(item.id, item); // new local item
    } else {
      const localTime = item._updatedAt || 0;
      const serverTime = existing._updatedAt || 0;
      if (localTime >= serverTime) {
        map.set(item.id, item); // local is newer or same
      }
      // else keep server version
    }
  });
  // Filter out deleted items
  return Array.from(map.values()).filter(item => !item._deleted);
}

// Deep merge an MCI object: merge top-level fields + merge sub-arrays by entity
function mergeMCI(localMCI, serverMCI) {
  if (!serverMCI) return localMCI;
  if (!localMCI) return serverMCI;
  // Determine which top-level is newer
  const localTime = localMCI._updatedAt || 0;
  const serverTime = serverMCI._updatedAt || 0;
  const base = serverTime > localTime ? { ...serverMCI } : { ...localMCI };
  const other = serverTime > localTime ? localMCI : serverMCI;
  // Merge sub-arrays at entity level
  base.patients = mergeEntities(localMCI.patients, serverMCI.patients);
  base.fleetSources = mergeEntities(localMCI.fleetSources, serverMCI.fleetSources);
  base.hospitals = mergeEntities(localMCI.hospitals, serverMCI.hospitals);
  // Keep higher version
  base._version = Math.max(localMCI._version || 0, serverMCI._version || 0) + 1;
  base._updatedAt = Date.now();
  base._updatedBy = DEVICE_ID;
  // Merge blood counts (keep newer)
  if (serverTime > localTime) {
    base.blood = serverMCI.blood || base.blood;
  } else {
    base.blood = localMCI.blood || base.blood;
  }
  return base;
}

// ====== SYNC ENGINE (Concurrent-Safe) ======
const SYNC_INTERVAL = 5000; // poll ทุก 5 วินาที
const SAVE_DEBOUNCE = 800;  // รอ 0.8 วินาทีก่อน save

const SyncEngine = {
  _saveTimer: null,
  _station: localStorage.getItem('mci-station') || '',
  _saving: false,
  _pendingSave: null,
  _lastFetchData: null,

  setStation(s) { this._station = s; localStorage.setItem('mci-station', s); },
  getStation() { return this._station; },

  isConfigured() { return SCRIPT_URL && SCRIPT_URL.length > 10; },

  async fetchAll() {
    if (!this.isConfigured()) return this._localGet();
    try {
      document.getElementById('syncBar').className = 'sync-bar syncing';
      const r = await fetch(SCRIPT_URL + '?action=getAll');
      const data = await r.json();
      document.getElementById('syncBar').className = 'sync-bar';
      if (Array.isArray(data)) {
        this._lastFetchData = data;
        localStorage.setItem('mci-data', JSON.stringify(data));
        localStorage.setItem('mci-last-sync', new Date().toISOString());
        return data;
      }
      return this._localGet();
    } catch (e) {
      document.getElementById('syncBar').className = 'sync-bar';
      console.warn('Fetch failed, using local:', e.message);
      return this._localGet();
    }
  },

  // Concurrent-safe save: fetch latest → merge → save merged result
  async saveMCI(mci) {
    // Stamp this update
    mci._updatedAt = Date.now();
    mci._updatedBy = DEVICE_ID;
    mci._version = (mci._version || 0) + 1;
    mci._station = this._station;

    // Update local storage immediately
    const localData = this._localGet();
    const localUpdated = localData.map(m => m.id === mci.id ? mci : m).concat(
      localData.find(m => m.id === mci.id) ? [] : [mci]
    );
    localStorage.setItem('mci-data', JSON.stringify(localUpdated));

    if (!this.isConfigured()) return { merged: mci, conflicts: [] };

    // Debounced server save with merge
    if (this._saveTimer) clearTimeout(this._saveTimer);

    return new Promise((resolve) => {
      this._saveTimer = setTimeout(async () => {
        if (this._saving) {
          // Queue this save for after current finishes
          this._pendingSave = mci;
          resolve({ merged: mci, conflicts: [] });
          return;
        }
        this._saving = true;
        try {
          document.getElementById('syncBar').className = 'sync-bar syncing';

          // Step 1: Fetch latest from server
          let serverData = [];
          try {
            const r = await fetch(SCRIPT_URL + '?action=getAll');
            serverData = await r.json();
            if (!Array.isArray(serverData)) serverData = [];
          } catch (e) { serverData = []; }

          // Step 2: Find server version of this MCI
          const serverMCI = serverData.find(m => m.id === mci.id);
          let mergedMCI = mci;
          let conflicts = [];

          if (serverMCI && serverMCI._updatedBy && serverMCI._updatedBy !== DEVICE_ID) {
            // Another device modified this MCI - merge!
            const serverVersion = serverMCI._version || 0;
            const localVersion = (mci._version || 1) - 1; // we incremented above
            if (serverVersion > localVersion) {
              mergedMCI = mergeMCI(mci, serverMCI);
              conflicts.push({
                type: 'merged',
                serverDevice: serverMCI._updatedBy,
                serverStation: serverMCI._station || '?',
                serverTime: serverMCI._updatedAt,
                fieldsAffected: detectChangedFields(mci, serverMCI)
              });
            }
          }

          // Step 3: Save merged result to server
          await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'save', mci: mergedMCI, station: this._station })
          });

          document.getElementById('syncBar').className = 'sync-bar';

          // Update local with merged data
          const newLocal = localUpdated.map(m => m.id === mergedMCI.id ? mergedMCI : m);
          localStorage.setItem('mci-data', JSON.stringify(newLocal));

          resolve({ merged: mergedMCI, conflicts });
        } catch (e) {
          document.getElementById('syncBar').className = 'sync-bar';
          console.warn('Save failed:', e.message);
          resolve({ merged: mci, conflicts: [] });
        } finally {
          this._saving = false;
          // Process pending save if any
          if (this._pendingSave) {
            const pending = this._pendingSave;
            this._pendingSave = null;
            this.saveMCI(pending);
          }
        }
      }, SAVE_DEBOUNCE);
    });
  },

  _localGet() {
    try { return JSON.parse(localStorage.getItem('mci-data')) || []; } catch { return []; }
  },

  // Presence tracking
  async reportPresence() {
    if (!this.isConfigured()) return;
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'presence',
          device: { id: DEVICE_ID, station: this._station, lastSeen: Date.now() }
        })
      });
    } catch (e) { /* ignore */ }
  }
};

// Detect which fields differ between two MCI objects
function detectChangedFields(local, server) {
  const fields = [];
  if (!local || !server) return fields;
  if ((local.patients||[]).length !== (server.patients||[]).length) fields.push('patients');
  if ((local.fleetSources||[]).length !== (server.fleetSources||[]).length) fields.push('fleetSources');
  if ((local.hospitals||[]).length !== (server.hospitals||[]).length) fields.push('hospitals');
  if (local.status !== server.status) fields.push('status');
  if (JSON.stringify(local.blood) !== JSON.stringify(server.blood)) fields.push('blood');
  if (local.name !== server.name) fields.push('name');
  return fields;
}

// ====== HELPERS ======
const now = () => new Date().toLocaleString("th-TH");
const nowTime = () => new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });

const createEmptyMCI = () => ({
  id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 4),
  name: "", location: "", date: now(), status: "open",
  patients: [], fleetSources: [], hospitals: [], blood: { A: 0, B: 0, AB: 0, O: 0 }, closedAt: "",
  _version: 1, _updatedAt: Date.now(), _updatedBy: DEVICE_ID, _createdBy: DEVICE_ID
});

const createEmptyPatient = () => ({
  id: Date.now().toString() + '_' + Math.random().toString(36).slice(2, 8),
  scene: "", triage: "แดง", name: "ไม่ทราบชื่อ", hn: "-", age: "-", edTriage: "",
  diagnosis: "", status: "", destination: "", destinationHospitalId: "", o2: "",
  arrival: nowTime(), blood: "-", note: "", transferFleetId: "", referHospital: "",
  statusLog: [{ status: "ลงทะเบียน", time: now() }],
  _updatedAt: Date.now(), _updatedBy: DEVICE_ID
});

const TRIAGE_COLORS = {
  "แดง": { bg: "#DC2626", label: "Critical", text: "#fff" },
  "เหลือง": { bg: "#EAB308", label: "Urgent", text: "#000" },
  "เขียว": { bg: "#16A34A", label: "Minor", text: "#fff" },
  "ดำ": { bg: "#1F2937", label: "Deceased", text: "#fff" }
};
const STATUS_OPTIONS = ["Admit", "X-Ray", "CT", "OR", "D/C", "Refer", "Dead", "กำลังตรวจรักษา"];
const STATIONS = ["จุดบัญชาการ (Command)", "จุด Triage", "ER", "จุดรับผู้ป่วย", "จุดส่งต่อ", "อื่นๆ"];

const getEffectiveTriage = (p) => (p.edTriage && TRIAGE_COLORS[p.edTriage]) ? p.edTriage : p.triage;
const getTriageCounts = (pts) => { const c = {"แดง":0,"เหลือง":0,"เขียว":0,"ดำ":0}; pts.forEach(p => { const t = getEffectiveTriage(p); if(c[t]!==undefined) c[t]++; }); return c; };
const getPatientsByTriageColor = (pts, color) => pts.filter(p => getEffectiveTriage(p) === color);

// ====== STYLES ======
const font = "'Sarabun','Noto Sans Thai',sans-serif";
const inputStyle = { width:"100%", padding:"8px 12px", borderRadius:6, border:"1px solid #CBD5E1", fontSize:14, fontFamily:font, boxSizing:"border-box" };
const selectStyle = { ...inputStyle, background:"#fff" };
const btnPrimary = { padding:"8px 20px", background:"#DC2626", color:"#fff", border:"none", borderRadius:6, fontWeight:700, cursor:"pointer", fontSize:14 };
const btnSecondary = { ...btnPrimary, background:"#475569" };
const btnSuccess = { ...btnPrimary, background:"#16A34A" };
const btnWarning = { ...btnPrimary, background:"#EA580C" };

// ====== SMALL COMPONENTS ======
function TriageBadge({triage}){ const c=TRIAGE_COLORS[triage]||TRIAGE_COLORS["แดง"]; return <span style={{padding:"2px 12px",fontSize:12,background:c.bg,color:c.text,borderRadius:4,fontWeight:700,display:"inline-block"}}>{triage}</span>; }
function StatusBadge({status}){ const m={Admit:"#16A34A","X-Ray":"#2563EB",CT:"#7C3AED",OR:"#DB2777","D/C":"#64748B",Refer:"#EA580C",Dead:"#1F2937","กำลังตรวจรักษา":"#F59E0B"}; return status ? <span style={{padding:"3px 14px",background:m[status]||"#94A3B8",color:status==="กำลังตรวจรักษา"?"#000":"#fff",borderRadius:4,fontSize:12,fontWeight:600}}>{status}</span> : null; }
function Modal({open,onClose,title,children,width=560}){ if(!open) return null; return (<div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.5)"}} onClick={onClose}><div style={{background:"#fff",borderRadius:12,padding:24,width,maxWidth:"95vw",maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h3 style={{margin:0,fontSize:18,fontWeight:700,color:"#1E293B"}}>{title}</h3><button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#64748B"}}>✕</button></div>{children}</div></div>); }
function FormField({label,children}){ return <div style={{marginBottom:12}}><label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:4}}>{label}</label>{children}</div>; }

// ====== CONNECTION STATUS ======
function ConnectionStatus({ isOnline, lastSync, station, activeDevices }) {
  return (
    <div className="no-print" style={{ position:"fixed", bottom:12, right:12, zIndex:9998, display:"flex", gap:8, alignItems:"center" }}>
      {station && <div style={{ background:"#1E293B", color:"#fff", padding:"6px 12px", borderRadius:20, fontSize:11, fontWeight:700 }}>📍 {station}</div>}
      {activeDevices > 1 && <div style={{ background:"#EFF6FF", border:"1px solid #BFDBFE", padding:"6px 12px", borderRadius:20, fontSize:11, fontWeight:700, color:"#1E40AF", display:"flex", alignItems:"center", gap:4 }}>
        <span style={{ width:8, height:8, borderRadius:"50%", background:"#3B82F6", display:"inline-block", animation:"pulse 2s infinite" }}></span>
        {activeDevices} เครื่องออนไลน์
      </div>}
      <div style={{ background: isOnline ? "#DCFCE7" : "#FEF2F2", border: `1px solid ${isOnline ? "#86EFAC" : "#FECACA"}`, padding:"6px 12px", borderRadius:20, fontSize:11, fontWeight:700, color: isOnline ? "#16A34A" : "#DC2626", display:"flex", alignItems:"center", gap:4 }}>
        <span style={{ width:8, height:8, borderRadius:"50%", background: isOnline ? "#16A34A" : "#DC2626", display:"inline-block" }}></span>
        {isOnline ? "Online — Sync" : "Offline — Local"}
      </div>
    </div>
  );
}

// ====== TRIAGE CARDS ======
function TriageSummaryCards({patients,onClickColor,activeColor}) {
  const counts = getTriageCounts(patients);
  return (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {Object.entries(TRIAGE_COLORS).map(([key,val]) => {
          const act = activeColor===key;
          return (<div key={key} onClick={()=>onClickColor(act?null:key)} style={{background:val.bg,color:val.text,borderRadius:12,padding:"14px 28px",textAlign:"center",minWidth:120,flex:1,boxShadow:act?`0 0 0 4px #fff,0 0 0 7px ${val.bg}`:"0 2px 8px rgba(0,0,0,0.15)",cursor:"pointer",transform:act?"scale(1.05)":"scale(1)",transition:"all 0.2s"}}>
            <div style={{fontSize:42,fontWeight:900,lineHeight:1.1}}>{counts[key]}</div>
            <div style={{fontSize:14,fontWeight:600,opacity:0.95}}>{key} ({val.label})</div>
          </div>);
        })}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:10,padding:"6px 12px",background:"#fff",borderRadius:8,border:"1px solid #E2E8F0",fontSize:13,color:"#64748B"}}>
        <span>{activeColor ? `แสดง: ${activeColor} (${counts[activeColor]} ราย) — กดอีกครั้งเพื่อแสดงทั้งหมด` : <>รวมทั้งหมด <strong style={{color:"#1E293B"}}>{patients.length}</strong> ราย</>}</span>
        <span style={{fontSize:12,color:"#94A3B8"}}>อ้างอิง: {patients.some(p=>p.edTriage?.trim()) ? "ED Triage (ถ้ามี)" : "Scene Triage"}</span>
      </div>
    </div>
  );
}

// ====== FILTERED PANEL ======
function FilteredPatientPanel({patients,color,onClose,onEditPatient}) {
  const filtered=getPatientsByTriageColor(patients,color); const ti=TRIAGE_COLORS[color];
  return (
    <div style={{background:"#fff",borderRadius:12,border:`2px solid ${ti.bg}`,overflow:"hidden",marginBottom:16,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",animation:"sd .25s ease"}}>
      <style>{`@keyframes sd{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}`}</style>
      <div style={{background:ti.bg,color:ti.text,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:800,fontSize:16}}>● Triage {color} — {filtered.length} ราย</span>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",color:ti.text,padding:"4px 12px",borderRadius:6,cursor:"pointer",fontWeight:700}}>✕</button>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:800}}>
          <thead><tr style={{background:`${ti.bg}15`,fontWeight:700,color:"#475569"}}>{["#","Scene","ชื่อ","HN","วินิจฉัย","สถานะ","Destination",""].map((h,i)=><th key={i} style={{padding:"8px 10px",textAlign:"left",borderBottom:`2px solid ${ti.bg}40`}}>{h}</th>)}</tr></thead>
          <tbody>{filtered.map((p,i)=>(
            <tr key={p.id} style={{borderBottom:"1px solid #F1F5F9"}}>
              <td style={{padding:"8px 10px"}}>{i+1}</td><td style={{padding:"8px 10px",fontWeight:600}}>{p.scene}</td>
              <td style={{padding:"8px 10px",fontWeight:600}}>{p.name}</td><td style={{padding:"8px 10px",color:"#64748B"}}>{p.hn}</td>
              <td style={{padding:"8px 10px"}}>{p.diagnosis||"-"}</td><td style={{padding:"8px 10px"}}><StatusBadge status={p.status}/></td>
              <td style={{padding:"8px 10px",fontSize:12}}>{p.destination||"-"}</td>
              <td style={{padding:"8px 6px"}}><button onClick={()=>onEditPatient(p)} style={{background:"#EFF6FF",border:"none",borderRadius:4,padding:"4px 8px",cursor:"pointer"}}>✏️</button></td>
            </tr>
          ))}</tbody>
        </table>
        {filtered.length===0 && <div style={{padding:30,textAlign:"center",color:"#94A3B8"}}>ไม่มีผู้ป่วย</div>}
      </div>
    </div>
  );
}

// ====== PATIENT FORM MODAL ======
function PatientFormModal({open,onClose,patient,onSave,fleetSources=[],hospitals=[]}) {
  const [form,setForm]=useState(patient||createEmptyPatient());
  useEffect(()=>{setForm(patient||createEmptyPatient())},[patient,open]);
  const u=(k,v)=>setForm(f=>({...f,[k]:v}));
  const isRefer=form.status==="Refer";
  const selectedFleet=fleetSources.find(f=>f.id===form.transferFleetId);
  const handleStatusChange=(ns)=>{
    const log=[...(form.statusLog||[])];
    if(ns&&ns!==form.status){log.push({status:ns,time:now()});}
    setForm(f=>({...f,status:ns,statusLog:log}));
    if(ns!=="Refer"){u("transferFleetId","");u("referHospital","");}
  };
  return (
    <Modal open={open} onClose={onClose} title={patient?.scene?`แก้ไข: ${patient.scene}`:"เพิ่มผู้ป่วยใหม่"} width={660}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
        <FormField label="Scene"><input style={inputStyle} value={form.scene} onChange={e=>u("scene",e.target.value)} placeholder="เช่น แดง 1"/></FormField>
        <FormField label="Triage"><select style={selectStyle} value={form.triage} onChange={e=>u("triage",e.target.value)}>{Object.keys(TRIAGE_COLORS).map(t=><option key={t} value={t}>{t}</option>)}</select></FormField>
        <FormField label="ชื่อ-นามสกุล"><input style={inputStyle} value={form.name} onChange={e=>u("name",e.target.value)}/></FormField>
        <FormField label="HN"><input style={inputStyle} value={form.hn} onChange={e=>u("hn",e.target.value)}/></FormField>
        <FormField label="อายุ"><input style={inputStyle} value={form.age} onChange={e=>u("age",e.target.value)}/></FormField>
        <FormField label="ED Triage">
          <select style={{...selectStyle,borderColor:form.edTriage?TRIAGE_COLORS[form.edTriage]?.bg:"#CBD5E1",borderWidth:form.edTriage?2:1}} value={form.edTriage} onChange={e=>u("edTriage",e.target.value)}>
            <option value="">-- ยังไม่ได้ Triage (ใช้ Scene) --</option>
            {Object.keys(TRIAGE_COLORS).map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </FormField>
        <FormField label="วินิจฉัย"><input style={inputStyle} value={form.diagnosis} onChange={e=>u("diagnosis",e.target.value)}/></FormField>
        <FormField label="สถานะ">
          <select style={{...selectStyle,borderColor:isRefer?"#EA580C":"#CBD5E1",borderWidth:isRefer?2:1,background:isRefer?"#FFF7ED":"#fff"}} value={form.status} onChange={e=>handleStatusChange(e.target.value)}>
            <option value="">-- เลือก --</option>{STATUS_OPTIONS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </FormField>
        <FormField label="Destination / รพ.ส่งต่อ">

    </Modal>
  );
}

function TransferVehicleTab({mci,onUpdate}) {
  const [fleetModal,setFleetModal]=useState({open:false,source:null});
  const [expandedFleet,setExpandedFleet]=useState(null);
  const fleetSources=mci.fleetSources||[];
  const patients=mci.patients||[];
  const getPatientsForFleet=(fid)=>patients.filter(p=>p.transferFleetId===fid&&p.status==="Refer");
  const totalInitial=fleetSources.reduce((s,f)=>s+(f.initialCount||0),0);
  const totalUsed=fleetSources.reduce((s,f)=>s+getPatientsForFleet(f.id).length,0);
  const totalRemaining=totalInitial-totalUsed;
  const saveFleet=(src)=>{const i=fleetSources.findIndex(x=>x.id===src.id);const u=i>=0?fleetSources.map((x,j)=>j===i?src:x):[...fleetSources,src];onUpdate({...mci,fleetSources:u});};
  const deleteFleet=(id)=>{if(confirm("ลบ?")){const updated=fleetSources.map(f=>f.id===id?{...f,_deleted:true,_updatedAt:Date.now(),_updatedBy:DEVICE_ID}:f).filter(f=>!f._deleted);onUpdate({...mci,fleetSources:updated});}};
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:16}}>
        {[{v:totalInitial,l:"🚑 รถทั้งหมด",g:"linear-gradient(135deg,#1E40AF,#3B82F6)"},{v:totalUsed,l:"🔄 ใช้งานแล้ว",g:"linear-gradient(135deg,#EA580C,#F97316)"},{v:totalRemaining,l:"✅ คงเหลือ",g:"linear-gradient(135deg,#16A34A,#22C55E)"},{v:patients.filter(p=>p.status==="Refer").length,l:"📋 Refer ทั้งหมด",g:"linear-gradient(135deg,#7C3AED,#A78BFA)"}].map((c,i)=>(
          <div key={i} style={{background:c.g,borderRadius:12,padding:"16px 20px",color:"#fff",textAlign:"center"}}><div style={{fontSize:34,fontWeight:900}}>{c.v}</div><div style={{fontSize:12,opacity:0.9}}>{c.l}</div></div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden",marginBottom:16}}>
        <div style={{background:"#1E40AF",color:"#fff",padding:"12px 16px",fontWeight:700,fontSize:15,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>🏢 แหล่งรถส่งต่อ</span>
          <button onClick={()=>setFleetModal({open:true,source:null})} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700}}>+ เพิ่มแหล่งรถ</button>
        </div>
        {fleetSources.length===0?<div style={{padding:30,textAlign:"center",color:"#94A3B8"}}>ยังไม่มีแหล่งรถ</div>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#EFF6FF",fontWeight:700,color:"#1E40AF"}}>{["หน่วยงาน","ประเภท","เริ่มต้น","ใช้แล้ว","คงเหลือ","สถานะ",""].map((h,i)=><th key={i} style={{padding:"10px 12px",textAlign:i>=2&&i<=4?"center":"left",borderBottom:"2px solid #BFDBFE"}}>{h}</th>)}</tr></thead>
              <tbody>
                {fleetSources.map((src,i)=>{
                  const used=getPatientsForFleet(src.id).length;const rem=Math.max(0,(src.initialCount||0)-used);
                  const pct=src.initialCount>0?Math.round((rem/src.initialCount)*100):0;const bc=pct>50?"#16A34A":pct>20?"#F59E0B":"#DC2626";
                  const isExp=expandedFleet===src.id;const fp=getPatientsForFleet(src.id);
                  return (<React.Fragment key={src.id}>
                    <tr style={{borderBottom:"1px solid #F1F5F9",background:i%2===0?"#fff":"#FAFBFC",cursor:fp.length>0?"pointer":"default"}} onClick={()=>fp.length>0&&setExpandedFleet(isExp?null:src.id)}>
                      <td style={{padding:"10px 12px"}}><div style={{fontWeight:700}}>{src.name}</div>{src.note&&<div style={{fontSize:11,color:"#94A3B8"}}>{src.note}</div>}</td>
                      <td style={{padding:"10px 12px"}}><span style={{background:"#DBEAFE",color:"#1D4ED8",padding:"2px 10px",borderRadius:10,fontSize:11,fontWeight:600}}>{src.vehicleType}</span></td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:900,fontSize:18,color:"#1E40AF"}}>{src.initialCount}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:700,fontSize:16,color:"#EA580C"}}>{used}{fp.length>0&&<span style={{fontSize:10,color:"#2563EB",display:"block"}}>{isExp?"▲":"▼ ดู"}</span>}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:900,fontSize:22,color:bc}}>{rem}</td>
                      <td style={{padding:"10px 12px"}}><div style={{background:"#E2E8F0",borderRadius:6,height:8,minWidth:60}}><div style={{height:"100%",width:`${pct}%`,background:bc,borderRadius:6}}/></div><div style={{fontSize:10,color:"#64748B",textAlign:"center",marginTop:2}}>{pct}%</div></td>
                      <td style={{padding:"10px 8px"}} onClick={e=>e.stopPropagation()}><button onClick={()=>setFleetModal({open:true,source:src})} style={{background:"#EFF6FF",border:"none",borderRadius:4,padding:"4px 8px",cursor:"pointer",marginRight:4}}>✏️</button><button onClick={()=>deleteFleet(src.id)} style={{background:"#FEF2F2",border:"none",borderRadius:4,padding:"4px 8px",cursor:"pointer"}}>🗑</button></td>
                    </tr>
                    {isExp&&fp.length>0&&(<tr><td colSpan={7} style={{padding:0}}>
                      <div style={{background:"#FFF7ED",borderLeft:"4px solid #FB923C",margin:"0 12px 8px 24px",borderRadius:"0 8px 8px 0"}}>
                        <div style={{padding:"8px 12px",background:"#FFEDD5",fontWeight:700,fontSize:12,color:"#9A3412"}}>👤 ผู้ป่วยจับคู่ {src.name} ({fp.length} ราย)</div>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                          <thead><tr style={{color:"#9A3412",fontWeight:600}}>{["#","Scene","Triage","ชื่อ","HN","วินิจฉัย","ส่ง รพ."].map((h,i)=><th key={i} style={{padding:"6px 10px",textAlign:"left"}}>{h}</th>)}</tr></thead>
                          <tbody>{fp.map((p,pi)=>(<tr key={p.id} style={{borderTop:"1px solid #FED7AA"}}><td style={{padding:"6px 10px"}}>{pi+1}</td><td style={{padding:"6px 10px",fontWeight:600}}>{p.scene}</td><td style={{padding:"6px 10px"}}><TriageBadge triage={getEffectiveTriage(p)}/></td><td style={{padding:"6px 10px",fontWeight:700}}>{p.name}</td><td style={{padding:"6px 10px",color:"#64748B"}}>{p.hn}</td><td style={{padding:"6px 10px"}}>{p.diagnosis||"-"}</td><td style={{padding:"6px 10px",fontWeight:600,color:"#EA580C"}}>{p.referHospital||"-"}</td></tr>))}</tbody>
                        </table>
                      </div>
                    </td></tr>)}
                  </React.Fragment>);
                })}
                <tr style={{background:"#EFF6FF",fontWeight:900,borderTop:"2px solid #1E40AF"}}><td style={{padding:"10px 12px"}}>รวม</td><td></td><td style={{textAlign:"center",fontSize:18,color:"#1E40AF",padding:"10px"}}>{totalInitial}</td><td style={{textAlign:"center",fontSize:16,color:"#EA580C",padding:"10px"}}>{totalUsed}</td><td style={{textAlign:"center",fontSize:22,color:totalRemaining>0?"#16A34A":"#DC2626",padding:"10px"}}>{totalRemaining}</td><td colSpan={2}></td></tr>
              </tbody>
            </table>
          </div>
        )}
      </div>
      <FleetSourceFormModal open={fleetModal.open} onClose={()=>setFleetModal({open:false,source:null})} source={fleetModal.source} onSave={saveFleet}/>
    </div>
  );
}

function HospitalTab({mci,onUpdate}) {
  const [hospModal,setHospModal]=useState({open:false,hospital:null});
  const hospitals=mci.hospitals||[];const patients=mci.patients||[];
  const getHP=(n)=>patients.filter(p=>p.status==="Refer"&&(p.referHospital===n||p.destination===n));
  const saveHosp=(h)=>{const i=hospitals.findIndex(x=>x.id===h.id);const u=i>=0?hospitals.map((x,j)=>j===i?h:x):[...hospitals,h];onUpdate({...mci,hospitals:u});};
  const deleteHosp=(id)=>{if(confirm("ลบ?")){const updated=hospitals.map(h=>h.id===id?{...h,_deleted:true,_updatedAt:Date.now(),_updatedBy:DEVICE_ID}:h).filter(h=>!h._deleted);onUpdate({...mci,hospitals:updated});}};
  return (
    <div>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden"}}>
        <div style={{background:"#0D9488",color:"#fff",padding:"12px 16px",fontWeight:700,fontSize:15,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>🏥 รายการ รพ.ส่งต่อ</span>
          <button onClick={()=>setHospModal({open:true,hospital:null})} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700}}>+ เพิ่ม รพ.</button>
        </div>
        {hospitals.length===0?<div style={{padding:30,textAlign:"center",color:"#94A3B8"}}>ยังไม่มี รพ.ส่งต่อ</div>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#F0FDFA",fontWeight:700,color:"#0D9488"}}>{["ชื่อ รพ.","เบอร์","เตียงรับ","ส่งแล้ว","เตียงว่าง","สถานะ",""].map((h,i)=><th key={i} style={{padding:"10px 12px",textAlign:i>=2&&i<=4?"center":"left",borderBottom:"2px solid #99F6E4"}}>{h}</th>)}</tr></thead>
              <tbody>{hospitals.map((h,i)=>{
                const recv=getHP(h.name).length;const avail=Math.max(0,(h.capacity||0)-recv);
                const pct=h.capacity>0?Math.round((avail/h.capacity)*100):0;const bc=pct>50?"#16A34A":pct>20?"#F59E0B":"#DC2626";
                const tc={"แดง":0,"เหลือง":0,"เขียว":0,"ดำ":0};getHP(h.name).forEach(p=>{const t=getEffectiveTriage(p);if(tc[t]!==undefined)tc[t]++;});
                return (<tr key={h.id} style={{borderBottom:"1px solid #F1F5F9"}}>
                  <td style={{padding:"10px 12px"}}><div style={{fontWeight:700}}>{h.name}</div>{h.note&&<div style={{fontSize:11,color:"#94A3B8"}}>{h.note}</div>}</td>
                  <td style={{padding:"10px 12px"}}>{h.contact||"-"}</td>
                  <td style={{padding:"10px 12px",textAlign:"center",fontWeight:900,fontSize:18,color:"#1E40AF"}}>{h.capacity||0}</td>

function ReportPage({mci,onBack}) {
  const patients=mci.patients||[];const tc=getTriageCounts(patients);const fleets=mci.fleetSources||[];const hosps=mci.hospitals||[];
  const referPatients=patients.filter(p=>p.status==="Refer");
  const avgTimes=[];
  patients.forEach(p=>{if(p.statusLog&&p.statusLog.length>=2){try{const f=new Date(p.statusLog[0].time);const l=new Date(p.statusLog[p.statusLog.length-1].time);const d=Math.round((l-f)/60000);if(d>0)avgTimes.push(d);}catch{}}});
  const avgMin=avgTimes.length>0?Math.round(avgTimes.reduce((a,b)=>a+b,0)/avgTimes.length):0;
  const exportCSV=()=>{
    let csv="Scene,Triage,ED Triage,ชื่อ,HN,อายุ,วินิจฉัย,สถานะ,Destination,รพ.ส่งต่อ,รถส่งต่อ,Arrival,หมายเหตุ,สถานะ Log\n";
    patients.forEach(p=>{const fn=fleets.find(f=>f.id===p.transferFleetId)?.name||"";const ls=(p.statusLog||[]).map(l=>`${l.status}@${l.time}`).join(" → ");csv+=`"${p.scene}","${p.triage}","${p.edTriage}","${p.name}","${p.hn}","${p.age}","${p.diagnosis}","${p.status}","${p.destination}","${p.referHospital}","${fn}","${p.arrival}","${p.note}","${ls}"\n`;});
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`MCI-Report-${mci.name}.csv`;a.click();
  };

    <div style={{minHeight:"100vh",background:"#F1F5F9",fontFamily:font}}>

          <div style={{display:"flex",gap:6}}>
            <button onClick={onBack} style={{...btnSecondary,fontSize:12}}>← กลับ</button>
            <button onClick={exportCSV} style={{...btnSuccess,fontSize:12}}>📥 Export CSV</button>

          </div>
        </div>
      </div>
      <div style={{maxWidth:1200,margin:"0 auto",padding:20}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
          {[{v:patients.length,l:"ผู้ป่วยทั้งหมด",bg:"#fff",tc:"#1E293B"},...Object.entries(TRIAGE_COLORS).map(([k,v])=>({v:tc[k],l:k,bg:v.bg})),{v:referPatients.length,l:"Refer",bg:"#EA580C"},{v:`${avgMin} นาที`,l:"เวลาเฉลี่ย",bg:"#2563EB"}].map((c,i)=><div key={i} style={{background:c.bg,color:c.tc||"#fff",borderRadius:10,padding:"14px 16px",textAlign:"center",border:c.bg==="#fff"?"2px solid #E2E8F0":"none"}}><div style={{fontSize:28,fontWeight:900}}>{c.v}</div><div style={{fontSize:12,opacity:0.9}}>{c.l}</div></div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          <div style={{background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",padding:16}}>

  const [station,setStation]=useState(SyncEngine.getStation());
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#1E293B,#0F172A)",fontFamily:font}}>
      <div style={{background:"#fff",borderRadius:16,padding:32,maxWidth:440,width:"90%",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>🏥</div>
        <h1 style={{fontSize:22,fontWeight:900,color:"#1E293B",marginBottom:4}}>ระบบอุบัติเหตุหมู่ (MCI)</h1>
        <p style={{color:"#64748B",fontSize:14,marginBottom:20}}>เลือกจุดปฏิบัติงานของคุณ</p>
        <div style={{display:"grid",gap:8,marginBottom:20}}>
          {STATIONS.map(s=>(
            <button key={s} onClick={()=>setStation(s)} style={{padding:"12px 16px",borderRadius:8,border:station===s?"2px solid #DC2626":"2px solid #E2E8F0",background:station===s?"#FEF2F2":"#fff",fontWeight:station===s?700:400,fontSize:14,cursor:"pointer",fontFamily:font,color:station===s?"#DC2626":"#475569",textAlign:"left"}}>
              {station===s?"● ":"○ "}{s}
            </button>
          ))}
        </div>
        <button onClick={()=>{if(!station)return;SyncEngine.setStation(station);onDone();}} style={{...btnPrimary,width:"100%",padding:"12px",fontSize:16,borderRadius:10}} disabled={!station}>
          เข้าสู่ระบบ →
        </button>
        <div style={{marginTop:12,fontSize:11,color:"#94A3B8"}}>
          {SyncEngine.isConfigured() ? "✅ เชื่อมต่อ Google Sheets แล้ว" : "⚠ Offline Mode — ยังไม่ได้ตั้งค่า Google Sheets"}
        </div>
      </div>
    </div>
  );
}

// ====== MERGE NOTIFICATION TOAST ======
function MergeToast({mergeInfo, onDismiss}) {
  if (!mergeInfo) return null;
  return (
    <div style={{position:"fixed",top:60,right:16,zIndex:10000,background:"linear-gradient(135deg,#1E40AF,#3B82F6)",color:"#fff",borderRadius:12,padding:"14px 20px",maxWidth:360,boxShadow:"0 8px 32px rgba(0,0,0,0.3)",animation:"sd .3s ease",fontSize:13}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <strong style={{fontSize:14}}>🔄 ข้อมูลถูก Merge อัตโนมัติ</strong>
        <button onClick={onDismiss} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:16}}>✕</button>
      </div>
      <div style={{opacity:0.9}}>
        เครื่อง <strong>{mergeInfo.serverStation}</strong> แก้ไขข้อมูลพร้อมกัน
        {mergeInfo.fieldsAffected && mergeInfo.fieldsAffected.length > 0 && (
          <div style={{marginTop:4}}>ส่วนที่เปลี่ยน: {mergeInfo.fieldsAffected.map(f => ({
            patients:'ผู้ป่วย', fleetSources:'รถส่งต่อ', hospitals:'รพ.', status:'สถานะ', blood:'หมู่เลือด', name:'ชื่อเหตุการณ์'
          }[f] || f)).join(', ')}</div>
        )}
      </div>
      <div style={{marginTop:6,fontSize:11,opacity:0.7}}>ระบบรวมข้อมูลทั้งสองเครื่องเข้าด้วยกันแล้ว ไม่มีข้อมูลสูญหาย</div>
    </div>
  );
}

// ====== MAIN APP (Multi-Device Concurrent Safe) ======
function App() {
  const [mcis,setMcis]=useState([]);
  const [selectedMCI,setSelectedMCI]=useState(null);
  const [view,setView]=useState("station");
  const [createOpen,setCreateOpen]=useState(false);
  const [loading,setLoading]=useState(true);
  const [isOnline,setIsOnline]=useState(SyncEngine.isConfigured());
  const [mergeInfo,setMergeInfo]=useState(null);
  const [activeDevices,setActiveDevices]=useState(1);
  const syncRef=useRef(null);
  const selectedMCIRef=useRef(null);

  // Keep ref in sync with state (for use in polling interval)
  useEffect(()=>{selectedMCIRef.current=selectedMCI;},[selectedMCI]);

  // Initial load
  useEffect(()=>{
    if(SyncEngine.getStation()) setView("list");
    (async()=>{
      const d=await SyncEngine.fetchAll();
      if(d)setMcis(d);
      setLoading(false);
    })();
  },[]);

  // Auto-sync polling - smart merge on incoming data
  useEffect(()=>{
    if(!SyncEngine.isConfigured()) return;
    syncRef.current=setInterval(async()=>{
      try{
        const d=await SyncEngine.fetchAll();
        if(Array.isArray(d)){
          setMcis(d);
          setIsOnline(true);
          // Smart merge: if current MCI is open and server has newer data, merge
          const sel = selectedMCIRef.current;
          if(sel){
            const serverVersion=d.find(m=>m.id===sel.id);
            if(serverVersion){
              if(serverVersion._updatedBy && serverVersion._updatedBy !== DEVICE_ID &&
                 (serverVersion._version||0) > (sel._version||0)) {
                // Another device updated - merge with local
                const merged = mergeMCI(sel, serverVersion);
                setSelectedMCI(merged);
                setMergeInfo({
                  serverStation: serverVersion._station || 'เครื่องอื่น',
                  fieldsAffected: detectChangedFields(sel, serverVersion),
                  time: Date.now()
                });
                setTimeout(()=>setMergeInfo(null), 6000);
              } else {
                setSelectedMCI(serverVersion);
              }
            }
          }

          // Estimate active devices from recent updates
          const now = Date.now();
          const recentDevices = new Set();
          d.forEach(m => {
            if (m._updatedBy && (now - (m._updatedAt||0)) < 5 * 60 * 1000) {
              recentDevices.add(m._updatedBy);
            }
          });
          recentDevices.add(DEVICE_ID);
          setActiveDevices(recentDevices.size);
        }
      }catch{setIsOnline(false);}
    },SYNC_INTERVAL);
    return ()=>clearInterval(syncRef.current);
  },[]);

  const saveMcis=useCallback(async(newMcis)=>{
    setMcis(newMcis);
    localStorage.setItem('mci-data',JSON.stringify(newMcis));
  },[]);

  const handleCreateMCI=async(m)=>{
    m._version = 1; m._updatedAt = Date.now(); m._updatedBy = DEVICE_ID;
    const n=[m,...mcis];saveMcis(n);setSelectedMCI(m);setView("dashboard");
    await SyncEngine.saveMCI(m);
  };
  const handleSelectMCI=m=>{setSelectedMCI(m);setView(m.status==="closed"?"report":"dashboard");};
  const handleUpdateMCI=async(u)=>{
    u._updatedAt = Date.now();
    u._updatedBy = DEVICE_ID;
    saveMcis(mcis.map(m=>m.id===u.id?u:m));setSelectedMCI(u);
    if(u.status==="closed")setView("report");
    // Concurrent-safe save with merge
    const result = await SyncEngine.saveMCI(u);
    if(result && result.conflicts && result.conflicts.length > 0){
      setMergeInfo(result.conflicts[0]);
      setSelectedMCI(result.merged);
      setTimeout(()=>setMergeInfo(null), 6000);
    } else if(result && result.merged){
      setSelectedMCI(result.merged);
    }
  };

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F1F5F9",fontFamily:font}}><div style={{textAlign:"center"}}><div style={{fontSize:48,animation:"p 1.5s infinite"}}>🏥</div><div style={{marginTop:8,color:"#64748B"}}>กำลังโหลด...</div><style>{`@keyframes p{0%,100%{opacity:1}50%{opacity:.5}}`}</style></div></div>;
  if(view==="station") return <StationSelector onDone={()=>{setView("list");SyncEngine.fetchAll().then(d=>{if(d)setMcis(d);});}}/>;
  if(view==="report"&&selectedMCI) return <><ReportPage mci={selectedMCI} onBack={()=>{setView("list");setSelectedMCI(null);}}/><ConnectionStatus isOnline={isOnline} station={SyncEngine.getStation()} activeDevices={activeDevices}/><MergeToast mergeInfo={mergeInfo} onDismiss={()=>setMergeInfo(null)}/></>;
  if(view==="publicBoard"&&selectedMCI) return <PublicBoard mci={selectedMCI} onBack={()=>setView("dashboard")}/>;
  if(view==="dashboard"&&selectedMCI) return <><MCIDashboard mci={selectedMCI} onUpdate={handleUpdateMCI} onBack={()=>{setView("list");setSelectedMCI(null);}} onPublicBoard={()=>setView("publicBoard")}/><ConnectionStatus isOnline={isOnline} station={SyncEngine.getStation()} activeDevices={activeDevices}/><MergeToast mergeInfo={mergeInfo} onDismiss={()=>setMergeInfo(null)}/></>;

  return (<><MCIListPage mcis={mcis} onSelect={handleSelectMCI} onCreateNew={()=>setCreateOpen(true)}/><CreateMCIModal open={createOpen} onClose={()=>setCreateOpen(false)} onSave={handleCreateMCI}/><ConnectionStatus isOnline={isOnline} station={SyncEngine.getStation()} activeDevices={activeDevices}/><MergeToast mergeInfo={mergeInfo} onDismiss={()=>setMergeInfo(null)}/></>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
