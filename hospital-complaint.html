const CLOUD_URL = "https://script.google.com/macros/s/AKfycbxpa2FrPvf7QovI5AnthfunF53RI85cY1ZlIwjXioBOodHZxLfGUedv3fz44PF8L954/exec"; // ← วาง URL ตรงนี้ เช่น "https://script.google.com/macros/s/xxxxx/exec"

const DB_KEY = "hcms_db_v1";
const SESS_KEY = "hcms_session_v1";

const db = {
  load(){
    try{
      const raw = localStorage.getItem(DB_KEY);
      if(!raw) return { complaints:[], users:[], staff:[] };
      return JSON.parse(raw);
    }catch(e){ return { complaints:[], users:[], staff:[] }; }
  },
  save(data){
    localStorage.setItem(DB_KEY, JSON.stringify(data));
    // Sync ไป Google Sheets (background, ไม่ block UI)
    if(CLOUD_URL){
      fetch(CLOUD_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body: JSON.stringify({ action:"fullSync", data, user: (db.getSession() && db.getSession().email) || "" })
      }).catch(()=>{});
    }
  },
  // โหลดจาก Cloud (เรียกครั้งแรก)
  async loadFromCloud(){
    if(!CLOUD_URL) return null;
    try{
      const r = await fetch(CLOUD_URL + "?action=all");
      const j = await r.json();
      if(j.status==="ok" && j.data){
        // merge: Cloud เป็นหลัก ถ้ามีข้อมูล
        const cloud = j.data;
        if(cloud.complaints && cloud.complaints.length > 0){
          localStorage.setItem(DB_KEY, JSON.stringify(cloud));
          return cloud;
        }
      }
    }catch(e){ console.warn("Cloud load failed:", e); }
    return null;
  },
  getSession(){
    try{ return JSON.parse(localStorage.getItem(SESS_KEY)||"null"); }catch(e){ return null; }
  },
  setSession(u){ if(u) localStorage.setItem(SESS_KEY, JSON.stringify(u)); else localStorage.removeItem(SESS_KEY); }
};

// ============ HELPERS ============
function getAutoStatus(c){
  if(c.res && (c.res.actions || c.res.result)) return "resolved";
  if(c.inv && (c.inv.facts || c.inv.root || c.inv.sol)) return "in_progress";
  return "investigating";
}
function fmtDate(d){
  if(!d) return "-";
  const p = d.split("-");
  if(p.length===3) return p[2]+"/"+p[1]+"/"+p[0];
  return d;
}
function daysSince(d){
  if(!d) return "-";
  try{
    const p = d.split("-");
    let yr = parseInt(p[0]);
    if(yr > 2500) yr -= 543;
    const dt = new Date(yr, parseInt(p[1])-1, parseInt(p[2]));
    const diff = Math.floor((new Date() - dt) / 86400000);
    return diff >= 0 ? diff : 0;
  }catch(e){ return "-"; }
}
function todayISO(){
  const d = new Date();
  const buddhist = d.getFullYear() + 543;
  return buddhist+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function nextId(existing){
  const year = new Date().getFullYear()+543;
  const prefix = "CMP-"+year+"-";
  const nums = existing.filter(c=>c.id.startsWith(prefix)).map(c=>parseInt(c.id.slice(prefix.length))||0);
  const next = nums.length ? Math.max(...nums)+1 : 1;
  return prefix+String(next).padStart(3,"0");
}

function Badge({text,color,small}){
  return <span style={{display:"inline-flex",alignItems:"center",padding:small?"2px 10px":"4px 14px",borderRadius:20,fontSize:small?10:11,fontWeight:600,background:color+"14",color,whiteSpace:"nowrap"}}>{text}</span>;
}
function SBadge({status}){ const s=STS.find(o=>o.value===status)||STS[0]; return <Badge text={s.label} color={s.color}/>; }
function LBadge({level}){ const s=SEV.find(l=>l.level===level)||SEV[0]; return <Badge text={s.label} color={s.color}/>; }
function Card({children,style}){
  return <div style={{background:"#fff",borderRadius:16,border:"1px solid #f1f5f9",boxShadow:"0 1px 3px rgba(0,0,0,.04)",padding:22,...(style||{})}}>{children}</div>;
}
function Btn({children,onClick,variant="primary",size="md",disabled,style,type}){
  const V={primary:{bg:"linear-gradient(135deg,#6366f1,#8b5cf6)",c:"#fff",sh:"0 2px 8px rgba(99,102,241,.3)"},secondary:{bg:"#f1f5f9",c:"#334155",sh:"none"},success:{bg:"linear-gradient(135deg,#10b981,#059669)",c:"#fff",sh:"0 2px 8px rgba(16,185,129,.3)"},danger:{bg:"#ef4444",c:"#fff",sh:"none"},ghost:{bg:"transparent",c:"#6366f1",sh:"none"}};
  const S={sm:{padding:"7px 14px",fontSize:12},md:{padding:"10px 20px",fontSize:14},lg:{padding:"13px 28px",fontSize:15}};
  const v=V[variant]||V.primary; const s=S[size]||S.md;
  return <button type={type||"button"} onClick={onClick} disabled={disabled} style={{...s,background:disabled?"#e2e8f0":v.bg,color:disabled?"#94a3b8":v.c,border:"none",borderRadius:12,fontWeight:600,cursor:disabled?"not-allowed":"pointer",display:"inline-flex",alignItems:"center",gap:7,boxShadow:disabled?"none":v.sh,transition:"all .2s",...(style||{})}}>{children}</button>;
}
function Inp({label,value,onChange,placeholder,type,multi,rows,disabled,required}){
  const base={width:"100%",padding:"11px 16px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:14,background:disabled?"#f8fafc":"#fff",color:"#0f172a",outline:"none",boxSizing:"border-box",fontFamily:"inherit",transition:"border-color .2s"};
  return(<div style={{marginBottom:16}}>
    {label && <label style={{display:"block",fontSize:12,fontWeight:600,marginBottom:6,color:"#475569"}}>{label}{required && <span style={{color:"#ef4444"}}> *</span>}</label>}
    {multi
      ? <textarea value={value||""} onChange={onChange} placeholder={placeholder} rows={rows||3} disabled={disabled} style={{...base,resize:"vertical"}} onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>
      : <input type={type||"text"} value={value||""} onChange={onChange} placeholder={placeholder} disabled={disabled} style={base} onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}/>}
  </div>);
}

function SearchSel({label,value,onChange,options,required,placeholder,disabled}){
  const [open,setOpen] = useState(false);
  const [q,setQ] = useState("");
  const ref = useRef(null);
  const filtered = useMemo(()=>{ if(!q) return options; const s=q.toLowerCase(); return options.filter(o=>o.toLowerCase().includes(s)); },[options,q]);
  useEffect(()=>{
    function h(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[]);
  return(<div style={{marginBottom:16,position:"relative"}} ref={ref}>
    {label && <label style={{display:"block",fontSize:12,fontWeight:600,marginBottom:6,color:"#475569"}}>{label}{required && <span style={{color:"#ef4444"}}> *</span>}</label>}
    <input value={open?q:(value||"")} onChange={e=>{ setQ(e.target.value); if(!open) setOpen(true); }} onFocus={()=>{ setOpen(true); setQ(""); }} placeholder={placeholder||"พิมพ์เพื่อค้นหา..."} disabled={disabled} style={{width:"100%",padding:"11px 16px",borderRadius:12,border:"1.5px solid "+(open?"#6366f1":"#e2e8f0"),fontSize:14,background:disabled?"#f8fafc":"#fff",color:"#0f172a",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
    {value && !open && !disabled && <button type="button" onClick={()=>onChange("")} style={{position:"absolute",right:12,top:label?36:12,background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16}}>×</button>}
    {open && filtered.length>0 && <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.1)",maxHeight:200,overflowY:"auto",marginTop:4}}>
      {filtered.map(o=><div key={o} onClick={()=>{ onChange(o); setQ(""); setOpen(false); }} style={{padding:"10px 16px",fontSize:13,cursor:"pointer",background:value===o?"#eef2ff":"transparent",color:value===o?"#4338ca":"#334155",fontWeight:value===o?600:400}} onMouseEnter={e=>e.target.style.background="#f8fafc"} onMouseLeave={e=>e.target.style.background=value===o?"#eef2ff":"transparent"}>{o}</div>)}
    </div>}
  </div>);
}

function TagSel({label,options,selected,onChange,placeholder}){
  const [open,setOpen] = useState(false);
  const [q,setQ] = useState("");
  const ref = useRef(null);
  const filtered = useMemo(()=>{ const s=q.toLowerCase(); return options.filter(o=>o.toLowerCase().includes(s) && !selected.includes(o)); },[options,q,selected]);
  useEffect(()=>{
    function h(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[]);
  return(<div style={{marginBottom:16,position:"relative"}} ref={ref}>
    {label && <label style={{display:"block",fontSize:12,fontWeight:600,marginBottom:6,color:"#475569"}}>{label}</label>}
    {selected.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
      {selected.map(s=><span key={s} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 12px",borderRadius:8,background:"#eef2ff",color:"#4338ca",fontSize:12,fontWeight:600}}>{s}<span onClick={()=>onChange(selected.filter(x=>x!==s))} style={{cursor:"pointer",fontSize:14,lineHeight:1}}>×</span></span>)}
    </div>}

    {open && filtered.length>0 && <div style={{position:"absolute",left:0,right:0,zIndex:50,background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.1)",maxHeight:180,overflowY:"auto",marginTop:4}}>
      {filtered.map(o=><div key={o} onClick={()=>{ onChange([...selected,o]); setQ(""); }} style={{padding:"10px 16px",fontSize:13,cursor:"pointer",color:"#334155"}} onMouseEnter={e=>e.target.style.background="#f8fafc"} onMouseLeave={e=>e.target.style.background="transparent"}>{o}</div>)}
    </div>}
  </div>);
}

// ============ LOGIN ============
function LoginPage({onLogin,dbData,setDbData}){
  const [mode,setMode] = useState("login");
  const [email,setEmail] = useState("");
  const [name,setName] = useState("");
  const [dept,setDept] = useState("");
  const [err,setErr] = useState("");
  const [ok,setOk] = useState("");

  function doLogin(){
    setErr(""); setOk("");
    if(!email.endsWith("@up.ac.th")){ setErr("กรุณาใช้อีเมลองค์กร @up.ac.th เท่านั้น"); return; }
    // Auto-bootstrap first admin
    if(!dbData.users || dbData.users.length===0){
      const admin = { email, name:"ผู้ดูแลระบบ", dept:"แผนกเทคโนโลยีสารสนเทศ (IT)", role:"admin", status:"approved" };
      const newDb = { ...dbData, users:[admin] };
      setDbData(newDb); db.save(newDb);
      onLogin(admin);
      return;
    }
    const u = dbData.users.find(x=>x.email===email);
    if(!u){ setErr("ไม่พบบัญชีผู้ใช้ กรุณาลงทะเบียนก่อน"); return; }
    if(u.status!=="approved"){ setErr("บัญชีของคุณยังไม่ได้รับการอนุมัติ กรุณารอผู้ดูแลระบบอนุมัติ"); return; }
    onLogin(u);
  }

  function doRegister(){
    setErr(""); setOk("");
    if(!email.endsWith("@up.ac.th")){ setErr("กรุณาใช้อีเมลองค์กร @up.ac.th เท่านั้น"); return; }
    if(!name){ setErr("กรุณากรอกชื่อ-นามสกุล"); return; }
    if(!dept){ setErr("กรุณาเลือกหน่วยงาน"); return; }
    if(dbData.users && dbData.users.find(x=>x.email===email)){ setErr("อีเมลนี้มีอยู่ในระบบแล้ว"); return; }
    const isFirst = !dbData.users || dbData.users.length===0;
    const newUser = { email, name, dept, role: isFirst?"admin":"user", status: isFirst?"approved":"pending" };
    const newDb = { ...dbData, users:[...(dbData.users||[]),newUser] };
    setDbData(newDb); db.save(newDb);
    if(isFirst){
      setOk("สร้างบัญชี Admin สำเร็จ กำลังเข้าสู่ระบบ...");
      setTimeout(()=>onLogin(newUser),800);
    }else{
      setOk("ลงทะเบียนเรียบร้อย กรุณารอการอนุมัติจากผู้ดูแลระบบ");

      <div style={{width:72,height:72,borderRadius:20,margin:"0 auto 20px",background:"linear-gradient(135deg,#6366f1,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 8px 24px rgba(99,102,241,.4)"}}>
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.5"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4M9 9h1M9 13h1M9 17h1"/></svg>
      </div>
      <h1 style={{fontSize:22,fontWeight:700,color:"#fff",margin:0}}>ระบบจัดการข้อร้องเรียน</h1>
      <p style={{fontSize:13,color:"rgba(255,255,255,.5)",margin:"6px 0 0"}}>โรงพยาบาลมหาวิทยาลัยพะเยา</p>
      <p style={{fontSize:11,color:"rgba(255,255,255,.3)",margin:"2px 0 24px"}}>Hospital Complaint Management System</p>

      <div style={{display:"flex",gap:6,marginBottom:20,padding:4,background:"rgba(255,255,255,.04)",borderRadius:12}}>
        <button onClick={()=>{setMode("login");setErr("");setOk("");}} style={{flex:1,padding:"10px",border:"none",borderRadius:8,background:mode==="login"?"rgba(99,102,241,.3)":"transparent",color:mode==="login"?"#fff":"rgba(255,255,255,.5)",fontSize:13,fontWeight:600,cursor:"pointer"}}>เข้าสู่ระบบ</button>

      {mode==="register" && <>

// ============ DASHBOARD ============
function Dash({data}){
  const total = data.length;
  const done = data.filter(c=>getAutoStatus(c)==="resolved").length;
  const pend = total-done;
  const avgDays = total ? (data.reduce((s,c)=>s+(parseInt(daysSince(c.date))||0),0)/total).toFixed(1) : "0";

  // Monthly chart from real data
  const monthly = useMemo(()=>{
    const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    const buckets = {};
    data.forEach(c=>{
      const p = c.date.split("-");
      if(p.length<3) return;
      const key = months[parseInt(p[1])-1];
      if(!buckets[key]) buckets[key] = { month:key, total:0, resolved:0, pending:0 };
      buckets[key].total++;
      if(getAutoStatus(c)==="resolved") buckets[key].resolved++;
      else buckets[key].pending++;
    });
    return months.map(m=>buckets[m]||{month:m,total:0,resolved:0,pending:0}).filter(m=>m.total>0);
  },[data]);

  // By dept
  const deptPie = useMemo(()=>{
    const m = {};
    data.forEach(c=>{ m[c.dept] = (m[c.dept]||0)+1; });
    return Object.entries(m).map(([name,value])=>({ name:name.replace("แผนก","").replace(/\s*\([^)]*\)/g,""), value }));
  },[data]);

  // Severity
  const sevData = useMemo(()=>[
    { name:"ระดับ 1", value:data.filter(c=>c.severity===1).length, color:"#10b981" },
    { name:"ระดับ 2", value:data.filter(c=>c.severity===2).length, color:"#f59e0b" },
    { name:"ระดับ 3", value:data.filter(c=>c.severity===3).length, color:"#ef4444" },
  ],[data]);

  const PC = ["#6366f1","#8b5cf6","#ec4899","#f59e0b","#10b981","#64748b","#06b6d4","#84cc16"];

  const stats = [
    {l:"ข้อร้องเรียนทั้งหมด",v:total,c:"#6366f1",bg:"linear-gradient(135deg,#eef2ff,#e0e7ff)"},
    {l:"แก้ไขแล้ว",v:done,c:"#10b981",bg:"linear-gradient(135deg,#ecfdf5,#d1fae5)",sub:total?Math.round(done/total*100)+"%":""},
    {l:"รอดำเนินการ",v:pend,c:"#f59e0b",bg:"linear-gradient(135deg,#fffbeb,#fef3c7)"},
    {l:"ระยะเวลาเฉลี่ย",v:avgDays,c:"#8b5cf6",bg:"linear-gradient(135deg,#faf5ff,#ede9fe)",unit:"วัน"},
  ];

  return(<div style={{animation:"fadeUp .4s ease"}}>
    <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 6px",color:"#0f172a"}}>Dashboard</h2>
    <p style={{fontSize:13,color:"#94a3b8",margin:"0 0 24px"}}>สรุปสถิติข้อร้องเรียน</p>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:24}}>
      {stats.map((s,i)=><div key={i} style={{background:s.bg,borderRadius:18,padding:"22px 20px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-10,right:-10,width:80,height:80,borderRadius:"50%",background:s.c+"0a"}}/>
        <div style={{fontSize:11,fontWeight:600,color:s.c,letterSpacing:".06em",marginBottom:10}}>{s.l}</div>
        <div style={{display:"flex",alignItems:"baseline",gap:4}}>
          <span style={{fontSize:34,fontWeight:700,color:"#0f172a",lineHeight:1}}>{s.v}</span>
          {s.unit && <span style={{fontSize:14,color:"#64748b"}}>{s.unit}</span>}
          {s.sub && <span style={{fontSize:13,color:s.c,fontWeight:600,marginLeft:4}}>{s.sub}</span>}
        </div>
      </div>)}
    </div>

    {total===0 ? <Card style={{textAlign:"center",padding:60}}>
      <div style={{fontSize:48,marginBottom:12,opacity:.3}}>📋</div>
      <h3 style={{fontSize:16,fontWeight:600,color:"#64748b",margin:"0 0 6px"}}>ยังไม่มีข้อมูลข้อร้องเรียน</h3>
      <p style={{fontSize:13,color:"#94a3b8"}}>เริ่มต้นโดยการบันทึกข้อร้องเรียนใหม่</p>
    </Card> : <>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
      <Card>

        {monthly.length>0 ? <ResponsiveContainer width="100%" height={240}>

  function save(){
    if(!f.subj || !f.det || !f.sev){
      alert("กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน (หัวข้อ, รายละเอียด, ระดับความรุนแรง)");
      return;
    }
    const cStatus = f.fs==="อื่นๆ" ? "อื่นๆ: "+f.fsCustom : f.fs;
    const channels = [...f.chs];
    if(channels.includes("อื่นๆ") && f.chOther) {
      channels[channels.indexOf("อื่นๆ")] = "อื่นๆ: "+f.chOther;
    }
    onSave({
      id: "__NEW__",
      date: f.date,
      name: f.anon ? "ไม่ประสงค์แจ้งชื่อ/สกุล" : (f.nm+" "+f.sn).trim(),
      cStatus,
      channel: channels.join(", "),
      subject: f.subj,
      detail: f.det,
      unit: f.unit,
      severity: parseInt(f.sev),
      dept: "",
      responsible: "",
      by: user.email,
      createdAt: new Date().toISOString(),
      centerAction: f.centerAction,
      tagDepts: f.tagDepts,
      tagStaff: f.tagStaff,
      recorder: f.recorder,
      inv: null,
      res: null
    });
  }

  const CHS = ["จดหมาย","โทรศัพท์","ร้องเรียนด้วยตนเอง","เว็บเพจ","QR Code","แบบฟอร์มร้องเรียน","Line OA","อื่นๆ"];
  const inpRow = {display:"flex",alignItems:"center",gap:10,marginBottom:12};
  const inpLabel = {fontSize:13,fontWeight:600,color:"#475569",whiteSpace:"nowrap",minWidth:60};
  const inpBox = {flex:1,padding:"9px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,background:"#fff",color:"#0f172a",outline:"none",boxSizing:"border-box",fontFamily:"inherit"};

  return(<div style={{animation:"fadeUp .4s ease"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
      <Btn variant="ghost" size="sm" onClick={onBack}><Ico name="left" sz={16}/> กลับ</Btn>
      <div><h2 style={{fontSize:20,fontWeight:700,margin:0,color:"#0f172a"}}>แบบบันทึกคำร้องเรียน</h2><p style={{fontSize:12,color:"#94a3b8",margin:0}}>โรงพยาบาลมหาวิทยาลัยพะเยา</p></div>
    </div>
    <Card>
      <Inp label="วันที่" type="date" value={f.date} onChange={e=>u("date",e.target.value)}/>

      <div style={{padding:18,background:"#fafafa",borderRadius:14,marginBottom:16,border:"1px solid #f1f5f9"}}>
        <h4 style={{fontSize:13,fontWeight:700,margin:"0 0 14px",color:"#334155"}}>1. รายละเอียดผู้ร้องเรียน</h4>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer",marginBottom:14,color:"#6366f1",fontWeight:600}}>
          <input type="checkbox" checked={f.anon} onChange={e=>u("anon",e.target.checked)} style={{accentColor:"#6366f1",width:16,height:16}}/> ไม่ประสงค์แจ้งชื่อ/สกุล
        </label>
        {!f.anon && <>
          <div style={inpRow}><span style={inpLabel}>ชื่อ</span><input value={f.nm} onChange={e=>u("nm",e.target.value)} style={inpBox} placeholder="ชื่อ"/></div>
          <div style={inpRow}><span style={inpLabel}>สกุล</span><input value={f.sn} onChange={e=>u("sn",e.target.value)} style={inpBox} placeholder="สกุล"/></div>
          <div style={inpRow}><span style={inpLabel}>ที่อยู่</span><input value={f.addr} onChange={e=>u("addr",e.target.value)} style={inpBox} placeholder="ที่อยู่"/></div>
          <div style={inpRow}><span style={inpLabel}>โทรศัพท์</span><input value={f.ph} onChange={e=>u("ph",e.target.value)} style={inpBox} placeholder="เบอร์โทรศัพท์"/></div>
        </>}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:600,color:"#475569"}}>สถานะ</span>
            {!editFs ? <>
              <span style={{padding:"6px 16px",borderRadius:10,background:"#eef2ff",border:"1.5px solid #6366f1",color:"#4338ca",fontSize:13,fontWeight:600}}>{f.fs}</span>
              <button type="button" onClick={()=>setEditFs(true)} style={{padding:"5px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:12,color:"#6366f1",fontWeight:600,fontFamily:"inherit"}}>แก้ไข</button>
            </> : <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              {["ผู้ป่วย/ผู้รับบริการ","ผู้พบเห็นเหตุการณ์","บุคลากรในโรงพยาบาล","อื่นๆ"].map(o=>
                <label key={o} style={{display:"flex",alignItems:"center",gap:5,fontSize:13,cursor:"pointer",padding:"6px 14px",borderRadius:10,background:f.fs===o?"#eef2ff":"#f8fafc",border:f.fs===o?"1.5px solid #6366f1":"1.5px solid #e2e8f0",color:f.fs===o?"#4338ca":"#64748b",fontWeight:f.fs===o?600:400}}>
                  <input type="radio" name="fs" checked={f.fs===o} onChange={()=>{u("fs",o);if(o!=="อื่นๆ") setEditFs(false);}} style={{display:"none"}}/>{o}
                </label>
              )}
            </div>}
          </div>
          {editFs && f.fs==="อื่นๆ" && <div style={{...inpRow,marginTop:4,marginLeft:70}}>
            <input value={f.fsCustom} onChange={e=>u("fsCustom",e.target.value)} style={{...inpBox,maxWidth:300}} placeholder="ระบุสถานะ..."/>
            <button type="button" onClick={()=>setEditFs(false)} style={{padding:"5px 12px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>ตกลง</button>
          </div>}
        </div>

        {/* วิธีการร้องเรียน - ย้ายมาอยู่ในตอนที่ 1 */}
        <div>
          <label style={{display:"block",fontSize:13,fontWeight:600,marginBottom:8,color:"#475569"}}>วิธีการร้องเรียน</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {CHS.map(ch=>
              <label key={ch} style={{display:"flex",alignItems:"center",gap:5,fontSize:13,cursor:"pointer",padding:"6px 14px",borderRadius:10,background:f.chs.includes(ch)?"#eef2ff":"#f8fafc",border:f.chs.includes(ch)?"1.5px solid #6366f1":"1.5px solid #e2e8f0",color:f.chs.includes(ch)?"#4338ca":"#64748b",fontWeight:f.chs.includes(ch)?600:400}}>
                <input type="checkbox" checked={f.chs.includes(ch)} onChange={()=>toggleCh(ch)} style={{display:"none"}}/>{ch}
              </label>
            )}
          </div>
          {f.chs.includes("อื่นๆ") && <div style={{...inpRow,marginTop:10}}>
            <span style={inpLabel}>ระบุ</span>
            <input value={f.chOther} onChange={e=>u("chOther",e.target.value)} style={{...inpBox,maxWidth:300}} placeholder="ระบุช่องทางอื่นๆ..."/>
          </div>}
        </div>
      </div>

      <div style={{padding:18,background:"#fafafa",borderRadius:14,marginBottom:16,border:"1px solid #f1f5f9"}}>
        <h4 style={{fontSize:13,fontWeight:700,margin:"0 0 12px",color:"#334155"}}>2. หน่วยงานที่ถูกร้องเรียน</h4>
        <SearchSel value={f.unit} onChange={v=>u("unit",v)} options={DEPTS} required placeholder="พิมพ์ชื่อหน่วยงาน..."/>
      </div>

      <div style={{padding:18,background:"#fafafa",borderRadius:14,marginBottom:16,border:"1px solid #f1f5f9"}}>
        <h4 style={{fontSize:13,fontWeight:700,margin:"0 0 12px",color:"#334155"}}>3. เรื่องที่ร้องเรียน</h4>
        <Inp label="หัวข้อเรื่อง" value={f.subj} onChange={e=>u("subj",e.target.value)} required/>
        <Inp label="รายละเอียด" value={f.det} onChange={e=>u("det",e.target.value)} multi={true} rows={5} required/>
      </div>

      <div style={{padding:18,background:"linear-gradient(135deg,#fefce8,#fef9c3)",borderRadius:14,marginBottom:16,border:"1px solid #fde68a"}}>
        <h4 style={{fontSize:13,fontWeight:700,margin:"0 0 12px",color:"#92400e"}}>ประเมินระดับความรุนแรง</h4>
        {SEV.map(s=>
          <label key={s.level} style={{display:"flex",alignItems:"flex-start",gap:10,fontSize:13,cursor:"pointer",padding:"10px 14px",borderRadius:12,marginBottom:6,background:String(f.sev)===String(s.level)?"#fff":"transparent",border:String(f.sev)===String(s.level)?"2px solid "+s.color:"2px solid transparent",boxShadow:String(f.sev)===String(s.level)?"0 2px 8px "+s.color+"20":"none"}}>
            <input type="radio" name="sev" checked={String(f.sev)===String(s.level)} onChange={()=>u("sev",s.level)} style={{accentColor:s.color,marginTop:3}}/>
            <div>
              <span style={{fontWeight:700,color:s.color}}>{s.label}</span>
              <span style={{color:"#64748b",marginLeft:8}}>({s.desc})</span>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>ผลลัพธ์: {s.impact} | กรอบเวลา: {s.time}</div>
            </div>
          </label>
        )}
      </div>

      <div style={{padding:18,background:"linear-gradient(135deg,#eef2ff,#e0e7ff)",borderRadius:14,marginBottom:16,border:"1px solid #c7d2fe",opacity:canEditCenter?1:0.7}}>
        <h4 style={{fontSize:13,fontWeight:700,margin:"0 0 12px",color:"#3730a3"}}>การดำเนินการของศูนย์รับข้อร้องเรียน</h4>
        {!canEditCenter && <div style={{padding:"8px 14px",background:"#fef3c7",borderRadius:8,marginBottom:12,fontSize:12,color:"#92400e"}}>เฉพาะเจ้าหน้าที่ศูนย์ (CRM) และ Admin เท่านั้นที่แก้ไขได้</div>}
        <Inp label="รายละเอียดการดำเนินการ" value={f.centerAction} onChange={e=>u("centerAction",e.target.value)} multi={true} rows={3} placeholder="ระบุการดำเนินการของศูนย์รับข้อร้องเรียน..." disabled={!canEditCenter}/>
        <Inp label="เจ้าหน้าที่ศูนย์รับข้อร้องเรียน ผู้บันทึก" value={f.recorder} onChange={e=>u("recorder",e.target.value)} placeholder="ระบุชื่อเจ้าหน้าที่ผู้บันทึก..." disabled={!canEditCenter}/>
        <TagSel label="Tag หน่วยงาน (แจ้งให้ทราบ)" options={DEPTS} selected={f.tagDepts} onChange={v=>u("tagDepts",v)} placeholder="พิมพ์ชื่อหน่วยงานเพื่อ tag..." disabled={!canEditCenter}/>
        <TagSel label="Tag ผู้รับผิดชอบ (แจ้งให้ทราบ)" options={staffList} selected={f.tagStaff} onChange={v=>u("tagStaff",v)} placeholder="พิมพ์ชื่อผู้รับผิดชอบเพื่อ tag..." disabled={!canEditCenter}/>
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
        <Btn variant="secondary" onClick={onBack}>ยกเลิก</Btn>
        <Btn variant="primary" onClick={save}>บันทึกข้อร้องเรียน</Btn>
      </div>
    </Card>
  </div>);
}

// ============ DETAIL ============
function Detail({c,onBack,onUpdate,user,initTab}){
  const [tab,setTab] = useState(initTab||"detail");
  const [inv,setInv] = useState(c.inv||{facts:"",root:"",sol:"",resp:user.name});
  const [res,setRes] = useState(c.res||{actions:"",result:"",preventive:"",done:""});

  const isTagged = user.role==="admin"
    || (c.tagDepts||[]).includes(user.dept)
    || (c.tagStaff||[]).includes(user.name)
    || c.responsible===user.name
    || c.by===user.email;

  function saveInv(){ onUpdate({ ...c, inv }); alert("บันทึกผลการตรวจสอบเรียบร้อย"); }
  function saveRes(){ onUpdate({ ...c, res }); alert("บันทึกผลการแก้ไขเรียบร้อย"); }

  const tabs = [{id:"detail",l:"รายละเอียด"},{id:"inv",l:"ตรวจสอบ/ตอบกลับ"},{id:"res",l:"ผลการแก้ไข"}];
  const status = getAutoStatus(c);

  return(<div style={{animation:"fadeUp .4s ease"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
      <Btn variant="ghost" size="sm" onClick={onBack}><Ico name="left" sz={16}/> กลับ</Btn>
      <div style={{flex:1}}>
        <h2 style={{fontSize:18,fontWeight:700,margin:0,color:"#0f172a"}}>{c.id}</h2>
        <p style={{fontSize:12,color:"#94a3b8",margin:0}}>{c.subject}</p>
      </div>
      <div style={{display:"flex",gap:6}}><SBadge status={status}/><LBadge level={c.severity}/></div>
    </div>

    <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
      {tabs.map(t=>
        <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"9px 20px",fontSize:13,fontWeight:tab===t.id?700:500,color:tab===t.id?"#6366f1":"#94a3b8",background:tab===t.id?"#eef2ff":"transparent",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit"}}>{t.l}</button>
      )}
    </div>

    {tab==="detail" && <Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 24px",fontSize:13}}>
        {[
          ["วันที่รับเรื่อง",fmtDate(c.date)],
          ["ช่องทาง",c.channel||"-"],
          ["ผู้ร้องเรียน",c.name||"-"],
          ["สถานะผู้ร้องเรียน",c.cStatus||"-"],
          ["หน่วยงานที่ถูกร้องเรียน",c.unit||"-"],
          ["หน่วยงานรับผิดชอบ",c.dept],
          ["ผู้รับผิดชอบ",c.responsible||"-"],
          ["ระยะเวลา",daysSince(c.date)+" วัน"]
        ].map((p,i)=>
          <div key={i}><span style={{color:"#94a3b8",fontSize:11,fontWeight:500}}>{p[0]}</span><div style={{fontWeight:600,color:"#1e293b",marginTop:2}}>{p[1]}</div></div>
        )}
      </div>
      <div style={{marginTop:16,padding:16,background:"#fafafa",borderRadius:14,border:"1px solid #f1f5f9"}}>
        <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:6}}>รายละเอียด</div>
        <div style={{fontSize:14,lineHeight:1.8,whiteSpace:"pre-wrap",color:"#334155"}}>{c.detail}</div>
      </div>
      {c.centerAction && <div style={{marginTop:12,padding:16,background:"#eef2ff",borderRadius:14,border:"1px solid #c7d2fe"}}>
        <div style={{fontSize:11,fontWeight:600,color:"#4338ca",marginBottom:6}}>การดำเนินการของศูนย์รับข้อร้องเรียน</div>
        <div style={{fontSize:14,lineHeight:1.8,color:"#334155",whiteSpace:"pre-wrap"}}>{c.centerAction}</div>
      </div>}
      {(c.tagDepts||[]).length>0 && <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>Tag หน่วยงาน:</span>
        {c.tagDepts.map(d=><Badge key={d} text={d} color="#6366f1" small/>)}
      </div>}
      {(c.tagStaff||[]).length>0 && <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>Tag ผู้รับผิดชอบ:</span>
        {c.tagStaff.map(s=><Badge key={s} text={s} color="#8b5cf6" small/>)}
      </div>}
    </Card>}

    {tab==="inv" && <Card>
      <div style={{textAlign:"center",marginBottom:16}}>
        <h3 style={{fontSize:16,fontWeight:700,margin:0,color:"#0f172a"}}>แบบบันทึกการตอบกลับการตรวจสอบ</h3>
        <p style={{fontSize:12,color:"#94a3b8"}}>โรงพยาบาลมหาวิทยาลัยพะเยา</p>
      </div>
      <div style={{padding:"10px 16px",background:"#eef2ff",borderRadius:12,marginBottom:16,fontSize:12,color:"#4338ca"}}>
        <b>เรื่อง:</b> {c.subject} | <b>รหัส:</b> {c.id} | <b>วันที่:</b> {fmtDate(c.date)}
      </div>
      <Inp label="1. ตรวจสอบข้อเท็จจริง" value={inv.facts} onChange={e=>setInv({...inv,facts:e.target.value})} multi={true} rows={4} disabled={!isTagged}/>
      <Inp label="2. วิเคราะห์สาเหตุ (Root cause analysis)" value={inv.root} onChange={e=>setInv({...inv,root:e.target.value})} multi={true} rows={3} disabled={!isTagged}/>
      <Inp label="3. แนวทางแก้ไขและป้องกัน" value={inv.sol} onChange={e=>setInv({...inv,sol:e.target.value})} multi={true} rows={3} disabled={!isTagged}/>
      <Inp label="ผู้ตอบ" value={inv.resp} onChange={e=>setInv({...inv,resp:e.target.value})} disabled={!isTagged}/>
      {isTagged ? <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}><Btn variant="success" onClick={saveInv}>บันทึกผลการตรวจสอบ</Btn></div>
        : <div style={{padding:"10px 14px",background:"#fef2f2",borderRadius:10,fontSize:12,color:"#991b1b",marginTop:8}}>คุณไม่มีสิทธิ์แก้ไขรายการนี้ (ไม่ได้อยู่ในหน่วยงานหรือผู้ที่ถูก tag)</div>}
    </Card>}

    {tab==="res" && <Card>
      <div style={{textAlign:"center",marginBottom:16}}>
        <h3 style={{fontSize:16,fontWeight:700,margin:0,color:"#0f172a"}}>รายงานผลการดำเนินการแก้ไข</h3>
        <p style={{fontSize:12,color:"#94a3b8"}}>โรงพยาบาลมหาวิทยาลัยพะเยา</p>
      </div>
      <div style={{padding:"10px 16px",background:"#eef2ff",borderRadius:12,marginBottom:16,fontSize:12,color:"#4338ca"}}>
        <b>เรื่อง:</b> {c.subject} | <b>รหัส:</b> {c.id}
      </div>
      <Inp label="การดำเนินการแก้ไข" value={res.actions} onChange={e=>setRes({...res,actions:e.target.value})} multi={true} rows={3} disabled={!isTagged}/>
      <Inp label="ผลการแก้ไข" value={res.result} onChange={e=>setRes({...res,result:e.target.value})} multi={true} rows={3} disabled={!isTagged}/>
      <Inp label="มาตรการป้องกันการเกิดซ้ำ" value={res.preventive} onChange={e=>setRes({...res,preventive:e.target.value})} multi={true} rows={3} disabled={!isTagged}/>
      <Inp label="วันที่แก้ไขแล้วเสร็จ" type="date" value={res.done} onChange={e=>setRes({...res,done:e.target.value})} disabled={!isTagged}/>
      {isTagged ? <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}><Btn variant="success" onClick={saveRes}>บันทึกผลการแก้ไข</Btn></div>
        : <div style={{padding:"10px 14px",background:"#fef2f2",borderRadius:10,fontSize:12,color:"#991b1b",marginTop:8}}>คุณไม่มีสิทธิ์แก้ไขรายการนี้</div>}
    </Card>}
  </div>);
}

// ============ REGISTRY ============
function exportComplaintPDF(c){
  const status = getAutoStatus(c);
  const stsLabel = {investigating:"กำลังตรวจสอบ",in_progress:"กำลังดำเนินการ",resolved:"แก้ไขแล้ว"};
  const sevLabel = {1:"ระดับ 1 (บ่น/เสนอแนะ)",2:"ระดับ 2 (ตำหนิ/ร้องทุกข์)",3:"ระดับ 3 (รุนแรง)"};
  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>รายงานข้อร้องเรียน ${c.id}</title>
<style>body{font-family:'Sarabun',sans-serif;padding:40px;max-width:800px;margin:0 auto;color:#1e293b;font-size:14px}
h1{font-size:20px;text-align:center;margin-bottom:4px}h2{font-size:14px;background:#f1f5f9;padding:8px 14px;margin:18px 0 10px;border-radius:6px}
.sub{text-align:center;color:#64748b;font-size:13px;margin-bottom:24px}
table{width:100%;border-collapse:collapse;margin-bottom:8px}td{padding:6px 10px;vertical-align:top;border-bottom:1px solid #f1f5f9}
td:first-child{font-weight:600;width:180px;color:#475569}
.badge{display:inline-block;padding:2px 12px;border-radius:12px;font-size:12px;font-weight:600}
@media print{body{padding:20px}}</style></head><body>
<h1>รายงานสรุปข้อร้องเรียน</h1><div class="sub">โรงพยาบาลมหาวิทยาลัยพะเยา | ${c.id}</div>

function Reg({data,onView,user}){
  const [q,setQ] = useState("");
  const [sf,setSf] = useState("");
  const [lf,setLf] = useState("");
  const [df,setDf] = useState("");
  const [viewMode,setViewMode] = useState("table"); // "table" | "card"

  const list = useMemo(()=>{
    let l = data;
    if(user.role!=="admin"){
      l = l.filter(c =>
        (c.tagDepts||[]).includes(user.dept) ||
        (c.tagStaff||[]).includes(user.name) ||
        c.responsible===user.name ||
        c.by===user.email
      );
    }
    if(q){ const s=q.toLowerCase(); l = l.filter(c => c.subject.toLowerCase().includes(s) || c.detail.toLowerCase().includes(s) || c.id.toLowerCase().includes(s)); }
    if(sf) l = l.filter(c => getAutoStatus(c)===sf);
    if(lf) l = l.filter(c => c.severity===parseInt(lf));
    if(df) l = l.filter(c => c.dept===df);
    return l.sort((a,b)=>(b.createdAt||b.date).localeCompare(a.createdAt||a.date));
  },[data,q,sf,lf,df,user]);

  function canAct(c){
    return user.role==="admin"
      || (c.tagDepts||[]).includes(user.dept)
      || (c.tagStaff||[]).includes(user.name)
      || c.responsible===user.name;
  }

  const fltStyle = {padding:"10px 14px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:13,background:"#fff",fontFamily:"inherit",outline:"none"};
  const viewBtn = (mode,label)=> <button onClick={()=>setViewMode(mode)} style={{padding:"7px 14px",borderRadius:8,border:"none",background:viewMode===mode?"#6366f1":"#f1f5f9",color:viewMode===mode?"#fff":"#64748b",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>{label}</button>;

  return(<div style={{animation:"fadeUp .4s ease"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:20}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 4px",color:"#0f172a"}}>ทะเบียนคุมรายการข้อร้องเรียน</h2>
        <p style={{fontSize:13,color:"#94a3b8",margin:0}}>ค้นหาและติดตามสถานะ ({list.length} รายการ)</p>
      </div>
      <div style={{display:"flex",gap:4}}>{viewBtn("table","ตาราง")}{viewBtn("card","การ์ด")}</div>
    </div>

    <Card style={{marginBottom:16,padding:"14px 18px"}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:"1 1 220px",position:"relative"}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}>
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="ค้นหาประเด็น..." style={{width:"100%",padding:"10px 14px 10px 40px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
        <select value={sf} onChange={e=>setSf(e.target.value)} style={{...fltStyle,minWidth:140}}>
          <option value="">สถานะทั้งหมด</option>
          {STS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
        </select>
        <select value={lf} onChange={e=>setLf(e.target.value)} style={{...fltStyle,minWidth:110}}>
          <option value="">ระดับทั้งหมด</option>
          {SEV.map(s=><option key={s.level} value={s.level}>{s.label}</option>)}
        </select>
        <div style={{minWidth:180,flex:"0 0 auto"}}>
          <SearchSel value={df} onChange={v=>setDf(v)} options={DEPTS} placeholder="หน่วยงาน..."/>
        </div>
      </div>
    </Card>

    {viewMode==="card" ? (
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
        {list.length===0 && <Card style={{gridColumn:"1/-1",textAlign:"center",padding:48,color:"#cbd5e1",fontSize:14}}>
          {data.length===0 ? "ยังไม่มีข้อมูลข้อร้องเรียน" : "ไม่พบข้อมูลตามเงื่อนไขที่ค้นหา"}
        </Card>}
        {list.map(c=>{
          const st = getAutoStatus(c);
          const ca = canAct(c);
          return <Card key={c.id} style={{padding:16,cursor:"pointer"}} onClick={()=>onView(c,"detail")}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontWeight:700,color:"#6366f1",fontSize:14}}>{c.id}</span>
              <span style={{fontSize:12,color:"#94a3b8"}}>{fmtDate(c.date)}</span>
            </div>
            <div style={{fontWeight:600,color:"#1e293b",fontSize:14,marginBottom:6,lineHeight:1.4}}>{c.subject}</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>{c.unit||c.dept||"-"}</div>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
              <LBadge level={c.severity}/><SBadge status={st}/>
              <span style={{fontSize:12,color:"#334155",fontWeight:600,marginLeft:"auto"}}>{daysSince(c.date)} วัน</span>
            </div>
            <div style={{display:"flex",gap:6,borderTop:"1px solid #f1f5f9",paddingTop:10}} onClick={e=>e.stopPropagation()}>
              {ca && <>
                <button onClick={()=>onView(c,"inv")} style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",background:"#fffbeb",cursor:"pointer",fontSize:11,color:"#d97706",fontWeight:600,fontFamily:"inherit"}}>ตรวจสอบ</button>
                <button onClick={()=>onView(c,"res")} style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",background:"#ecfdf5",cursor:"pointer",fontSize:11,color:"#059669",fontWeight:600,fontFamily:"inherit"}}>แก้ไข</button>
              </>}
              <button onClick={()=>exportComplaintPDF(c)} style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",background:"#f0f9ff",cursor:"pointer",fontSize:11,color:"#0284c7",fontWeight:600,fontFamily:"inherit"}}>PDF</button>
            </div>
          </Card>;
        })}
      </div>
    ) : (
    <Card style={{padding:0,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#fafafe"}}>
              {["รหัส","วันที่","เรื่อง","หน่วยงาน","ระดับ","สถานะ","ระยะเวลา","ผู้รับผิดชอบ","ดำเนินการ","สรุปรายงาน"].map(h=>
                <th key={h} style={{padding:"13px 14px",textAlign:"left",fontWeight:600,borderBottom:"1px solid #e2e8f0",whiteSpace:"nowrap",color:"#64748b",fontSize:11,letterSpacing:".04em"}}>{h}</th>
              )}
            </tr>
          </thead>
          <tbody>
            {list.length===0 && <tr><td colSpan={10} style={{padding:48,textAlign:"center",color:"#cbd5e1",fontSize:14}}>
              {data.length===0 ? "ยังไม่มีข้อมูลข้อร้องเรียน กรุณาเริ่มต้นโดยการบันทึกข้อร้องเรียนใหม่" : "ไม่พบข้อมูลตามเงื่อนไขที่ค้นหา"}
            </td></tr>}
            {list.map(c=>{
              const st = getAutoStatus(c);
              const ca = canAct(c);
              return <tr key={c.id} style={{borderBottom:"1px solid #f1f5f9",cursor:"pointer"}} onClick={()=>onView(c,"detail")} onMouseEnter={e=>e.currentTarget.style.background="#fafafe"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <td style={{padding:"12px 14px",fontWeight:700,color:"#6366f1"}}>{c.id}</td>
                <td style={{padding:"12px 14px",whiteSpace:"nowrap",color:"#64748b"}}>{fmtDate(c.date)}</td>
                <td style={{padding:"12px 14px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500,color:"#1e293b"}}>{c.subject}</td>
                <td style={{padding:"12px 14px",whiteSpace:"nowrap",fontSize:12,color:"#64748b"}}>{c.dept||c.unit||"-"}</td>
                <td style={{padding:"12px 14px"}}><LBadge level={c.severity}/></td>
                <td style={{padding:"12px 14px"}}><SBadge status={st}/></td>
                <td style={{padding:"12px 14px",textAlign:"center",fontWeight:600,color:"#334155"}}>{daysSince(c.date)} <span style={{fontSize:11,color:"#94a3b8",fontWeight:400}}>วัน</span></td>
                <td style={{padding:"12px 14px",whiteSpace:"nowrap",fontSize:12,color:"#64748b"}}>{c.responsible||"-"}</td>
                <td style={{padding:"12px 14px"}} onClick={e=>e.stopPropagation()}>
                  {ca ? <div style={{display:"flex",gap:5}}>
                    <button onClick={e=>{e.stopPropagation();onView(c,"inv");}} style={{padding:"6px 12px",borderRadius:8,border:"none",background:"#fffbeb",cursor:"pointer",fontSize:11,color:"#d97706",fontWeight:600,fontFamily:"inherit"}}>ตรวจสอบ</button>
                    <button onClick={e=>{e.stopPropagation();onView(c,"res");}} style={{padding:"6px 12px",borderRadius:8,border:"none",background:"#ecfdf5",cursor:"pointer",fontSize:11,color:"#059669",fontWeight:600,fontFamily:"inherit"}}>แก้ไข</button>
                  </div> : <span style={{fontSize:11,color:"#cbd5e1"}}>ไม่มีสิทธิ์</span>}
                </td>
                <td style={{padding:"12px 14px"}} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>exportComplaintPDF(c)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:"#f0f9ff",cursor:"pointer",fontSize:11,color:"#0284c7",fontWeight:600,fontFamily:"inherit"}}>Export PDF</button>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </Card>
    )}
  </div>);
}

// ============ LINE SETTINGS ============
function LinePage({dbData,setDbData}){
  const cfg = dbData.lineConfig || { token:"", notif:{ newComplaint:true, statusChange:true, meeting:true, overdue:true } };
  const [token,setToken] = useState(cfg.token);
  const [noti,setNoti] = useState(cfg.notif);
  const [saved,setSaved] = useState(false);

  function save(){
    const newDb = { ...dbData, lineConfig:{ token, notif:noti } };
    setDbData(newDb); db.save(newDb);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  const items = [
    {k:"newComplaint",l:"แจ้งเตือนข้อร้องเรียนใหม่",d:"เมื่อมีการบันทึกข้อร้องเรียนเข้าสู่ระบบ"},
    {k:"statusChange",l:"แจ้งเตือนสถานะเปลี่ยน",d:"เมื่อมีการอัปเดตสถานะรายการ"},
    {k:"meeting",l:"แจ้งเตือนการประชุม",d:"แจ้งเตือนก่อนวันประชุมคณะกรรมการ"},
    {k:"overdue",l:"แจ้งเตือนเกินกรอบเวลา",d:"เมื่อรายการเกินกรอบเวลาตามระดับ"}
  ];

  return(<div style={{animation:"fadeUp .4s ease"}}>
    <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 6px",color:"#0f172a"}}>ตั้งค่า LINE Official</h2>
    <p style={{fontSize:13,color:"#94a3b8",margin:"0 0 20px"}}>เชื่อมต่อ LINE เพื่อรับการแจ้งเตือนอัตโนมัติ</p>
    <Card style={{marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
        <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#06c755,#00b140)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",boxShadow:"0 4px 12px rgba(6,199,85,.3)"}}><Ico name="msg" sz={24}/></div>
        <div><div style={{fontWeight:700,fontSize:16,color:"#0f172a"}}>LINE Notify</div><div style={{fontSize:12,color:"#94a3b8"}}>เชื่อมต่อเพื่อรับการแจ้งเตือนผ่าน LINE</div></div>
      </div>
      <Inp label="LINE Notify Token" value={token} onChange={e=>setToken(e.target.value)} placeholder="กรอก LINE Notify Token"/>
      <Btn variant="success" onClick={save}>{saved?"บันทึกแล้ว ✓":"บันทึกการตั้งค่า"}</Btn>
      <div style={{marginTop:12,padding:"10px 14px",background:"#fef3c7",borderRadius:10,fontSize:11,color:"#92400e",lineHeight:1.7}}>
        <b>หมายเหตุ:</b> การส่งแจ้งเตือนต้องใช้ backend server เพิ่มเติม (ปัจจุบันเก็บเฉพาะการตั้งค่า)
      </div>
    </Card>
    <Card>
      <h3 style={{fontSize:14,fontWeight:700,margin:"0 0 16px",color:"#334155"}}>การแจ้งเตือน</h3>
      {items.map(n=>
        <div key={n.k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",borderRadius:14,marginBottom:8,background:"#fafafa",border:"1px solid #f1f5f9"}}>
          <div><div style={{fontSize:14,fontWeight:600,color:"#1e293b"}}>{n.l}</div><div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{n.d}</div></div>
          <div onClick={()=>setNoti({...noti,[n.k]:!noti[n.k]})} style={{width:48,height:28,borderRadius:14,background:noti[n.k]?"linear-gradient(135deg,#10b981,#059669)":"#e2e8f0",position:"relative",cursor:"pointer",transition:"background .2s"}}>
            <div style={{width:22,height:22,borderRadius:11,background:"#fff",position:"absolute",top:3,left:noti[n.k]?23:3,transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.15)"}}/>
          </div>
        </div>
      )}
    </Card>
  </div>);
}

// ============ USER MANAGEMENT ============
function UsersPage({dbData,setDbData,currentUser}){
  if(currentUser.role!=="admin") return <Card style={{textAlign:"center",padding:48,color:"#ef4444"}}>เฉพาะ Admin เท่านั้นที่เข้าถึงหน้านี้ได้</Card>;
  const users = dbData.users || [];
  const roleLabels = {admin:"Admin",crm:"CRM",user:"User"};
  const roleColors = {admin:"#8b5cf6",crm:"#0891b2",user:"#6366f1"};

  function update(email,changes){
    const newUsers = users.map(u=>u.email===email?{...u,...changes}:u);
    const newDb = {...dbData, users:newUsers};
    setDbData(newDb); db.save(newDb);
  }
  function remove(email){
    if(!confirm("ต้องการลบผู้ใช้นี้ใช่หรือไม่?")) return;
    const newDb = {...dbData, users:users.filter(u=>u.email!==email)};
    setDbData(newDb); db.save(newDb);
  }

  return(<div style={{animation:"fadeUp .4s ease"}}>
    <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 6px",color:"#0f172a"}}>จัดการผู้ใช้งาน</h2>
    <p style={{fontSize:13,color:"#94a3b8",margin:"0 0 20px"}}>อนุมัติและจัดการสิทธิ์ผู้ใช้งานในระบบ ({users.length} คน)</p>
    <Card style={{padding:0,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#fafafe"}}>
              {["อีเมล","ชื่อ","หน่วยงาน","บทบาท","สถานะ","ดำเนินการ"].map(h=>
                <th key={h} style={{padding:"13px 14px",textAlign:"left",fontWeight:600,borderBottom:"1px solid #e2e8f0",color:"#64748b",fontSize:11}}>{h}</th>
              )}
            </tr>
          </thead>
          <tbody>
            {users.map(u=><tr key={u.email} style={{borderBottom:"1px solid #f1f5f9"}}>
              <td style={{padding:"12px 14px",color:"#64748b"}}>{u.email}</td>
              <td style={{padding:"12px 14px",fontWeight:600,color:"#1e293b"}}>{u.name}</td>
              <td style={{padding:"12px 14px",color:"#64748b",fontSize:12}}>{u.dept}</td>
              <td style={{padding:"12px 14px"}}>
                {u.email===currentUser.email ? <Badge text={roleLabels[u.role]||u.role} color={roleColors[u.role]||"#6366f1"} small/>
                : <select value={u.role} onChange={e=>update(u.email,{role:e.target.value})} style={{padding:"4px 8px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:12,fontFamily:"inherit"}}>
                  <option value="user">User</option>
                  <option value="crm">CRM (ศูนย์รับข้อร้องเรียน)</option>
                  <option value="admin">Admin</option>
                </select>}
              </td>
              <td style={{padding:"12px 14px"}}><Badge text={u.status==="approved"?"อนุมัติแล้ว":"รออนุมัติ"} color={u.status==="approved"?"#10b981":"#f59e0b"} small/></td>
              <td style={{padding:"12px 14px"}}>
                <div style={{display:"flex",gap:5}}>
                  {u.status==="pending" && <Btn variant="success" size="sm" onClick={()=>update(u.email,{status:"approved"})}>อนุมัติ</Btn>}
                  {u.email!==currentUser.email && <Btn variant="danger" size="sm" onClick={()=>remove(u.email)}>ลบ</Btn>}
                </div>
              </td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </Card>
  </div>);
}

// ============ MAIN APP ============
function App(){
  const [dbData,setDbData] = useState(db.load());
  const [user,setUser] = useState(db.getSession());
  const [page,setPage] = useState("dashboard");
  const [selC,setSelC] = useState(null);
  const [initTab,setInitTab] = useState("detail");
  const [col,setCol] = useState(false);

  useEffect(()=>{
    // Reload data if session exists
    const sess = db.getSession();
    if(sess){ setUser(sess); setDbData(db.load()); }
    // โหลดจาก Cloud (ถ้ามี CLOUD_URL)
    if(CLOUD_URL){
      db.loadFromCloud().then(cloud=>{
        if(cloud) setDbData(cloud);
      });
    }
  },[]);

  function doLogin(u){ setUser(u); db.setSession(u); setPage("dashboard"); }
  function doLogout(){ setUser(null); db.setSession(null); setPage("dashboard"); setSelC(null); }

  if(!user) return <LoginPage onLogin={doLogin} dbData={dbData} setDbData={setDbData}/>;

  const menu = [
    {id:"dashboard",l:"Dashboard",ic:"dashboard"},
    {id:"newForm",l:"บันทึกข้อร้องเรียน",ic:"form"},
    {id:"registry",l:"ทะเบียนข้อร้องเรียน",ic:"list"},
    {id:"guide",l:"แนวปฏิบัติ",ic:"book"},
    {id:"line",l:"LINE แจ้งเตือน",ic:"msg"}
  ];
  if(user.role==="admin") menu.push({id:"users",l:"จัดการผู้ใช้งาน",ic:"users"});

  function onSave(c){
    const complaints = dbData.complaints || [];
    const newC = { ...c, id: nextId(complaints) };
    const newDb = { ...dbData, complaints:[newC,...complaints] };
    setDbData(newDb); db.save(newDb);
    setPage("registry");
  }
  function onView(c,tab){ setSelC(c); setInitTab(tab||"detail"); setPage("detail"); }
  function onUp(c){
    const complaints = (dbData.complaints||[]).map(x=>x.id===c.id?c:x);
    const newDb = { ...dbData, complaints };
    setDbData(newDb); db.save(newDb);
    setSelC(c);
  }

  function renderPage(){
    const complaints = dbData.complaints || [];
    switch(page){
      case "dashboard": return <Dash data={complaints}/>;
      case "newForm": return <NewForm onSave={onSave} onBack={()=>setPage("registry")} user={user} dbData={dbData}/>;
      case "registry": return <Reg data={complaints} onView={onView} user={user}/>;
      case "detail": return selC ? <Detail c={(dbData.complaints||[]).find(x=>x.id===selC.id)||selC} onBack={()=>setPage("registry")} onUpdate={onUp} user={user} initTab={initTab}/> : null;
      case "guide": return <Guide/>;
      case "line": return <LinePage dbData={dbData} setDbData={setDbData}/>;
      case "users": return <UsersPage dbData={dbData} setDbData={setDbData} currentUser={user}/>;
      default: return <Dash data={complaints}/>;
    }
  }

  return(<div style={{display:"flex",minHeight:"100vh",background:"#f8fafc"}}>
    <aside style={{width:col?72:260,minHeight:"100vh",background:"linear-gradient(180deg,#0f172a 0%,#1e1b4b 100%)",color:"#cbd5e1",display:"flex",flexDirection:"column",flexShrink:0,transition:"width .3s cubic-bezier(.4,0,.2,1)",overflow:"hidden",position:"sticky",top:0,height:"100vh"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"radial-gradient(ellipse at top left,rgba(99,102,241,.08),transparent 60%)",pointerEvents:"none"}}/>
      <div style={{padding:col?"18px 16px":"22px 22px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:12,minHeight:76,position:"relative",zIndex:1}}>
        <div style={{width:40,height:40,borderRadius:13,background:"linear-gradient(135deg,#6366f1,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(99,102,241,.3)",flexShrink:0,cursor:"pointer"}} onClick={()=>setCol(!col)}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.5"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4M9 9h1M9 13h1M9 17h1"/></svg>
        </div>
        {!col && <div><div style={{fontSize:15,fontWeight:700,color:"#fff",lineHeight:1.2,whiteSpace:"nowrap"}}>ข้อร้องเรียน</div><div style={{fontSize:10,color:"rgba(255,255,255,.35)",whiteSpace:"nowrap"}}>รพ.มหาวิทยาลัยพะเยา</div></div>}
      </div>
      <div style={{padding:"6px 10px",position:"relative",zIndex:1}}>
        <button onClick={()=>setCol(!col)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",padding:7,borderRadius:10,border:"none",cursor:"pointer",background:"rgba(255,255,255,.04)",color:"rgba(255,255,255,.3)",fontSize:14,fontFamily:"inherit"}}>
          <Ico name={col?"chevR":"chevL"} sz={16}/>
        </button>
      </div>
      <nav style={{flex:1,padding:"4px 10px",overflowY:"auto",position:"relative",zIndex:1}}>
        {menu.map(m=>{
          const active = page===m.id || (m.id==="registry" && page==="detail");
          return <button key={m.id} onClick={()=>setPage(m.id)} title={col?m.l:""} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:col?"11px 0":"11px 16px",borderRadius:12,border:"none",cursor:"pointer",background:active?"rgba(99,102,241,.15)":"transparent",color:active?"#a5b4fc":"rgba(255,255,255,.45)",fontSize:13,fontWeight:active?600:400,marginBottom:3,textAlign:"left",fontFamily:"inherit",justifyContent:col?"center":"flex-start",whiteSpace:"nowrap",overflow:"hidden",position:"relative"}}>
            {active && <div style={{position:"absolute",left:0,top:"50%",transform:"translateY(-50%)",width:3,height:20,borderRadius:2,background:"#6366f1"}}/>}
            <span style={{flexShrink:0,display:"flex",opacity:active?1:.6}}><Ico name={m.ic} sz={18}/></span>
            {!col && <span>{m.l}</span>}
          </button>;
        })}
      </nav>
      <div style={{padding:col?"14px 10px":"16px 22px",borderTop:"1px solid rgba(255,255,255,.06)",position:"relative",zIndex:1}}>
        {!col && <div style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div style={{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700}}>{user.name.charAt(0)}</div>
            <div style={{minWidth:0,flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
            </div>
          </div>
          <Badge text={user.role==="admin"?"Admin":user.role==="crm"?"CRM":"User"} color={user.role==="admin"?"#8b5cf6":user.role==="crm"?"#0891b2":"#a78bfa"} small/>
        </div>}
        <button onClick={doLogout} title="ออกจากระบบ" style={{width:"100%",display:"flex",alignItems:"center",gap:7,padding:"9px 14px",borderRadius:10,border:"none",cursor:"pointer",background:"rgba(239,68,68,.08)",color:"#fca5a5",fontSize:12,fontWeight:600,fontFamily:"inherit",justifyContent:col?"center":"flex-start"}}>
          <Ico name="logout" sz={16}/>{!col && <span>ออกจากระบบ</span>}
        </button>
      </div>
    </aside>

    <main style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
      <header style={{background:"rgba(255,255,255,.85)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:"1px solid #f1f5f9",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div style={{fontSize:14,fontWeight:600,color:"#334155"}}>
          {(menu.find(m=>m.id===page)||{}).l || (page==="detail"?"รายละเอียดข้อร้องเรียน":"")}
        </div>
        <Btn variant="primary" size="sm" onClick={()=>setPage("newForm")}><Ico name="plus" sz={15}/> บันทึกใหม่</Btn>
      </header>
      <div style={{flex:1,padding:24,overflowY:"auto"}}>{renderPage()}</div>
    </main>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
