<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCA Management System - โรงพยาบาลมหาวิทยาลัยพะเยา</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root{--primary:#1a5276;--primary-light:#2980b9;--primary-dark:#0e2f44;--accent:#e74c3c;--accent-warm:#f39c12;--success:#27ae60;--bg:#f0f3f7;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;--border:#dce1e8;--sidebar-bg:#0e2f44;--tier1:#e8f5e9;--tier2:#e3f2fd;--tier3:#fff8e1;--tier4:#fce4ec;--tier5:#f3e5f5;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
/* Login page */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0e2f44 0%,#1a5276 50%,#2980b9 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center}
.login-card h1{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:4px}
.login-card .sub{font-size:13px;color:var(--text-light);margin-bottom:24px}
.login-card .logo{font-size:48px;margin-bottom:12px}
.google-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 28px;border:2px solid var(--border);border-radius:8px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;color:var(--text)}
.google-btn:hover{border-color:var(--primary);background:#f8f9fa}
.login-error{color:var(--accent);font-size:13px;margin-top:12px}
.login-info{background:#e3f2fd;border-radius:8px;padding:12px;margin-top:20px;font-size:12px;color:var(--primary);line-height:1.6;text-align:left}
/* Pending approval */
.pending-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.pending-card{background:#fff;border-radius:16px;padding:40px;width:500px;max-width:90vw;box-shadow:var(--shadow);text-align:center}
.pending-card h2{font-size:18px;color:var(--accent-warm);margin-bottom:8px}
.pending-card p{font-size:13px;color:var(--text-light);margin-bottom:16px}
/* Registration form */
.reg-form{text-align:left;margin-top:16px}
.reg-form label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
.reg-form input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;margin-bottom:12px}
.reg-form input:focus{outline:none;border-color:var(--primary-light)}
/* Admin */
.admin-badge{background:var(--accent-warm);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:8px}
.user-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-size:13px;position:sticky;top:0;z-index:200}
.user-bar .user-info{display:flex;align-items:center;gap:10px}
.user-bar img{width:28px;height:28px;border-radius:50%}
/* App layout */
.app{display:flex;height:100vh;overflow:hidden}
.app-with-bar{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app-body{display:flex;flex:1;overflow:hidden}
.sb{width:280px;min-width:280px;background:var(--sidebar-bg);color:#ecf0f1;display:flex;flex-direction:column;z-index:100;transition:width 0.25s,min-width 0.25s}
.sb.collapsed{width:60px;min-width:60px}
.sb.collapsed .sb-h h1,.sb.collapsed .sb-h .st,.sb.collapsed .ns,.sb.collapsed .ni span:not(.ni-i),.sb.collapsed .ni-b{display:none}
.sb.collapsed .sb-h{padding:12px 0;text-align:center}
.sb.collapsed .ni{padding:10px 0;justify-content:center}
.sb.collapsed .ni-i{width:auto;font-size:20px}
.sb-toggle{padding:8px;text-align:center;cursor:pointer;border-top:1px solid rgba(255,255,255,0.1);font-size:18px;color:rgba(255,255,255,0.6);transition:color 0.2s}
.sb-toggle:hover{color:#fff}
.sb-h{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sb-h h1{font-size:15px;font-weight:700;color:#fff;line-height:1.4}
.sb-h .st{font-size:11px;color:rgba(255,255,255,0.6);margin-top:4px}
.sb-n{flex:1;overflow-y:auto;padding:8px 0}
.ns{padding:8px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);font-weight:600}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all 0.2s;font-size:13px;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,0.08)}
.ni.ac{background:rgba(255,255,255,0.12);border-left-color:var(--accent-warm);color:#fff;font-weight:600}
.ni-i{width:20px;text-align:center;font-size:16px}
.ni-b{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.mc{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.ch{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.ch h2{font-size:18px;font-weight:700;color:var(--primary-dark)}
.ha{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cb{flex:1;padding:20px 24px;overflow-y:auto}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-light)}
.btn-s{background:var(--success);color:#fff}.btn-s:hover{background:#219a52}
.btn-w{background:var(--accent-warm);color:#fff}.btn-w:hover{background:#e67e22}
.btn-d{background:var(--accent);color:#fff}.btn-d:hover{background:#c0392b}
.btn-o{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-o:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.fc{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.fch{padding:14px 20px;background:var(--primary);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.fcb{padding:20px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
.fl .rq{color:var(--accent)}
.fi,.ft,.fs{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;transition:border 0.2s;background:#fff}
.fi:focus,.ft:focus,.fs:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(41,128,185,0.1)}
.ft{min-height:80px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.cg{display:flex;flex-wrap:wrap;gap:10px}
.ci{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer}
.ci input[type="checkbox"]{accent-color:var(--primary);width:16px;height:16px}
.sg{display:flex;flex-wrap:wrap;gap:6px}
.sb2{padding:4px 12px;border:2px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;user-select:none}
.sb2.sel{border-color:var(--primary);background:var(--primary);color:#fff}
.sb2:hover:not(.sel){border-color:var(--primary-light)}
/* Flow steps */
.fse{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:10px 0}
.fsb{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;min-width:110px;font-size:12px;font-family:inherit;text-align:center;transition:all 0.2s}
.fsb:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(41,128,185,0.12);outline:none}
.fsb.sv{border-color:var(--success);background:#e8f8f0}
.fa{color:var(--text-light);font-size:18px;font-weight:700;user-select:none}
/* Tier */
.tc{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;border-left:4px solid transparent;transition:border-color 0.2s}
.tc.hd{border-left-color:var(--success)}
.tch{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background 0.15s}
.tch:hover{background:#f8f9fa}
.tch .tk{width:18px;height:18px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.tch .tt{flex:1;font-weight:700;font-size:13px}
.tch .tg{padding:2px 10px;border-radius:12px;font-size:10px;font-weight:700;color:#fff}
.tch .tw{font-size:13px;color:var(--text-light);transition:transform 0.2s;padding:4px 8px;border-radius:4px}
.tch .tw:hover{background:#eee}
.tch .tw.op{transform:rotate(180deg)}
.tcb{padding:0 20px 20px}
.tcb.cl{display:none}
/* Tabs */
.ftb{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;gap:2px}
.ft2{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;color:var(--text-light);border-radius:6px 6px 0 0}
.ft2.ac{color:var(--primary);border-bottom-color:var(--primary);background:#fff}
.ft2:hover:not(.ac){color:var(--text);background:#f8f9fa}
/* People */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pb{background:#f8f9fa;border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.pb .rl{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px}
/* Other */
.oir{display:flex;align-items:center;gap:6px;margin-top:8px}
.oir input[type="text"]{flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit}
.oir input[type="text"]:focus{outline:none;border-color:var(--primary-light)}
/* HRMS */
.hb{background:linear-gradient(135deg,#fff3cd,#ffeeba);border:1px solid #ffc107;border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
/* Knowledge */
.kc{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.kch{padding:12px 16px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-weight:700;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.kcb{padding:16px;font-size:13px;line-height:1.7}
.kcb.cl{display:none}
/* Dashboard */
.ssg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.sc{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-align:center}
.sv2{font-size:32px;font-weight:700;color:var(--primary)}
.sl{font-size:12px;color:var(--text-light);margin-top:4px;font-weight:500}
.sc.su .sv2{color:var(--success)}.sc.wa .sv2{color:var(--accent-warm)}.sc.da .sv2{color:var(--accent)}
.cc{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.ct{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--primary-dark)}
/* Table */
.rlt{width:100%;border-collapse:collapse}
.rlt th{background:var(--primary);color:#fff;padding:10px 12px;font-size:12px;text-align:left}
.rlt td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
.rlt tr:hover td{background:rgba(41,128,185,0.04)}
.stb{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
.std{background:#ffeaa7;color:#856404}.stc{background:#d4edda;color:#155724}.sth{background:#cce5ff;color:#004085}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:1000;animation:slu 0.3s ease}
@keyframes slu{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.lsp{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.tp-wrap{position:relative;display:inline-block}
.tp-wrap .tp-box{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 10px);left:0;background:#1a3a52;color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.6;width:360px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.25);pointer-events:none;transition:opacity 0.2s,visibility 0.2s;font-weight:400;text-align:left;white-space:normal}
.tp-wrap .tp-box::after{content:'';position:absolute;top:100%;left:16px;border:6px solid transparent;border-top-color:#1a3a52}
.tp-wrap:hover .tp-box{visibility:visible;opacity:1}
/* Board */
.board-post{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border-left:4px solid var(--primary-light)}
.board-post.cat-rm{border-left-color:var(--accent-warm)}
.board-reply{background:#f8f9fa;border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-top:8px;font-size:13px}
.board-cat{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;margin-right:6px}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyAoaSDiYzeDeQHmZVl9wMXWSXGBvuJO1i8",
  authDomain: "rca-up-hospital.firebaseapp.com",
  projectId: "rca-up-hospital",
  storageBucket: "rca-up-hospital.firebasestorage.app",
  messagingSenderId: "304181932996",

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const googleProvider = new firebase.auth.GoogleAuthProvider();
googleProvider.setCustomParameters({hd: 'up.ac.th'});

const ADMIN_EMAIL = 'phatcharapon.ud@up.ac.th';

// ===== Data Constants =====
const SEV_L=['A','B','C','D','E','F','G','H','I'], SEV_N=['1','2','3','4','5'];
const SEV_L_TIP={
  A:'(เกิดที่นี่) มีโอกาสเกิดเหตุการณ์และค้นพบได้ด้วยตัวเอง สามารถปรับแก้ไขได้ ไม่ส่งผลกระทบถึงผู้อื่นและผู้ป่วยหรือบุคลากร',
  B:'(เกิดที่ไกล) เกิดเหตุการณ์/ความผิดพลาดขึ้นแล้วโดยส่งต่อเหตุการณ์/ความผิดพลาดนั้นไปที่ผู้อื่นแต่สามารถตรวจพบและแก้ไขได้ โดยยังไม่มีผลกระทบใดๆ ถึงผู้ป่วยหรือบุคลากร',
  C:'(เกิดกับใคร) เกิดเหตุการณ์/ความผิดพลาดขึ้นและมีผลกระทบถึงผู้ป่วยหรือบุคลากร แต่ไม่เกิดอันตรายเสียหาย',
  D:'(ให้ระวัง) เกิดความผิดพลาดขึ้น มีผลกระทบถึงผู้ป่วยหรือบุคลากร ต้องให้การดูแลเฝ้าระวังเป็นพิเศษว่าจะไม่เป็นอันตราย',
  E:'(ต้องรักษา) เกิดความผิดพลาดขึ้น มีผลกระทบถึงผู้ป่วยหรือบุคลากร เกิดอันตรายชั่วคราวที่ต้องแก้ไข/รักษาเพิ่มมากขึ้น',
  F:'(เยียวยานาน) เกิดความผิดพลาดขึ้น มีผลกระทบถึงผู้ป่วยหรือบุคลากร ต้องใช้เวลาแก้ไขนานกว่าปกติหรือเกินกำหนด ผู้ป่วยหรือบุคลากร ต้องรักษา/นอนโรงพยาบาลนานขึ้น',
  G:'(ต้องพิการ) เกิดความผิดพลาดถึงผู้ป่วยหรือบุคลากร ทำให้เกิดความพิการถาวร หรือมีผลกระทบทำให้เสียชื่อเสียง/ความเชื่อถือและ/หรือมีการร้องเรียน',
  H:'(ต้องการปั๊ม) เกิดความผิดพลาด ถึงผู้ป่วยหรือบุคลากร มีผลทำให้ต้องทำการช่วยชีวิต ต้องดูแลต่อเนื่องตลอดชีวิต ช่วยเหลือตัวเองไม่ได้ หรือกรณีทำให้เสียชื่อเสียงและ/หรือมีการเรียกร้องค่าเสียหายจากโรงพยาบาล',
  I:'(จำใจลา) เกิดความผิดพลาด ถึงผู้ป่วยหรือบุคลากร เป็นสาเหตุทำให้เสียชีวิต เสียชื่อเสียงโดยมีการฟ้องร้องทางศาล/สื่อ'
};
const SEV_N_TIP={

// ===== Export Functions =====
function bLinkageSVG(fd){
  var ss=(fd.flowSteps||[]).filter(function(s){return s.trim()});
  var cmps=(fd.cmps||[]).filter(function(c){return c.step||c.problem||c.unsafeAct});
  if(!ss.length)return'<p style="color:#999">ยังไม่มีข้อมูล Flow of Steps</p>';
  var cols=ss.length,LW=130,CW=Math.max(130,Math.min(170,850/cols)),BW=CW-14,BH=74,TRH=94,UAH=94,FSH=94;
  var W=LW+cols*CW+10,H=5*TRH+UAH+FSH;
  function tY(n){return(5-n)*TRH}var uY=5*TRH,fY=uY+UAH;
  function cX(i){return LW+i*CW+CW/2}
  function gT(n){var r=[];(fd.ta||[]).forEach(function(t,i){if(!t.en||TD[i].tier!==n)return;(t.entries||[]).forEach(function(e){if(e.desc||(e.ck||[]).length>0||(e.oc&&e.ot)){var o={};for(var k in e)o[k]=e[k];o.info=TD[i];r.push(o)}})});return r}
  function gTx(t){var ck=(t.ck||[]).slice();if(t.oc&&t.ot)ck.push(t.ot);var parts=[];if(ck.length)parts.push(ck.join(', '));if(t.desc)parts.push(t.desc);return parts.join(' ')||''}
  var cm={};cmps.forEach(function(c){var i=ss.indexOf(c.step);if(i>=0)cm[i]=c});
  var cc=Object.keys(cm).map(Number);
  function resCol(e){if(!e.linkedTo)return-1;if(e.linkedTo.type==='cmp'){var c=(fd.cmps||[])[e.linkedTo.index];return c?ss.indexOf(c.step):-1}if(e.linkedTo.type==='tier'){var tt=null;(fd.ta||[]).forEach(function(x){if(x.id===e.linkedTo.tierId)tt=x});var te=tt&&tt.entries?tt.entries[e.linkedTo.entryIndex]:null;return te?resCol(te):-1}return-1}
  var tp={};[5,4,3,2,1].forEach(function(n){var it=gT(n);tp[n]=[];it.forEach(function(t,i){var o={};for(var k in t)o[k]=t[k];var rc=resCol(t);o.col=rc>=0?rc:Math.min(Math.round(i*cols/it.length+cols/(it.length*2)-.5),cols-1);tp[n].push(o)})});
  var ln=[];
  cc.forEach(function(i){ln.push({x1:cX(i),y1:uY+UAH/2+BH/2,x2:cX(i),y2:fY+FSH/2-BH/2})});
  [5,4,3,2,1].forEach(function(n){(tp[n]||[]).forEach(function(t){var tx=cX(t.col),tb=tY(n)+TRH/2+BH/2;
    if(t.linkedTo){
      if(t.linkedTo.type==='cmp'){var ci=ss.indexOf(((fd.cmps||[])[t.linkedTo.index]||{}).step||'');if(ci>=0){ln.push({x1:tx,y1:tb,x2:cX(ci),y2:uY+UAH/2-BH/2});return}}
      if(t.linkedTo.type==='tier'){var tti=-1;(fd.ta||[]).forEach(function(x,xi){if(x.id===t.linkedTo.tierId)tti=xi});if(tti>=0){var ttn=TD[tti].tier;var items=tp[ttn]||[];var te=items[t.linkedTo.entryIndex];if(te){ln.push({x1:tx,y1:tb,x2:cX(te.col),y2:tY(ttn)+TRH/2-BH/2});return}}}
    }
    var f=false;for(var b=n-1;b>=1&&!f;b--)if((tp[b]||[]).length){var nr=tp[b][0],md=999;tp[b].forEach(function(bt){var d=Math.abs(bt.col-t.col);if(d<md){md=d;nr=bt}});ln.push({x1:tx,y1:tb,x2:cX(nr.col),y2:tY(b)+TRH/2-BH/2});f=true}
    if(!f&&cc.length){var nc=cc[0],md2=999;cc.forEach(function(ci2){var d=Math.abs(ci2-t.col);if(d<md2){md2=d;nc=ci2}});ln.push({x1:tx,y1:tb,x2:cX(nc),y2:uY+UAH/2-BH/2})}})});
  var TL={5:{n:'Tier 5',s:['สังคม/นอกองค์กร']},4:{n:'Tier 4',s:['การบริหารจัดการ','นโยบาย']},3:{n:'Tier 3',s:['สวล.,ข้อมูล','ระบบ']},2:{n:'Tier 2',s:['ลักษณะงาน','ทีม']},1:{n:'Tier 1',s:['ผู้ป่วย','บุคลากร']}};
  function bx(x,y,w,h,t,fs){return'<g><rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="5" fill="#fff" stroke="#444" stroke-width="1.5"/><foreignObject x="'+(x+3)+'" y="'+(y+1)+'" width="'+(w-6)+'" height="'+(h-2)+'"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:'+(fs||11)+'px;text-align:center;line-height:1.35;overflow:hidden;width:100%;height:100%;display:flex;align-items:center;justify-content:center;word-break:break-word"><span style="display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis">'+t+'</span></div></foreignObject></g>'}
  var s='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" width="100%" style="font-family:Sarabun,sans-serif;display:block;max-width:100%;height:auto">';
  s+='<defs><marker id="la" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#555"/></marker><marker id="lr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#444"/></marker></defs>';
  s+='<rect x="0" y="0" width="'+W+'" height="'+(5*TRH)+'" fill="#d6e4ee"/>';
  s+='<rect x="0" y="'+uY+'" width="'+W+'" height="'+UAH+'" fill="#dcedc8"/>';
  s+='<rect x="0" y="'+fY+'" width="'+W+'" height="'+FSH+'" fill="#fce4cc"/>';
  [5,4,3,2,1].forEach(function(n){s+='<line x1="'+(LW-10)+'" y1="'+tY(n)+'" x2="'+W+'" y2="'+tY(n)+'" stroke="#b0c4d8" stroke-width="0.7"/>'});
  s+='<line x1="0" y1="'+uY+'" x2="'+W+'" y2="'+uY+'" stroke="#888" stroke-width="1"/>';
  s+='<line x1="0" y1="'+fY+'" x2="'+W+'" y2="'+fY+'" stroke="#888" stroke-width="1"/>';
  s+='<text x="14" y="'+(5*TRH/2)+'" font-size="13" font-weight="700" fill="#1a5276" text-anchor="middle" transform="rotate(-90,14,'+(5*TRH/2)+')">Contributing factors</text>';
  [5,4,3,2,1].forEach(function(n){var y=tY(n);s+='<text x="28" y="'+(y+22)+'" font-size="11" font-weight="700" fill="#1a5276">'+TL[n].n+'</text>';TL[n].s.forEach(function(sl,j){s+='<text x="28" y="'+(y+36+j*14)+'" font-size="10" fill="#2980b9">'+sl+'</text>'})});
  s+='<text x="8" y="'+(uY+22)+'" font-size="10" font-weight="700" fill="#33691e">Unsafe act/</text>';
  s+='<text x="8" y="'+(uY+36)+'" font-size="10" font-weight="700" fill="#33691e">Potential change</text>';
  s+='<text x="8" y="'+(fY+20)+'" font-size="10" font-weight="700" fill="#c0392b">Flow of steps</text>';
  s+='<text x="8" y="'+(fY+34)+'" font-size="9" fill="#c0392b">Care process /</text>';
  s+='<text x="8" y="'+(fY+46)+'" font-size="9" fill="#c0392b">กระบวนการหลัก</text>';
  ln.forEach(function(l){s+='<line x1="'+l.x1+'" y1="'+l.y1+'" x2="'+l.x2+'" y2="'+l.y2+'" stroke="#555" stroke-width="1.2" marker-end="url(#la)"/>'});
  ss.forEach(function(st,i){var x=cX(i)-BW/2,y=fY+(FSH-BH)/2;s+=bx(x,y,BW,BH,st);if(i<ss.length-1)s+='<line x1="'+(x+BW+2)+'" y1="'+(y+BH/2)+'" x2="'+(cX(i+1)-BW/2-2)+'" y2="'+(y+BH/2)+'" stroke="#444" stroke-width="1.5" marker-end="url(#lr)"/>'});
  cc.forEach(function(i){s+=bx(cX(i)-BW/2,uY+(UAH-BH)/2,BW,BH,cm[i].unsafeAct||cm[i].problem||'')});
  [5,4,3,2,1].forEach(function(n){(tp[n]||[]).forEach(function(t){s+=bx(cX(t.col)-BW/2,tY(n)+(TRH-BH)/2,BW,BH,gTx(t))})});
  s+='</svg>';return s;
}

              <select value={editDepts[u.id]!==undefined?editDepts[u.id]:u.department||''} onChange={e=>hChangeDept(u.id,e.target.value)} style={{width:'100%',padding:'6px 10px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:12,fontFamily:'inherit',marginTop:4}}>
                <option value={u.department||''}>{u.department||'-- ไม่ระบุ --'}</option>
                {DEPTS.filter(d=>d!==u.department).map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            </div>
          </div>
        ))}
      </div>}

      <h4 style={{fontSize:14,color:'var(--success)',marginBottom:8}}>ผู้ใช้ที่อนุมัติแล้ว ({approved.length})</h4>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{background:'var(--primary)',color:'#fff'}}>
          <th style={{padding:8,textAlign:'left'}}>ชื่อ-นามสกุล</th>
          <th style={{padding:8,textAlign:'left'}}>อีเมล</th>
          <th style={{padding:8,textAlign:'left'}}>หน่วยงาน</th>
          <th style={{padding:8,textAlign:'left'}}>วันที่สมัคร</th>
        </tr></thead>
        <tbody>{approved.map(u=>(
          <tr key={u.id} style={{borderBottom:'1px solid var(--border)'}}>
            <td style={{padding:8}}>{u.fullName}</td>
            <td style={{padding:8}}>{u.email}</td>
            <td style={{padding:8}}>{u.department}</td>
            <td style={{padding:8}}>{u.createdAt?.toDate?.()?.toLocaleDateString('th-TH')||'-'}</td>
          </tr>
        ))}</tbody>
      </table>
    </div>
  );
}

// ===== BOARD COMPONENT =====
function BoardV({user,userData,isAdmin}){
  const[posts,setPosts]=useState([]);
  const[showForm,sSF]=useState(false);
  const[title,sTitle]=useState('');
  const[content,sContent]=useState('');
  const[category,sCat]=useState('RCA');
  const[replyTo,sReplyTo]=useState(null);
  const[replyText,sReplyText]=useState('');
  const[replies,setReplies]=useState({});
  const[expandedPost,sExpanded]=useState(null);

  useEffect(()=>{
    const unsub=db.collection('posts').orderBy('createdAt','desc').limit(50).onSnapshot(snap=>{
      setPosts(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return()=>unsub();
  },[]);

  const loadReplies=(postId)=>{
    if(expandedPost===postId){sExpanded(null);return}
    sExpanded(postId);
    db.collection('posts').doc(postId).collection('replies').orderBy('createdAt','asc').get().then(snap=>{
      setReplies(prev=>({...prev,[postId]:snap.docs.map(d=>({id:d.id,...d.data()}))}));
    });
  };

  const hPost=async()=>{
    if(!title.trim()||!content.trim())return alert('กรุณากรอกหัวข้อและเนื้อหา');
    await db.collection('posts').add({
      title:title.trim(),content:content.trim(),category,
      authorName:userData.fullName,authorEmail:user.email,authorUid:user.uid,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    sTitle('');sContent('');sCat('RCA');sSF(false);
  };

  const hReply=async(postId)=>{
    if(!replyText.trim())return;
    await db.collection('posts').doc(postId).collection('replies').add({
      content:replyText.trim(),
      authorName:userData.fullName,authorEmail:user.email,authorUid:user.uid,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    sReplyText('');sReplyTo(null);
    loadReplies(postId);
  };

  const hDelete=async(postId)=>{
    if(!confirm('ลบโพสต์นี้?'))return;
    await db.collection('posts').doc(postId).delete();
  };

  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <div style={{fontSize:13,color:'var(--text-light)'}}>แลกเปลี่ยนความรู้และข่าวสาร</div>
      <button className="btn btn-p" onClick={()=>sSF(!showForm)}>+ สร้างโพสต์ใหม่</button>
    </div>

    {showForm&&<div className="fc" style={{marginBottom:16}}><div className="fch">สร้างโพสต์ใหม่</div><div className="fcb">
      <div className="fg"><label className="fl">หมวดหมู่</label>
        <div style={{display:'flex',gap:8}}>
          <span className={`sb2 ${category==='RCA'?'sel':''}`} onClick={()=>sCat('RCA')}>RCA</span>
          <span className={`sb2 ${category==='RM News'?'sel':''}`} onClick={()=>sCat('RM News')}>RM News</span>
        </div>
      </div>
      <div className="fg"><label className="fl">หัวข้อ</label><input className="fi" value={title} onChange={e=>sTitle(e.target.value)} placeholder="หัวข้อโพสต์"/></div>
      <div className="fg"><label className="fl">เนื้อหา</label><textarea className="ft" value={content} onChange={e=>sContent(e.target.value)} placeholder="เขียนเนื้อหา..." style={{minHeight:100}}/></div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button className="btn btn-o" onClick={()=>sSF(false)}>ยกเลิก</button>
        <button className="btn btn-p" onClick={hPost}>โพสต์</button>
      </div>
    </div></div>}

    {posts.length===0?<div style={{textAlign:'center',padding:40,color:'var(--text-light)'}}>
      <div style={{fontSize:48}}>💬</div>
      <div style={{fontSize:14,marginTop:8}}>ยังไม่มีโพสต์</div>
    </div>:posts.map(p=>(
      <div key={p.id} className={`board-post ${p.category==='RM News'?'cat-rm':''}`}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <span className="board-cat" style={{background:p.category==='RCA'?'var(--primary)':'var(--accent-warm)'}}>{p.category}</span>
            <strong style={{fontSize:15}}>{p.title}</strong>
          </div>
          {(isAdmin||p.authorUid===user.uid)&&<button className="btn btn-sm btn-d" onClick={()=>hDelete(p.id)} style={{padding:'2px 8px',fontSize:11}}>ลบ</button>}
        </div>
        <div style={{fontSize:13,color:'var(--text)',marginTop:8,whiteSpace:'pre-wrap',lineHeight:1.6}}>{p.content}</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10,paddingTop:8,borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:11,color:'var(--text-light)'}}>โดย {p.authorName} | {p.createdAt?.toDate?.()?.toLocaleString('th-TH')||'...'}</div>
          <div style={{display:'flex',gap:6}}>
            <button className="btn btn-sm btn-o" onClick={()=>loadReplies(p.id)}>{expandedPost===p.id?'ซ่อนความคิดเห็น':'ความคิดเห็น'} {(replies[p.id]||[]).length>0?'('+replies[p.id].length+')':''}</button>
            <button className="btn btn-sm btn-p" onClick={()=>{sReplyTo(replyTo===p.id?null:p.id);if(expandedPost!==p.id)loadReplies(p.id)}}>ตอบกลับ</button>
          </div>
        </div>

        {expandedPost===p.id&&<div style={{marginTop:8}}>
          {(replies[p.id]||[]).map(r=>(
            <div key={r.id} className="board-reply">
              <div style={{fontWeight:600,fontSize:12,color:'var(--primary)'}}>{r.authorName}</div>
              <div style={{marginTop:4,whiteSpace:'pre-wrap'}}>{r.content}</div>
              <div style={{fontSize:10,color:'var(--text-light)',marginTop:4}}>{r.createdAt?.toDate?.()?.toLocaleString('th-TH')||'...'}</div>
            </div>
          ))}
          {replyTo===p.id&&<div style={{marginTop:8,display:'flex',gap:8}}>
            <textarea className="ft" style={{minHeight:50,flex:1}} value={replyText} onChange={e=>sReplyText(e.target.value)} placeholder="เขียนความคิดเห็น..."/>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <button className="btn btn-sm btn-p" onClick={()=>hReply(p.id)}>ส่ง</button>
              <button className="btn btn-sm btn-o" onClick={()=>sReplyTo(null)}>ยกเลิก</button>
            </div>
          </div>}
        </div>}
      </div>
    ))}
  </div>;
}

// ===== FORM COMPONENT =====
function FormV({fd,sFD,uf}){
  const[tab,sTab]=useState('p1');
  const ss=(fd.flowSteps||[]).filter(s=>s.trim());
  const uFS=(i,v)=>sFD(p=>{const s=[...(p.flowSteps||[])];s[i]=v;return{...p,flowSteps:s}});
  const aFS=()=>sFD(p=>({...p,flowSteps:[...(p.flowSteps||[]),''],fsSaved:false}));
  const rFS=i=>sFD(p=>{const s=[...(p.flowSteps||[])];s.splice(i,1);return{...p,flowSteps:s}});
  const aC=()=>sFD(p=>({...p,cmps:[...p.cmps,{step:'',problem:'',unsafeAct:''}],cmpsSaved:false}));
  const uC=(i,f,v)=>sFD(p=>{const c=[...p.cmps];c[i]={...c[i],[f]:v};return{...p,cmps:c,cmpsSaved:false}});
  const rC=i=>sFD(p=>{const ta=p.ta.map(t=>({...t,entries:(t.entries||[]).map(e=>{if(!e.linkedTo)return e;if(e.linkedTo.type==='cmp'){if(e.linkedTo.index===i)return{...e,linkedTo:null};if(e.linkedTo.index>i)return{...e,linkedTo:{...e.linkedTo,index:e.linkedTo.index-1}}}return e})}));return{...p,cmps:p.cmps.filter((_,j)=>j!==i),ta,cmpsSaved:false}});
  const uT=(i,f,v)=>sFD(p=>{const t=[...p.ta];t[i]={...t[i],[f]:v};return{...p,ta:t}});
  const uTE=(i,ei,f,v)=>sFD(p=>{const t=[...p.ta];const es=[...(t[i].entries||[])];es[ei]={...es[ei],[f]:v};t[i]={...t[i],entries:es};return{...p,ta:t}});
  const tTCE=(i,ei,item)=>sFD(p=>{const t=[...p.ta];const es=[...(t[i].entries||[])];const c=[...(es[ei].ck||[])];const j=c.indexOf(item);j>=0?c.splice(j,1):c.push(item);es[ei]={...es[ei],ck:c};t[i]={...t[i],entries:es};return{...p,ta:t}});
  const aTE=i=>sFD(p=>{const t=[...p.ta];t[i]={...t[i],entries:[...(t[i].entries||[]),{ck:[],oc:false,ot:'',desc:'',strat:'',ind:'',tl:'',resp:'',linkedTo:null}]};return{...p,ta:t}});
  const rTE=(i,ei)=>sFD(p=>{const tid=p.ta[i].id;const ta=p.ta.map((t,ti)=>{const es=(t.entries||[]).map(e=>{if(!e.linkedTo||e.linkedTo.type!=='tier')return e;if(e.linkedTo.tierId===tid){if(e.linkedTo.entryIndex===ei)return{...e,linkedTo:null};if(e.linkedTo.entryIndex>ei)return{...e,linkedTo:{...e.linkedTo,entryIndex:e.linkedTo.entryIndex-1}}}return e});if(ti===i)return{...t,entries:es.filter((_,j)=>j!==ei)};return{...t,entries:es}});return{...p,ta}});

  return(
    <div>
      <div className="hb"><span style={{fontSize:20}}>⚠️</span><div style={{flex:1}}><strong>เตือน: ลงระบบ HRMS</strong><label style={{marginLeft:14,cursor:'pointer'}}><input type="checkbox" checked={fd.hrms} onChange={e=>uf('hrms',e.target.checked)} style={{accentColor:'var(--primary)',marginRight:6}}/>ลงในระบบ HRMS ของโรงพยาบาลแล้ว</label></div></div>
      <div className="ftb">
        <div className={`ft2 ${tab==='p1'?'ac':''}`} onClick={()=>sTab('p1')}>ตอนที่ 1: ข้อมูลเบื้องต้น</div>
        <div className={`ft2 ${tab==='p23'?'ac':''}`} onClick={()=>sTab('p23')}>ตอนที่ 2-3: จุดเปลี่ยนและปัจจัยสาเหตุ</div>
        <div className={`ft2 ${tab==='sm'?'ac':''}`} onClick={()=>sTab('sm')}>สรุปผลและติดตาม</div>
      </div>

      {tab==='p1'&&<>
        <div className="fc"><div className="fch">📋 ข้อมูลทั่วไป</div><div className="fcb">
          <div className="fr"><div className="fg"><label className="fl">หน่วยงาน/ทีมนำ <span className="rq">*</span></label><input className="fi" value={fd.department} onChange={e=>uf('department',e.target.value)} placeholder="ระบุหน่วยงาน"/></div><div className="fg"><label className="fl">วันที่จัดทำ (ปี ค.ศ.)</label><input className="fi" type="date" value={fd.date} onChange={e=>uf('date',e.target.value)}/></div></div>
          <div className="fr"><div className="fg"><label className="fl">เรื่อง <span className="rq">*</span></label><input className="fi" value={fd.title} onChange={e=>uf('title',e.target.value)} placeholder="ชื่อเหตุการณ์"/></div><div className="fg"><label className="fl">รหัสอุบัติการณ์</label><input className="fi" value={fd.incidentCode} onChange={e=>uf('incidentCode',e.target.value)} placeholder="IR-XXXX"/></div></div>
          <div className="fg"><label className="fl">ระดับความรุนแรง</label><div style={{display:'flex',gap:24,flexWrap:'wrap'}}><div><div style={{fontSize:11,color:'var(--text-light)',marginBottom:4}}>NCC MERP (A-I) <span style={{color:'var(--primary-light)'}}>- วางเมาส์เพื่อดูคำอธิบาย</span></div><div className="sg">{SEV_L.map(s=><span key={s} className="tp-wrap"><span className={`sb2 ${fd.sevL===s?'sel':''}`} onClick={()=>uf('sevL',s)}>{s}</span><span className="tp-box"><b>{s}:</b> {SEV_L_TIP[s]}</span></span>)}</div></div><div><div style={{fontSize:11,color:'var(--text-light)',marginBottom:4}}>Safety Score (1-5) <span style={{color:'var(--primary-light)'}}>- วางเมาส์เพื่อดูคำอธิบาย</span></div><div className="sg">{SEV_N.map(s=><span key={s} className="tp-wrap"><span className={`sb2 ${fd.sevN===s?'sel':''}`} onClick={()=>uf('sevN',s)}>{s}</span><span className="tp-box"><b>ระดับ {s}:</b> {SEV_N_TIP[s]}</span></span>)}</div></div></div></div>
        </div></div>
        <div className="fc"><div className="fch">📝 บรรยายสรุป</div><div className="fcb">
          <div className="fg"><label className="fl">1.1 เกิดอะไรขึ้น <span className="rq">*</span></label><textarea className="ft" style={{minHeight:120}} value={fd.whatHappened} onChange={e=>uf('whatHappened',e.target.value)} placeholder="บรรยายรายละเอียด..."/></div>
          <div className="fr3"><div className="fg"><label className="fl">1.2 เกิดที่</label><input className="fi" value={fd.where} onChange={e=>uf('where',e.target.value)}/></div><div className="fg"><label className="fl">1.3 เวลา</label><input className="fi" type="time" value={fd.when} onChange={e=>uf('when',e.target.value)}/></div><div className="fg"><label className="fl">วันที่เกิดเหตุ (ปี ค.ศ.)</label><input className="fi" type="date" value={fd.eventDate} onChange={e=>uf('eventDate',e.target.value)}/></div></div>
          <div className="fr"><div className="fg"><label className="fl">วิชาชีพที่เกี่ยวข้อง</label><textarea className="ft" value={fd.professions} onChange={e=>uf('professions',e.target.value)} placeholder="แพทย์, พยาบาล..."/></div><div className="fg"><label className="fl">หน่วยงานที่เกี่ยวข้อง</label><textarea className="ft" value={fd.relatedDepts} onChange={e=>uf('relatedDepts',e.target.value)} placeholder="ER, ICU..."/></div></div>
          <div className="fr"><div className="fg"><label className="fl">กลุ่ม/หน่วยงานหลักที่แก้ไข</label><input className="fi" value={fd.mainFixDept} onChange={e=>uf('mainFixDept',e.target.value)} placeholder="ระบุกลุ่ม/หน่วยงานหลักที่รับผิดชอบแก้ไข"/></div><div className="fg"><label className="fl">กลุ่ม/หน่วยงานร่วมที่แก้ไข</label><input className="fi" value={fd.subFixDept} onChange={e=>uf('subFixDept',e.target.value)} placeholder="ระบุกลุ่ม/หน่วยงานร่วมที่เกี่ยวข้องในการแก้ไข"/></div></div>
        </div></div>
        <div className="fc"><div className="fch">👥 ผู้เข้าร่วมการทำ RCA</div><div className="fcb">
          <div className="fg"><label className="fl">ผู้เข้าร่วมการทำ RCA</label><textarea className="ft" style={{minHeight:80}} value={fd.rcaParticipants} onChange={e=>uf('rcaParticipants',e.target.value)} placeholder="ระบุชื่อ-นามสกุล ตำแหน่ง ของผู้เข้าร่วม (คนละบรรทัด)"/></div>
          <div className="fr"><div className="fg"><label className="fl">วันที่ทำ RCA (ปี ค.ศ.)</label><input className="fi" type="date" value={fd.rcaDate} onChange={e=>uf('rcaDate',e.target.value)}/></div><div className="fg"><label className="fl">เวลาทำ RCA</label><input className="fi" type="time" value={fd.rcaTime} onChange={e=>uf('rcaTime',e.target.value)}/></div></div>
        </div></div>
      </>}

      {tab==='p23'&&<>
        <div className="fc"><div className="fch" style={{justifyContent:'space-between'}}><span>🔄 ตอนที่ 2: Care Process / Flow of Steps</span><div style={{display:'flex',gap:6}}><button className="btn btn-sm" style={{background:'rgba(255,255,255,0.2)',color:'#fff',border:'none'}} onClick={aFS}>+ เพิ่มขั้นตอน</button><button className="btn btn-sm" style={{background:'#27ae60',color:'#fff',border:'none'}} onClick={()=>uf('fsSaved',true)}>💾 บันทึกขั้นตอน</button></div></div>
        <div className="fcb">
          <div style={{fontSize:12,color:'var(--text-light)',marginBottom:10}}>ระบุขั้นตอนกระบวนการดูแล/กระบวนการหลักที่เกี่ยวข้อง (เรียงลำดับ)</div>
          <div className="fse">{(fd.flowSteps||[]).map((s,i)=>(
            <React.Fragment key={i}>{i>0&&<span className="fa">→</span>}<div style={{position:'relative'}}><input className={`fsb ${fd.fsSaved&&s.trim()?'sv':''}`} value={s} onChange={e=>uFS(i,e.target.value)} placeholder={`ขั้นตอนที่ ${i+1}`} style={{paddingRight:22}}/>{(fd.flowSteps||[]).length>2&&<span style={{position:'absolute',right:4,top:5,cursor:'pointer',fontSize:12,color:'#999',lineHeight:1}} onClick={()=>rFS(i)}>✕</span>}</div></React.Fragment>
          ))}</div>
          {fd.fsSaved&&ss.length>0&&<div style={{marginTop:8,fontSize:12,color:'var(--success)'}}>บันทึกแล้ว {ss.length} ขั้นตอน</div>}
        </div></div>

        <div className="fc"><div className="fch" style={{justifyContent:'space-between'}}><span>⚡ Care Management Problems (CMPs)</span><div style={{display:'flex',gap:6}}><button className="btn btn-sm" style={{background:'rgba(255,255,255,0.2)',color:'#fff',border:'none'}} onClick={aC}>+ เพิ่ม CMP</button><button className="btn btn-sm" style={{background:'#27ae60',color:'#fff',border:'none'}} onClick={()=>uf('cmpsSaved',true)}>💾 บันทึก CMP</button></div></div>
        <div className="fcb">{fd.cmpsSaved&&<div style={{marginBottom:10,fontSize:12,color:'var(--success)'}}>บันทึก CMP แล้ว {(fd.cmps||[]).filter(c=>c.step||c.problem||c.unsafeAct).length} รายการ</div>}{(fd.cmps||[]).map((c,i)=>(
          <div key={i} style={{padding:14,border:'1px solid var(--border)',borderRadius:8,marginBottom:10,background:'#fafbfc'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><strong style={{fontSize:13,color:'var(--primary)'}}>CMP #{i+1}</strong>{fd.cmps.length>1&&<button className="btn btn-sm btn-d" onClick={()=>rC(i)}>✕</button>}</div>
            <div className="fr3">
              <div className="fg"><label className="fl">ขั้นตอน (จาก Flow of Steps)</label><select className="fs" value={c.step} onChange={e=>uC(i,'step',e.target.value)}><option value="">เลือกขั้นตอน</option>{ss.map(s=><option key={s} value={s}>{s}</option>)}</select>{ss.length===0&&<div style={{fontSize:11,color:'var(--accent)',marginTop:3}}>* กรุณาบันทึก Flow of Steps ก่อน</div>}</div>
              <div className="fg"><label className="fl">ปัญหา (CMP)</label><textarea className="ft" style={{minHeight:60}} value={c.problem} onChange={e=>uC(i,'problem',e.target.value)} placeholder="ระบุปัญหา..."/></div>
              <div className="fg"><label className="fl">Unsafe Act / Potential Change</label><textarea className="ft" style={{minHeight:60}} value={c.unsafeAct} onChange={e=>uC(i,'unsafeAct',e.target.value)} placeholder="จุดเปลี่ยน..."/></div>
            </div>
          </div>
        ))}</div></div>

        <div style={{margin:'16px 0 10px',display:'flex',alignItems:'center',gap:10}}><h3 style={{fontSize:15,fontWeight:700,color:'var(--primary-dark)'}}>🔍 ตอนที่ 3: ปัจจัยสาเหตุ (Contributing Factors)</h3></div>
        <div style={{fontSize:12,color:'var(--text-light)',marginBottom:12}}>เลือก ☑ ที่หัวข้อ Tier ที่เกี่ยวข้อง แล้วกด ▼ เพื่อขยายรายละเอียด เฉพาะ Tier ที่เลือกจะแสดงใน Export</div>
        {TD.map((tier,idx)=>{const td=fd.ta[idx]||{};const hd=td.en&&(td.entries||[]).some(e=>e.desc||(e.ck||[]).length>0||(e.oc&&e.ot));return<TC key={tier.id} tier={tier} idx={idx} td={td} hd={!!hd} fd={fd} uT={uT} uTE={uTE} tTCE={tTCE} aTE={aTE} rTE={rTE}/>})}
      </>}

      {tab==='sm'&&<SummaryTab fd={fd} uf={uf}/>}
    </div>
  );
}

// ===== LINKAGE DIAGRAM =====
function LinkageDiagram({fd}){
  const ss=(fd.flowSteps||[]).filter(s=>s.trim());
  const cmps=(fd.cmps||[]).filter(c=>c.step||c.problem||c.unsafeAct);
  if(!ss.length)return<div style={{color:'var(--text-light)',fontSize:13,padding:'8px 12px',background:'#f8f9fa',borderRadius:6}}>ยังไม่มีข้อมูล Flow of Steps จากตอนที่ 2</div>;
  const cols=ss.length,LW=130,CW=Math.max(140,Math.min(180,900/cols)),BW=CW-16,BH=78,TRH=98,UAH=98,FSH=98;
  const W=LW+cols*CW+10,H=5*TRH+UAH+FSH;
  const tY=n=>(5-n)*TRH,uY=5*TRH,fY=uY+UAH,cX=i=>LW+i*CW+CW/2;
  const gT=n=>{const r=[];(fd.ta||[]).forEach((t,i)=>{if(!t.en||TD[i].tier!==n)return;(t.entries||[]).forEach(e=>{if(e.desc||(e.ck||[]).length>0||(e.oc&&e.ot))r.push({...e,info:TD[i]})})});return r};
  const gTx=t=>{const ck=[...(t.ck||[])];if(t.oc&&t.ot)ck.push(t.ot);const parts=[];if(ck.length)parts.push(ck.join(', '));if(t.desc)parts.push(t.desc);return parts.join(' ')||''};
  const cm={};cmps.forEach(c=>{const i=ss.indexOf(c.step);if(i>=0)cm[i]=c});
  const cc=Object.keys(cm).map(Number);
  const resCol=(e)=>{if(!e.linkedTo)return null;if(e.linkedTo.type==='cmp'){const c=(fd.cmps||[])[e.linkedTo.index];return c?ss.indexOf(c.step):-1}if(e.linkedTo.type==='tier'){const tt=(fd.ta||[]).find(t=>t.id===e.linkedTo.tierId);const te=tt?.entries?.[e.linkedTo.entryIndex];return te?resCol(te):null}return null};
  const tp={};
  [5,4,3,2,1].forEach(n=>{const it=gT(n);tp[n]=[];if(!it.length)return;it.forEach((t,i)=>{const rc=resCol(t);const col=rc!=null&&rc>=0?rc:Math.min(Math.round(i*cols/it.length+cols/(it.length*2)-.5),cols-1);tp[n].push({...t,col})})});
  const ln=[];
  cc.forEach(i=>{ln.push({x1:cX(i),y1:uY+UAH/2+BH/2,x2:cX(i),y2:fY+FSH/2-BH/2})});
  const findTarget=(t,n)=>{
    if(t.linkedTo){
      if(t.linkedTo.type==='cmp'){const ci=ss.indexOf((fd.cmps||[])[t.linkedTo.index]?.step);if(ci>=0)return{x:cX(ci),y:uY+UAH/2-BH/2}}
      if(t.linkedTo.type==='tier'){const tti=(fd.ta||[]).findIndex(x=>x.id===t.linkedTo.tierId);if(tti>=0){const ttn=TD[tti].tier;const items=tp[ttn]||[];const te=items.find(x=>x.linkedTo?.type===t.linkedTo.type&&JSON.stringify(x.linkedTo)===JSON.stringify((fd.ta[tti].entries||[])[t.linkedTo.entryIndex]?.linkedTo))||items[t.linkedTo.entryIndex];if(te)return{x:cX(te.col),y:tY(ttn)+TRH/2-BH/2}}}
    }
    for(let b=n-1;b>=1;b--)if((tp[b]||[]).length){let nr=tp[b][0],md=999;tp[b].forEach(bt=>{const d=Math.abs(bt.col-t.col);if(d<md){md=d;nr=bt}});return{x:cX(nr.col),y:tY(b)+TRH/2-BH/2}}
    if(cc.length){let nc=cc[0],md=999;cc.forEach(ci=>{const d=Math.abs(ci-t.col);if(d<md){md=d;nc=ci}});return{x:cX(nc),y:uY+UAH/2-BH/2}}
    return null;
  };
  [5,4,3,2,1].forEach(n=>{(tp[n]||[]).forEach(t=>{const tgt=findTarget(t,n);if(tgt)ln.push({x1:cX(t.col),y1:tY(n)+TRH/2+BH/2,x2:tgt.x,y2:tgt.y})})});
  const TL={5:{n:'Tier 5',s:['สังคม/นอกองค์กร']},4:{n:'Tier 4',s:['การบริหารจัดการ','นโยบาย']},3:{n:'Tier 3',s:['สวล.,ข้อมูล','ระบบ']},2:{n:'Tier 2',s:['ลักษณะงาน','ทีม']},1:{n:'Tier 1',s:['ผู้ป่วย','บุคลากร']}};
  const bx=(x,y,w,h,t,fs)=><g><rect x={x} y={y} width={w} height={h} rx={5} fill="#fff" stroke="#444" strokeWidth={1.5}/><foreignObject x={x+3} y={y+1} width={w-6} height={h-2}><div style={{fontSize:fs||11,textAlign:'center',lineHeight:'1.35',overflow:'hidden',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',wordBreak:'break-word'}}><span style={{display:'-webkit-box',WebkitLineClamp:4,WebkitBoxOrient:'vertical',overflow:'hidden',textOverflow:'ellipsis'}}>{t}</span></div></foreignObject></g>;
  return<div style={{overflowX:'auto',margin:'8px 0',border:'1px solid var(--border)',borderRadius:8,background:'#fff'}}>
    <svg width={W} height={H} style={{fontFamily:'Sarabun,Noto Sans Thai,sans-serif',display:'block'}}>
      <defs><marker id="la" viewBox="0 0 10 10" refX={9} refY={5} markerWidth={6} markerHeight={6} orient="auto"><path d="M0 0L10 5L0 10z" fill="#555"/></marker><marker id="lr" viewBox="0 0 10 10" refX={9} refY={5} markerWidth={6} markerHeight={6} orient="auto"><path d="M0 0L10 5L0 10z" fill="#444"/></marker></defs>
      <rect x={0} y={0} width={W} height={5*TRH} fill="#d6e4ee"/>
      <rect x={0} y={uY} width={W} height={UAH} fill="#dcedc8"/>
      <rect x={0} y={fY} width={W} height={FSH} fill="#fce4cc"/>
      {[5,4,3,2,1].map(n=><line key={n} x1={LW-10} y1={tY(n)} x2={W} y2={tY(n)} stroke="#b0c4d8" strokeWidth={.7}/>)}
      <line x1={0} y1={uY} x2={W} y2={uY} stroke="#888" strokeWidth={1}/>
      <line x1={0} y1={fY} x2={W} y2={fY} stroke="#888" strokeWidth={1}/>
      <text x={14} y={5*TRH/2} fontSize={13} fontWeight={700} fill="#1a5276" textAnchor="middle" transform={`rotate(-90,14,${5*TRH/2})`}>Contributing factors</text>
      {[5,4,3,2,1].map(n=><g key={`l${n}`}><text x={28} y={tY(n)+22} fontSize={11} fontWeight={700} fill="#1a5276">{TL[n].n}</text>{TL[n].s.map((s,j)=><text key={j} x={28} y={tY(n)+36+j*14} fontSize={10} fill="#2980b9">{s}</text>)}</g>)}
      <text x={8} y={uY+22} fontSize={10} fontWeight={700} fill="#33691e">Unsafe act/</text>
      <text x={8} y={uY+36} fontSize={10} fontWeight={700} fill="#33691e">Potential change</text>
      <text x={8} y={fY+20} fontSize={10} fontWeight={700} fill="#c0392b">Flow of steps</text>
      <text x={8} y={fY+34} fontSize={9} fill="#c0392b">Care process /</text>
      <text x={8} y={fY+46} fontSize={9} fill="#c0392b">กระบวนการหลัก</text>
      {ln.map((l,i)=><line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke="#555" strokeWidth={1.2} markerEnd="url(#la)"/>)}
      {ss.map((s,i)=>{const x=cX(i)-BW/2,y=fY+(FSH-BH)/2;return<g key={`f${i}`}>{bx(x,y,BW,BH,s)}{i<ss.length-1&&<line x1={x+BW+2} y1={y+BH/2} x2={cX(i+1)-BW/2-2} y2={y+BH/2} stroke="#444" strokeWidth={1.5} markerEnd="url(#lr)"/>}</g>})}
      {cc.map(i=><React.Fragment key={`c${i}`}>{bx(cX(i)-BW/2,uY+(UAH-BH)/2,BW,BH,cm[i].unsafeAct||cm[i].problem||'')}</React.Fragment>)}
      {[5,4,3,2,1].map(n=>(tp[n]||[]).map((t,j)=><React.Fragment key={`t${n}${j}`}>{bx(cX(t.col)-BW/2,tY(n)+(TRH-BH)/2,BW,BH,gTx(t))}</React.Fragment>))}
    </svg>
  </div>;
}

function TC({tier,idx,td,hd,fd,uT,uTE,tTCE,aTE,rTE}){

  (fd.ta||[]).forEach((t,ti)=>{if(!t.en)return;const info=TD[ti];if(info.tier>curTier||(info.tier===curTier&&t.id===td.id))return;(t.entries||[]).forEach((te,tei)=>{const ck=[...(te.ck||[])];const txt=te.desc||ck.slice(0,2).join(', ')||'';if(!txt)return;linkOpts.push({val:JSON.stringify({type:'tier',tierId:t.id,entryIndex:tei}),label:`${info.label} #${tei+1}: ${txt.length>30?txt.slice(0,30)+'…':txt}`})})});

    if(c1.current){if(h1.current)h1.current.destroy();const ctx=c1.current.getContext('2d');const m={};rl.forEach(r=>{const k=r.date?r.date.substring(0,7):'N/A';m[k]=(m[k]||0)+1});const l=Object.keys(m).sort();h1.current=new Chart(ctx,{type:'bar',data:{labels:l.length?l:['ไม่มีข้อมูล'],datasets:[{label:'RCA',data:l.length?l.map(k=>m[k]):[0],backgroundColor:'rgba(26,82,118,0.7)',borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}})}
    if(c2.current){if(h2.current)h2.current.destroy();const ctx=c2.current.getContext('2d');const s={};rl.forEach(r=>{const k=r.sevL||'N/A';s[k]=(s[k]||0)+1});h2.current=new Chart(ctx,{type:'doughnut',data:{labels:Object.keys(s),datasets:[{data:Object.values(s),backgroundColor:['#e74c3c','#e67e22','#f1c40f','#27ae60','#2980b9','#8e44ad','#95a5a6','#34495e','#1abc9c']}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}})}
    return()=>{if(h1.current)h1.current.destroy();if(h2.current)h2.current.destroy()};

    <div className="fc"><div className="fch">📈 ความคืบหน้า</div><div className="fcb">

      <div><div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}><span>ติดตามรายเดือน</span><span style={{fontWeight:700}}>{fp}%</span></div><div style={{background:'#eee',borderRadius:10,height:12,overflow:'hidden'}}><div style={{width:`${fp}%`,height:'100%',background:'var(--primary-light)',borderRadius:10,transition:'width 0.5s'}}></div></div></div>

// ===== MAIN APP =====
function App(){
  const[user,setUser]=useState(null);
  const[userData,setUserData]=useState(undefined);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState('');
  const[allUsers,setAllUsers]=useState([]);

  // Main app state
  const[nav,sN]=useState('form');
  const[rl,sRL]=useState([]);
  const[ci,sCI]=useState(null);
  const[fd,sFD]=useState({...DF,ta:mkTD()});
  const[toast,sT]=useState(null);
  const[sbCol,sSbCol]=useState(false);
  const[sch,sSch]=useState([]);

  const st=m=>{sT(m);setTimeout(()=>sT(null),3000)};
  const uf=(f,v)=>sFD(p=>({...p,[f]:v}));
  const isAdmin=user&&user.email===ADMIN_EMAIL;

  // Listen auth state
  useEffect(()=>{
    return auth.onAuthStateChanged(async(u)=>{
      setUser(u);
      if(u){
        const unsub=db.collection('users').doc(u.uid).onSnapshot(doc=>{
          setUserData(doc.exists?{id:doc.id,...doc.data()}:null);
          setLoading(false);
        });
        return()=>unsub();
      }else{
        setUserData(undefined);
        setLoading(false);
      }
    });
  },[]);

  // Admin: listen all users
  useEffect(()=>{
    if(!user||user.email!==ADMIN_EMAIL)return;
    const unsub=db.collection('users').onSnapshot(snap=>{
      setAllUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return()=>unsub();
  },[user]);

  // Load RCA records from Firestore
  useEffect(()=>{
    if(!user||!userData||userData.status!=='approved')return;
    let q;
    if(user.email===ADMIN_EMAIL){
      q=db.collection('rca').orderBy('savedAt','desc');
    }else{
      q=db.collection('rca').where('ownerUid','==',user.uid).orderBy('savedAt','desc');
    }
    const unsub=q.onSnapshot(snap=>{
      sRL(snap.docs.map(d=>({id:d.id,...d.data()})));
    },err=>{
      console.error('RCA load error:',err);
      // Fallback without orderBy if index not ready
      let q2;
      if(user.email===ADMIN_EMAIL){
        q2=db.collection('rca');
      }else{
        q2=db.collection('rca').where('ownerUid','==',user.uid);
      }
      q2.get().then(snap=>{
        sRL(snap.docs.map(d=>({id:d.id,...d.data()})));
      });
    });
    return()=>unsub();
  },[user,userData]);

  // Load schedules from Firestore
  useEffect(()=>{
    if(!user||!userData||userData.status!=='approved')return;
    const unsub=db.collection('schedules').onSnapshot(snap=>{
      sSch(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return()=>unsub();
  },[user,userData]);

  // Login
  const handleLogin=async()=>{
    setError('');
    try{
      const result=await auth.signInWithPopup(googleProvider);
      const email=result.user.email;
      if(!email.endsWith('@up.ac.th')){
        await auth.signOut();
        setError('กรุณาใช้อีเมล @up.ac.th เท่านั้น');
        return;
      }
      if(email===ADMIN_EMAIL){
        const doc=await db.collection('users').doc(result.user.uid).get();
        if(!doc.exists){
          await db.collection('users').doc(result.user.uid).set({
            email,fullName:'Admin',department:'บริหารความเสี่ยง',
            status:'approved',role:'admin',
            createdAt:firebase.firestore.FieldValue.serverTimestamp()
          });
        }else if(doc.data().status!=='approved'){
          await db.collection('users').doc(result.user.uid).update({
            status:'approved',role:'admin'
          });
        }
      }
    }catch(e){
      if(e.code==='auth/popup-closed-by-user')return;
      setError('เกิดข้อผิดพลาด: '+e.message);
    }
  };

  // Register
  const handleRegister=async(data)=>{
    await db.collection('users').doc(user.uid).set({
      email:user.email,
      ...data,
      status:'pending',
      role:'user',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  };

  // Admin approve/reject
  const handleApprove=async(uid)=>{
    await db.collection('users').doc(uid).update({status:'approved',approvedAt:firebase.firestore.FieldValue.serverTimestamp()});
  };
  const handleReject=async(uid)=>{
    if(confirm('ปฏิเสธผู้ใช้นี้?'))await db.collection('users').doc(uid).update({status:'rejected'});
  };

  // Logout
  const handleLogout=()=>{auth.signOut()};

  // RCA actions
  const hNew=()=>{sCI(null);sFD({...DF,ta:mkTD()});sN('form')};
  const hSave=async()=>{
    const docData={...fd,savedAt:new Date().toISOString(),status:'draft',ownerUid:user.uid,ownerEmail:user.email,ownerName:userData.fullName};
    // Remove firestore-incompatible undefined values
    Object.keys(docData).forEach(k=>{if(docData[k]===undefined)docData[k]=null});
    try{
      if(ci){
        await db.collection('rca').doc(ci).set(docData,{merge:true});
      }else{
        const ref=await db.collection('rca').add(docData);
        sCI(ref.id);
      }
      st('บันทึก RCA เรียบร้อย');
    }catch(e){
      st('เกิดข้อผิดพลาด: '+e.message);
    }
  };
  const hLoad=r=>{sCI(r.id);sFD({...DF,...r,ta:(r.ta||mkTD()).map(migTier)});sN('form')};
  const hExp=f2=>{const w=window.open('','_blank');w.document.write(bExp(fd,f2));w.document.close();st(f2==='pdf'?'เปิดหน้า PDF':'เปิด Word')};

  // Schedule actions (Firestore)
  const schSave=(newSch)=>{
    // Sync to Firestore
    const last=newSch[newSch.length-1];
    if(last&&!last._synced){
      // Find items that need create/update
      newSch.forEach(s=>{
        if(!s._synced){
          const docData={...s,ownerUid:user.uid};
          delete docData._synced;
          if(s.id&&s.id.startsWith('SCH-')){
            // New item - use auto ID
            const sid=s.id;
            db.collection('schedules').doc(sid).set(docData);
          }else{
            db.collection('schedules').doc(s.id).set(docData,{merge:true});
          }
        }
      });
    }
    sSch(newSch);
  };
  const schSetWrapper=(fn)=>{
    if(typeof fn==='function'){
      sSch(prev=>{
        const newSch=fn(prev);
        // Sync changes to Firestore
        newSch.forEach(s=>{
          const docData={...s,ownerUid:user.uid};
          db.collection('schedules').doc(s.id).set(docData,{merge:true}).catch(()=>{});
        });
        // Delete removed items
        const newIds=new Set(newSch.map(s=>s.id));
        prev.forEach(s=>{
          if(!newIds.has(s.id)){
            db.collection('schedules').doc(s.id).delete().catch(()=>{});
          }
        });
        return newSch;
      });
    }else{
      sSch(fn);
    }
  };

  const stats={total:rl.length,hrms:rl.filter(r=>r.hrms).length,fu:rl.filter(r=>r.followUpStatus==='completed').length};

  // Loading
  if(loading)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'var(--text-light)'}}>กำลังโหลด...</div>;

  // Not logged in
  if(!user)return<LoginPage onLogin={handleLogin} error={error}/>;

  // Logged in but no user doc or pending
  if(!userData||userData.status==='pending'){
    return<PendingPage user={user} userData={userData} onSubmitReg={handleRegister} onLogout={handleLogout}/>;
  }

  // Rejected
  if(userData.status==='rejected'){
    return<div className="pending-page"><div className="pending-card"><div style={{fontSize:48}}>❌</div><h2>คำขอถูกปฏิเสธ</h2><p>กรุณาติดต่อ Admin</p><button className="btn btn-o" onClick={handleLogout}>ออกจากระบบ</button></div></div>;
  }

  // Approved - show main app
  const navTitle={form:'📋 แบบฟอร์มบันทึก RCA',list:'📁 รายการ RCA',cal:'📅 ปฏิทินกำหนดทำ RCA',kb:'📚 ความรู้ RCA',db:'📊 Dashboard',admin:'👑 จัดการผู้ใช้',board:'💬 กระดานแลกเปลี่ยน'};

  return(
    <div className="app-with-bar">
      {/* User bar */}
      <div className="user-bar">
        <div className="user-info">
          {user.photoURL&&<img src={user.photoURL} alt=""/>}
          <span><strong>{userData.fullName}</strong> ({userData.department}){isAdmin&&<span className="admin-badge">ADMIN</span>}</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--text-light)'}}>{user.email}</span>
          <button className="btn btn-sm btn-o" onClick={handleLogout}>ออกจากระบบ</button>
        </div>
      </div>

      <div className="app-body">
        {/* Sidebar */}
        <div className={`sb ${sbCol?'collapsed':''}`}>
          <div className="sb-h"><h1>🏥 RCA Management System</h1><div className="st">โรงพยาบาลมหาวิทยาลัยพะเยา</div></div>
          <div className="sb-n">
            <div className="ns">แบบฟอร์ม</div>
            <div className={`ni ${nav==='form'?'ac':''}`} onClick={()=>sN('form')}><span className="ni-i">📋</span><span>แบบฟอร์ม RCA</span></div>
            <div className={`ni ${nav==='list'?'ac':''}`} onClick={()=>sN('list')}><span className="ni-i">📁</span><span>รายการ RCA</span>{rl.length>0&&<span className="ni-b">{rl.length}</span>}</div>
            <div className="ns">เครื่องมือ</div>
            <div className={`ni ${nav==='cal'?'ac':''}`} onClick={()=>sN('cal')}><span className="ni-i">📅</span><span>ปฏิทินกำหนด RCA</span></div>
            <div className={`ni ${nav==='kb'?'ac':''}`} onClick={()=>sN('kb')}><span className="ni-i">📚</span><span>ความรู้ RCA</span></div>
            <div className={`ni ${nav==='board'?'ac':''}`} onClick={()=>sN('board')}><span className="ni-i">💬</span><span>กระดานแลกเปลี่ยน</span></div>
            <div className="ns">รายงาน</div>
            <div className={`ni ${nav==='db'?'ac':''}`} onClick={()=>sN('db')}><span className="ni-i">📊</span><span>Dashboard</span></div>
            {isAdmin&&<><div className="ns">ผู้ดูแลระบบ</div>
            <div className={`ni ${nav==='admin'?'ac':''}`} onClick={()=>sN('admin')}><span className="ni-i">👑</span><span>จัดการผู้ใช้</span>{allUsers.filter(u=>u.status==='pending').length>0&&<span className="ni-b">{allUsers.filter(u=>u.status==='pending').length}</span>}</div></>}
            <div className="ns">ระบบภายนอก</div>
            <div className="ni" onClick={()=>window.open('https://hrms59.thai-nrls.org/HRMS41347/Account/Login','_blank')}><span className="ni-i">🔗</span><span>ระบบ HRMS</span></div>
          </div>
          <div className="sb-toggle" onClick={()=>sSbCol(!sbCol)}>{sbCol?'▶':'◀'}</div>
        </div>

        {/* Main content */}
        <div className="mc">
          <div className="ch">
            <h2>{navTitle[nav]||''}</h2>
            <div className="ha">
              {nav==='form'&&<><button className="btn btn-o btn-sm" onClick={hNew}>➕ ใหม่</button><button className="btn btn-p btn-sm" onClick={hSave}>💾 บันทึก</button><button className="btn btn-w btn-sm" onClick={()=>hExp('pdf')}>📄 PDF</button><button className="btn btn-s btn-sm" onClick={()=>hExp('word')}>📝 Word</button></>}
              {nav==='list'&&<button className="btn btn-p btn-sm" onClick={hNew}>➕ ใหม่</button>}
            </div>
          </div>
          <div className="cb">
            {nav==='form'&&<FormV fd={fd} sFD={sFD} uf={uf}/>}
            {nav==='list'&&<ListV rl={rl} onL={hLoad} onN={hNew} sRL={sRL}/>}
            {nav==='cal'&&<CalV sch={sch} sSch={schSetWrapper} st={st}/>}
            {nav==='kb'&&<KBV/>}
            {nav==='db'&&<DBV stats={stats} rl={rl}/>}
            {nav==='board'&&<BoardV user={user} userData={userData} isAdmin={isAdmin}/>}
            {nav==='admin'&&isAdmin&&<AdminPanel users={allUsers} onApprove={handleApprove} onReject={handleReject}/>}
          </div>
        </div>
      </div>
      {toast&&<div className="toast">{toast}</div>}
      {/* Footer */}
      <div style={{textAlign:'center',padding:'12px 20px',fontSize:11,color:'var(--text-light)',borderTop:'1px solid var(--border)',background:'#fff'}}>
        RCA Management System | Initiated by <strong>PhatcharaponUd</strong> | โรงพยาบาลมหาวิทยาลัยพะเยา
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
