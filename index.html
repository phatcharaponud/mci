<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบอุบัติเหตุหมู่ (MCI) - Mass Casualty Incident</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ====== CONFIG ======
const GOOGLE_SCRIPT_URL = "";

// ====== STORAGE HELPERS (localStorage for GitHub Pages) ======
const store = {
  async get(key) {
    try { const r = localStorage.getItem('mci_' + key); return r ? JSON.parse(r) : null; } catch { return null; }
  },
  async set(key, val) {
    try { localStorage.setItem('mci_' + key, JSON.stringify(val)); } catch (e) { console.error("Storage error:", e); }
  },
  async list(prefix) {
    try { 
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k.startsWith('mci_' + (prefix || ''))) keys.push(k.replace('mci_', ''));
      }
      return keys;
    } catch { return []; }
  },
  async delete(key) {
    try { localStorage.removeItem('mci_' + key); } catch {}
  }
};
const createEmptyMCI = () => ({
  id: Date.now().toString(),
  name: "",
  location: "",
  date: new Date().toLocaleString("th-TH"),
  status: "open",
  patients: [],
  ambulances: [],
  hospitals: [],
  fleetSources: [],
  blood: { A: 0, B: 0, AB: 0, O: 0 },
  ventilators: { ER: { vent: 0, bird: 0 }, center: { vent: 0, bird: 0 } }
});

const createEmptyPatient = () => ({
  id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
  scene: "",
  triage: "แดง",
  name: "ไม่ทราบชื่อ",
  hn: "-",
  age: "-",
  edTriage: "",
  diagnosis: "",
  status: "",
  destination: "",
  o2: "",
  arrival: new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" }),
  disp: "-",
  blood: "-",
  note: "",
  transferVehicleId: "",
  referHospital: ""
});

const TRIAGE_COLORS = {
  "แดง": { bg: "#DC2626", label: "Critical", text: "#fff" },
  "เหลือง": { bg: "#EAB308", label: "Urgent", text: "#000" },
  "เขียว": { bg: "#16A34A", label: "Minor", text: "#fff" },
  "ดำ": { bg: "#1F2937", label: "Deceased", text: "#fff" }
};

const STATUS_OPTIONS = ["Admit", "X-Ray", "CT", "OR", "D/C", "Refer", "Dead", "กำลังตรวจรักษา"];
const VEHICLE_STATUSES = ["รอรับผู้ป่วย", "กำลังส่งต่อ", "ส่งเสร็จแล้ว", "กลับมาแล้ว"];

// ====== EFFECTIVE TRIAGE LOGIC ======
const getEffectiveTriage = (patient) => {
  if (patient.edTriage && patient.edTriage.trim() !== "" && Object.keys(TRIAGE_COLORS).includes(patient.edTriage)) {
    return patient.edTriage;
  }
  return patient.triage;
};

const getTriageCounts = (patients) => {
  const counts = { "แดง": 0, "เหลือง": 0, "เขียว": 0, "ดำ": 0 };
  patients.forEach(p => { const t = getEffectiveTriage(p); if (counts[t] !== undefined) counts[t]++; });
  return counts;
};

const getPatientsByTriageColor = (patients, color) => patients.filter(p => getEffectiveTriage(p) === color);

// ====== STYLES ======
const font = `'Sarabun', 'Noto Sans Thai', sans-serif`;
const inputStyle = { width: "100%", padding: "8px 12px", borderRadius: 6, border: "1px solid #CBD5E1", fontSize: 14, fontFamily: font, boxSizing: "border-box" };
const selectStyle = { ...inputStyle, background: "#fff" };
const btnPrimary = { padding: "8px 20px", background: "#DC2626", color: "#fff", border: "none", borderRadius: 6, fontWeight: 700, cursor: "pointer", fontSize: 14 };
const btnSecondary = { ...btnPrimary, background: "#475569" };
const btnSuccess = { ...btnPrimary, background: "#16A34A" };
const btnWarning = { ...btnPrimary, background: "#EA580C" };

// ====== SMALL COMPONENTS ======
function TriageBadge({ triage, size = "sm" }) {
  const c = TRIAGE_COLORS[triage] || TRIAGE_COLORS["แดง"];
  const s = size === "sm" ? { padding: "2px 12px", fontSize: 12 } : { padding: "4px 16px", fontSize: 14 };
  return <span style={{ ...s, background: c.bg, color: c.text, borderRadius: 4, fontWeight: 700, display: "inline-block" }}>{triage}</span>;
}

function StatusBadge({ status }) {
  const colorMap = { Admit: { bg: "#16A34A", text: "#fff" }, "X-Ray": { bg: "#2563EB", text: "#fff" }, CT: { bg: "#7C3AED", text: "#fff" }, OR: { bg: "#DB2777", text: "#fff" }, "D/C": { bg: "#64748B", text: "#fff" }, Refer: { bg: "#EA580C", text: "#fff" }, Dead: { bg: "#1F2937", text: "#fff" }, "กำลังตรวจรักษา": { bg: "#F59E0B", text: "#000" } };
  const c = colorMap[status] || { bg: "#94A3B8", text: "#fff" };
  return status ? <span style={{ padding: "3px 14px", background: c.bg, color: c.text, borderRadius: 4, fontSize: 12, fontWeight: 600 }}>{status}</span> : null;
}

function Modal({ open, onClose, title, children, width = 560 }) {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.5)" }} onClick={onClose}>
      <div style={{ background: "#fff", borderRadius: 12, padding: 24, width, maxWidth: "95vw", maxHeight: "90vh", overflow: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#1E293B" }}>{title}</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#64748B" }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function FormField({ label, children }) {
  return <div style={{ marginBottom: 12 }}><label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#475569", marginBottom: 4 }}>{label}</label>{children}</div>;
}

// ====== TRIAGE SUMMARY CARDS ======
function TriageSummaryCards({ patients, onClickColor, activeColor }) {
  const counts = getTriageCounts(patients);
  const total = patients.length;
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        {Object.entries(TRIAGE_COLORS).map(([key, val]) => {
          const isActive = activeColor === key;
          return (
            <div key={key} onClick={() => onClickColor && onClickColor(isActive ? null : key)} style={{
              background: val.bg, color: val.text, borderRadius: 12, padding: "14px 28px", textAlign: "center", minWidth: 120, flex: 1,
              boxShadow: isActive ? `0 0 0 4px #fff, 0 0 0 7px ${val.bg}, 0 8px 24px rgba(0,0,0,0.3)` : "0 2px 8px rgba(0,0,0,0.15)",
              cursor: "pointer", transform: isActive ? "scale(1.05)" : "scale(1)", transition: "all 0.2s ease", position: "relative"
            }}>
              <div style={{ fontSize: 42, fontWeight: 900, lineHeight: 1.1 }}>{counts[key]}</div>
              <div style={{ fontSize: 14, fontWeight: 600, opacity: 0.95 }}>{key} ({val.label})</div>
              {isActive && <div style={{ position: "absolute", bottom: -6, left: "50%", transform: "translateX(-50%)", width: 0, height: 0, borderLeft: "8px solid transparent", borderRight: "8px solid transparent", borderTop: `8px solid ${val.bg}` }} />}
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, padding: "6px 12px", background: "#fff", borderRadius: 8, border: "1px solid #E2E8F0" }}>
        <span style={{ fontSize: 13, color: "#64748B" }}>
          {activeColor ? `กำลังแสดง: ${activeColor} (${counts[activeColor]} ราย)` : "รวมทั้งหมด"}
          {!activeColor && <span style={{ fontWeight: 700, color: "#1E293B", marginLeft: 4 }}>{total} ราย</span>}
          {activeColor && <span style={{ marginLeft: 8, fontSize: 12, color: "#94A3B8" }}>กดอีกครั้งเพื่อแสดงทั้งหมด</span>}
        </span>
        <span style={{ fontSize: 12, color: "#94A3B8" }}>อ้างอิง: {patients.some(p => p.edTriage && p.edTriage.trim()) ? "ED Triage (ถ้ามี)" : "Scene Triage"}</span>
      </div>
    </div>
  );
}

// ====== FILTERED PATIENT LIST ======
function FilteredPatientPanel({ patients, color, onClose, onEditPatient }) {
  const filtered = getPatientsByTriageColor(patients, color);
  const ti = TRIAGE_COLORS[color];
  return (
    <div style={{ background: "#fff", borderRadius: 12, border: `2px solid ${ti.bg}`, overflow: "hidden", marginBottom: 16, boxShadow: "0 4px 20px rgba(0,0,0,0.12)", animation: "slideDown 0.25s ease" }}>
      <style>{`@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }`}</style>
      <div style={{ background: ti.bg, color: ti.text, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontWeight: 800, fontSize: 16 }}>● ผู้ป่วย Triage {color} ({ti.label}) — {filtered.length} ราย</span>
        <button onClick={onClose} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: ti.text, padding: "4px 12px", borderRadius: 6, cursor: "pointer", fontWeight: 700 }}>✕ ปิด</button>
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 900 }}>
          <thead><tr style={{ background: `${ti.bg}15`, fontWeight: 700, color: "#475569" }}>
            {["#", "Scene", "Scene Triage", "ชื่อ-นามสกุล", "HN", "อายุ", "ED Triage", "วินิจฉัย", "สถานะ", "Destination", ""].map((h, i) => (
              <th key={i} style={{ padding: "8px 10px", textAlign: "left", borderBottom: `2px solid ${ti.bg}40` }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {filtered.map((p, i) => (
              <tr key={p.id} style={{ borderBottom: "1px solid #F1F5F9", background: i % 2 === 0 ? "#fff" : "#FAFBFC" }}>
                <td style={{ padding: "8px 10px", color: "#64748B" }}>{i + 1}</td>
                <td style={{ padding: "8px 10px", fontWeight: 600 }}>{p.scene}</td>
                <td style={{ padding: "8px 10px" }}><TriageBadge triage={p.triage} /></td>
                <td style={{ padding: "8px 10px", fontWeight: 600 }}>{p.name}</td>
                <td style={{ padding: "8px 10px", color: "#64748B" }}>{p.hn}</td>
                <td style={{ padding: "8px 10px", color: "#64748B" }}>{p.age}</td>
                <td style={{ padding: "8px 10px" }}>{p.edTriage ? <TriageBadge triage={p.edTriage} /> : <span style={{ color: "#CBD5E1" }}>—</span>}</td>
                <td style={{ padding: "8px 10px" }}>{p.diagnosis || "-"}</td>
                <td style={{ padding: "8px 10px" }}><StatusBadge status={p.status} /></td>
                <td style={{ padding: "8px 10px", fontSize: 12, color: "#475569" }}>{p.destination || "-"}</td>
                <td style={{ padding: "8px 6px" }}><button onClick={() => onEditPatient(p)} style={{ background: "#EFF6FF", border: "none", borderRadius: 4, padding: "4px 8px", cursor: "pointer" }}>✏️</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length === 0 && <div style={{ padding: 30, textAlign: "center", color: "#94A3B8" }}>ไม่มีผู้ป่วยใน Triage {color}</div>}
      </div>
    </div>
  );
}

// ====== PATIENT FORM MODAL ======
function PatientFormModal({ open, onClose, patient, onSave, ambulances = [] }) {
  const [form, setForm] = useState(patient || createEmptyPatient());
  useEffect(() => { setForm(patient || createEmptyPatient()); }, [patient, open]);
  const u = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const isRefer = form.status === "Refer";
  const selectedVehicle = ambulances.find(a => a.id === form.transferVehicleId);
  return (
    <Modal open={open} onClose={onClose} title={patient?.scene ? `แก้ไขผู้ป่วย: ${patient.scene}` : "เพิ่มผู้ป่วยใหม่"} width={640}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
        <FormField label="Scene"><input style={inputStyle} value={form.scene} onChange={e => u("scene", e.target.value)} placeholder="เช่น แดง 1" /></FormField>
        <FormField label="Triage"><select style={selectStyle} value={form.triage} onChange={e => u("triage", e.target.value)}>{Object.keys(TRIAGE_COLORS).map(t => <option key={t} value={t}>{t}</option>)}</select></FormField>
        <FormField label="ชื่อ-นามสกุล"><input style={inputStyle} value={form.name} onChange={e => u("name", e.target.value)} /></FormField>
        <FormField label="HN"><input style={inputStyle} value={form.hn} onChange={e => u("hn", e.target.value)} /></FormField>
        <FormField label="อายุ"><input style={inputStyle} value={form.age} onChange={e => u("age", e.target.value)} /></FormField>
        <FormField label="ED Triage">
          <select style={{ ...selectStyle, borderColor: form.edTriage ? TRIAGE_COLORS[form.edTriage]?.bg || "#CBD5E1" : "#CBD5E1", borderWidth: form.edTriage ? 2 : 1 }} value={form.edTriage} onChange={e => u("edTriage", e.target.value)}>
            <option value="">-- ยังไม่ได้ Triage (ใช้ Scene) --</option>
            {Object.keys(TRIAGE_COLORS).map(t => <option key={t} value={t}>{t}</option>)}
          </select>
          {!form.edTriage && <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 2 }}>⇢ ใช้ Scene Triage: {form.triage}</div>}
        </FormField>
        <FormField label="วินิจฉัย"><input style={inputStyle} value={form.diagnosis} onChange={e => u("diagnosis", e.target.value)} placeholder="เช่น Tension pneumothorax" /></FormField>
        <FormField label="สถานะ">
          <select style={{ ...selectStyle, borderColor: isRefer ? "#EA580C" : "#CBD5E1", borderWidth: isRefer ? 2 : 1, background: isRefer ? "#FFF7ED" : "#fff" }} value={form.status} onChange={e => {
            u("status", e.target.value);
            if (e.target.value !== "Refer") { u("transferVehicleId", ""); u("referHospital", ""); }
          }}>
            <option value="">-- เลือก --</option>{STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </FormField>
        <FormField label="Destination / Ward"><input style={inputStyle} value={form.destination} onChange={e => u("destination", e.target.value)} placeholder="เช่น Neuro Surgery ชั้น3" /></FormField>
        <FormField label="O2"><select style={selectStyle} value={form.o2} onChange={e => u("o2", e.target.value)}><option value="">-</option><option value="ETT">ETT</option><option value="Mask">Mask with bag</option><option value="Cannula">Nasal Cannula</option><option value="Collar">Collar</option></select></FormField>
        <FormField label="Arrival"><input style={inputStyle} value={form.arrival} onChange={e => u("arrival", e.target.value)} /></FormField>
        <FormField label="หมู่เลือด"><select style={selectStyle} value={form.blood} onChange={e => u("blood", e.target.value)}><option value="-">-</option><option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option></select></FormField>
      </div>

      {/* ====== REFER SECTION ====== */}
      {isRefer && (
        <div style={{ background: "linear-gradient(135deg, #FFF7ED, #FFEDD5)", border: "2px solid #FB923C", borderRadius: 10, padding: 16, marginTop: 4, marginBottom: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
            <span style={{ fontSize: 18 }}>🚑</span>
            <span style={{ fontWeight: 800, fontSize: 15, color: "#9A3412" }}>ข้อมูลส่งต่อ (Refer)</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
            <FormField label="เลือกรถส่งต่อ">
              <select style={{ ...selectStyle, borderColor: "#FB923C", background: "#fff" }} value={form.transferVehicleId} onChange={e => {
                u("transferVehicleId", e.target.value);
                const v = ambulances.find(a => a.id === e.target.value);
                if (v && v.hospital) u("referHospital", v.hospital);
              }}>
                <option value="">-- ยังไม่เลือกรถ --</option>
                {ambulances.map(a => (
                  <option key={a.id} value={a.id}>
                    {a.vehicleName || "ไม่ระบุ"} ({a.vehicleType}) {a.hospital ? `→ ${a.hospital}` : ""} [{a.tripStatus}]
                  </option>
                ))}
              </select>
              {ambulances.length === 0 && <div style={{ fontSize: 11, color: "#DC2626", marginTop: 3 }}>⚠ ยังไม่มีรถในระบบ — ไปเพิ่มที่แถบ "รถส่งต่อ" ก่อน</div>}
            </FormField>
            <FormField label="ส่งไป รพ.">
              <input style={{ ...inputStyle, borderColor: "#FB923C" }} value={form.referHospital} onChange={e => u("referHospital", e.target.value)} placeholder="เช่น รพ.ศรีนครินทร์" />
            </FormField>
          </div>
          {selectedVehicle && (
            <div style={{ background: "#fff", borderRadius: 8, padding: 10, marginTop: 6, fontSize: 12, color: "#475569", display: "flex", gap: 12, flexWrap: "wrap", border: "1px solid #FED7AA" }}>
              <span>🚗 <strong>{selectedVehicle.vehicleName}</strong></span>
              <span>📋 {selectedVehicle.vehicleType}</span>
              {selectedVehicle.source && <span>🏢 {selectedVehicle.source}</span>}
              {selectedVehicle.plateNumber && <span>🔢 {selectedVehicle.plateNumber}</span>}
              {selectedVehicle.hospital && <span>🏥 → {selectedVehicle.hospital}</span>}
              <span style={{ background: "#FFF7ED", padding: "1px 8px", borderRadius: 4, fontWeight: 700, color: "#EA580C" }}>{selectedVehicle.tripStatus}</span>
            </div>
          )}
        </div>
      )}

      <FormField label="หมายเหตุ"><input style={inputStyle} value={form.note} onChange={e => u("note", e.target.value)} /></FormField>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
        <button onClick={onClose} style={btnSecondary}>ยกเลิก</button>
        <button onClick={() => { onSave(form); onClose(); }} style={btnSuccess}>💾 บันทึก</button>
      </div>
    </Modal>
  );
}

// ====== TRANSFER VEHICLE (TRIP) FORM MODAL ======
function TransferVehicleFormModal({ open, onClose, vehicle, onSave, fleetSources }) {
  const [form, setForm] = useState(vehicle || {});
  useEffect(() => {
    setForm(vehicle || {
      id: Date.now().toString(), vehicleName: "", vehicleType: "ALS", plateNumber: "", team: "", source: "",
      arrivalTime: new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" }),
      departureTime: "", hospital: "", patientCount: 0, tripStatus: "รอรับผู้ป่วย", note: ""
    });
  }, [vehicle, open]);
  const u = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const sourceNames = [...new Set((fleetSources || []).map(s => s.name).filter(Boolean))];
  return (
    <Modal open={open} onClose={onClose} title={vehicle?.vehicleName ? `แก้ไข: ${vehicle.vehicleName}` : "บันทึกเที่ยวรถส่งต่อ"} width={620}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
        <FormField label="ชื่อรถ / เลขรถ"><input style={inputStyle} value={form.vehicleName} onChange={e => u("vehicleName", e.target.value)} placeholder="เช่น Amb-01" /></FormField>
        <FormField label="ประเภทรถ"><select style={selectStyle} value={form.vehicleType} onChange={e => u("vehicleType", e.target.value)}>
          <option value="ALS">ALS Ambulance</option><option value="BLS">BLS Ambulance</option><option value="FR">รถกู้ชีพ (FR)</option><option value="รถส่งต่อ รพ.">รถส่งต่อ รพ.</option><option value="มูลนิธิ">มูลนิธิ</option><option value="อื่นๆ">อื่นๆ</option>
        </select></FormField>
        <FormField label="หน่วยงาน/ต้นสังกัด">
          <input style={inputStyle} value={form.source} onChange={e => u("source", e.target.value)} list="src-list" placeholder="เช่น รพ.พะเยา" />
          {sourceNames.length > 0 && <datalist id="src-list">{sourceNames.map(s => <option key={s} value={s} />)}</datalist>}
        </FormField>
        <FormField label="ทะเบียนรถ"><input style={inputStyle} value={form.plateNumber} onChange={e => u("plateNumber", e.target.value)} /></FormField>
        <FormField label="ทีมปฏิบัติการ"><input style={inputStyle} value={form.team} onChange={e => u("team", e.target.value)} /></FormField>
        <FormField label="สถานะเที่ยว"><select style={selectStyle} value={form.tripStatus} onChange={e => u("tripStatus", e.target.value)}>{VEHICLE_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}</select></FormField>
        <FormField label="เวลามาถึงจุดรับ"><input style={inputStyle} value={form.arrivalTime} onChange={e => u("arrivalTime", e.target.value)} /></FormField>
        <FormField label="เวลาออกส่งต่อ"><input style={inputStyle} value={form.departureTime} onChange={e => u("departureTime", e.target.value)} placeholder="HH:MM" /></FormField>
        <FormField label="ส่งไป รพ."><input style={inputStyle} value={form.hospital} onChange={e => u("hospital", e.target.value)} placeholder="เช่น รพ.ศรีนครินทร์" /></FormField>

// ====== TRANSFER VEHICLE TAB ======
function TransferVehicleTab({ mci, onUpdate, onAddTrip, onEditTrip, onDeleteTrip }) {
  const [fleetModal, setFleetModal] = useState({ open: false, source: null });
  const [expandedVehicle, setExpandedVehicle] = useState(null);
  const fleetSources = mci.fleetSources || [];
  const ambulances = mci.ambulances || [];
  const patients = mci.patients || [];

  // Get patients assigned to a vehicle
  const getVehiclePatients = (vehicleId) => patients.filter(p => p.transferVehicleId === vehicleId);

  // Count all referred patients with vehicles
  const totalReferredWithVehicle = patients.filter(p => p.status === "Refer" && p.transferVehicleId).length;

  const sourceSummary = fleetSources.map(src => {
    const match = a => (a.source || "").trim().toLowerCase() === src.name.trim().toLowerCase();
    const dispatched = ambulances.filter(a => match(a) && (a.tripStatus === "กำลังส่งต่อ" || a.tripStatus === "ส่งเสร็จแล้ว"));
    const returned = ambulances.filter(a => match(a) && a.tripStatus === "กลับมาแล้ว");
    const outNow = Math.max(0, dispatched.length - returned.length);
    const remaining = Math.max(0, (src.initialCount || 0) - outNow);
    return { ...src, dispatchedCount: dispatched.length, returnedCount: returned.length, outNow, remaining };
  });

  const totalInitial = fleetSources.reduce((s, f) => s + (f.initialCount || 0), 0);
  const totalOut = sourceSummary.reduce((s, f) => s + f.outNow, 0);
  const totalRemaining = sourceSummary.reduce((s, f) => s + f.remaining, 0);
  const totalTrips = ambulances.length;
  const totalPatientsSent = ambulances.reduce((s, a) => s + (a.patientCount || 0), 0);

  const saveFleetSource = (src) => {
    const idx = fleetSources.findIndex(x => x.id === src.id);
    const updated = idx >= 0 ? fleetSources.map((f, i) => i === idx ? src : f) : [...fleetSources, src];
    onUpdate({ ...mci, fleetSources: updated });
  };
  const deleteFleetSource = (id) => { if (confirm("ลบแหล่งรถนี้?")) onUpdate({ ...mci, fleetSources: fleetSources.filter(f => f.id !== id) }); };

  const tripColor = s => ({ "รอรับผู้ป่วย": "#F59E0B", "กำลังส่งต่อ": "#EA580C", "ส่งเสร็จแล้ว": "#2563EB", "กลับมาแล้ว": "#16A34A" }[s] || "#94A3B8");

  return (
    <div>
      {/* SUMMARY CARDS */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 16 }}>
        {[
          { val: totalInitial, label: "🚑 รถทั้งหมด", grad: "linear-gradient(135deg, #1E40AF, #3B82F6)" },
          { val: totalOut, label: "🔄 ออกปฏิบัติ", grad: "linear-gradient(135deg, #EA580C, #F97316)" },
          { val: totalRemaining, label: "✅ คงเหลือพร้อมใช้", grad: "linear-gradient(135deg, #16A34A, #22C55E)" },
          { val: totalTrips, label: "📝 บันทึกเที่ยว", grad: "linear-gradient(135deg, #7C3AED, #A78BFA)" },
          { val: totalPatientsSent, label: "👤 ส่งผู้ป่วยแล้ว", grad: "linear-gradient(135deg, #0D9488, #2DD4BF)" },
          { val: totalReferredWithVehicle, label: "🔗 ผู้ป่วยจับคู่รถ", grad: "linear-gradient(135deg, #BE185D, #EC4899)" },
        ].map((c, i) => (
          <div key={i} style={{ background: c.grad, borderRadius: 12, padding: "16px 20px", color: "#fff", textAlign: "center" }}>
            <div style={{ fontSize: 34, fontWeight: 900 }}>{c.val}</div>
            <div style={{ fontSize: 12, opacity: 0.9 }}>{c.label}</div>
          </div>
        ))}
      </div>

      {/* FLEET SOURCES TABLE */}
      <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #E2E8F0", overflow: "hidden", marginBottom: 16 }}>
        <div style={{ background: "#1E40AF", color: "#fff", padding: "12px 16px", fontWeight: 700, fontSize: 15, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span>🏢 แหล่งรถส่งต่อ — จำนวนเริ่มต้น &amp; คงเหลือ</span>
          <button onClick={() => setFleetModal({ open: true, source: null })} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", padding: "5px 14px", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 700 }}>+ บันทึกจำนวนรถเริ่มต้น</button>
        </div>
        {fleetSources.length === 0 ? (
          <div style={{ padding: 30, textAlign: "center", color: "#94A3B8" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🚑</div>
            <div style={{ fontSize: 14 }}>ยังไม่ได้ตั้งค่าจำนวนรถเริ่มต้น</div>
            <div style={{ fontSize: 12, marginTop: 4, marginBottom: 12 }}>กดปุ่ม "+ บันทึกจำนวนรถเริ่มต้น" เพื่อบันทึกจำนวนรถจากแต่ละหน่วยงาน</div>
          </div>
        ) : (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead><tr style={{ background: "#EFF6FF", fontWeight: 700, color: "#1E40AF" }}>
                {["หน่วยงาน", "ประเภท", "เริ่มต้น", "ออกปฏิบัติ", "กลับแล้ว", "คงเหลือ", "สถานะ", ""].map((h, i) => (
                  <th key={i} style={{ padding: "10px 12px", textAlign: i >= 2 && i <= 5 ? "center" : "left", borderBottom: "2px solid #BFDBFE" }}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {sourceSummary.map((src, i) => {
                  const pct = src.initialCount > 0 ? Math.round((src.remaining / src.initialCount) * 100) : 0;
                  const barColor = pct > 50 ? "#16A34A" : pct > 20 ? "#F59E0B" : "#DC2626";
                  return (
                    <tr key={src.id} style={{ borderBottom: "1px solid #F1F5F9", background: i % 2 === 0 ? "#fff" : "#FAFBFC" }}>

                      <td style={{ padding: "10px 12px" }}><span style={{ background: "#DBEAFE", color: "#1D4ED8", padding: "2px 10px", borderRadius: 10, fontSize: 11, fontWeight: 600 }}>{src.vehicleType}</span></td>
                      <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 900, fontSize: 18, color: "#1E40AF" }}>{src.initialCount}</td>
                      <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, fontSize: 16, color: "#EA580C" }}>{src.outNow}</td>
                      <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, fontSize: 16, color: "#16A34A" }}>{src.returnedCount}</td>
                      <td style={{ padding: "10px 12px", textAlign: "center" }}><div style={{ fontWeight: 900, fontSize: 22, color: barColor }}>{src.remaining}</div></td>

                          <div style={{ height: "100%", width: `${pct}%`, background: barColor, borderRadius: 6, transition: "width 0.3s" }} />
                        </div>
                        <div style={{ fontSize: 10, color: "#64748B", marginTop: 2 }}>{pct}%</div>
                      </td>
                      <td style={{ padding: "10px 8px", whiteSpace: "nowrap" }}>
                        <button onClick={() => setFleetModal({ open: true, source: src })} style={{ background: "#EFF6FF", border: "none", borderRadius: 4, padding: "4px 8px", cursor: "pointer", marginRight: 4 }}>✏️</button>
                        <button onClick={() => deleteFleetSource(src.id)} style={{ background: "#FEF2F2", border: "none", borderRadius: 4, padding: "4px 8px", cursor: "pointer" }}>🗑</button>
                      </td>
                    </tr>
                  );
                })}
                <tr style={{ background: "#EFF6FF", fontWeight: 900, borderTop: "2px solid #1E40AF" }}>
                  <td style={{ padding: "10px 12px" }}>รวมทั้งหมด</td><td></td>
                  <td style={{ padding: "10px 12px", textAlign: "center", fontSize: 18, color: "#1E40AF" }}>{totalInitial}</td>
                  <td style={{ padding: "10px 12px", textAlign: "center", fontSize: 16, color: "#EA580C" }}>{totalOut}</td>
                  <td style={{ padding: "10px 12px", textAlign: "center", fontSize: 16, color: "#16A34A" }}>{sourceSummary.reduce((s, f) => s + f.returnedCount, 0)}</td>
                  <td style={{ padding: "10px 12px", textAlign: "center", fontSize: 22, color: totalRemaining > 0 ? "#16A34A" : "#DC2626" }}>{totalRemaining}</td>
                  <td colSpan={2}></td>
                </tr>
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* TRIP LOG */}
      <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #E2E8F0", overflow: "hidden" }}>
        <div style={{ background: "#475569", color: "#fff", padding: "12px 16px", fontWeight: 700, fontSize: 15, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span>📝 บันทึกเที่ยวส่งต่อ ({ambulances.length} รายการ | ส่งผู้ป่วย {totalPatientsSent} ราย)</span>
          <button onClick={onAddTrip} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", padding: "5px 14px", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 700 }}>+ บันทึกเที่ยว</button>
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 1050 }}>
            <thead><tr style={{ background: "#F8FAFC", fontWeight: 700, color: "#475569" }}>
              {["#", "ชื่อรถ", "ประเภท", "หน่วยงาน", "ส่ง รพ.", "ผู้ป่วย (จับคู่)", "สถานะ", "เวลา", ""].map((h, i) => (
                <th key={i} style={{ padding: "8px 10px", textAlign: "left", borderBottom: "2px solid #E2E8F0", whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {ambulances.map((a, i) => {
                const vPatients = getVehiclePatients(a.id);
                const isExpanded = expandedVehicle === a.id;
                return (
                  <React.Fragment key={a.id}>
                    <tr style={{ borderBottom: vPatients.length > 0 && isExpanded ? "none" : "1px solid #F1F5F9", background: i % 2 === 0 ? "#fff" : "#FAFBFC", cursor: vPatients.length > 0 ? "pointer" : "default" }}
                        onClick={() => vPatients.length > 0 && setExpandedVehicle(isExpanded ? null : a.id)}>
                      <td style={{ padding: "8px 10px", color: "#64748B" }}>{i + 1}</td>
                      <td style={{ padding: "8px 10px", fontWeight: 600 }}>
                        {a.vehicleName || "-"}
                        {a.plateNumber && <div style={{ fontSize: 10, color: "#94A3B8" }}>{a.plateNumber}</div>}
                      </td>
                      <td style={{ padding: "8px 10px" }}><span style={{ background: "#DBEAFE", color: "#1D4ED8", padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600 }}>{a.vehicleType}</span></td>
                      <td style={{ padding: "8px 10px", fontWeight: 600, color: "#1E40AF" }}>{a.source || "-"}</td>
                      <td style={{ padding: "8px 10px", fontWeight: 600 }}>{a.hospital || "-"}</td>
                      <td style={{ padding: "8px 10px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontWeight: 900, fontSize: 16, color: vPatients.length > 0 ? "#EA580C" : "#94A3B8" }}>{vPatients.length}</span>
                          <span style={{ fontSize: 11, color: "#64748B" }}>ราย</span>
                          {vPatients.length > 0 && (
                            <span style={{ fontSize: 10, color: "#2563EB", fontWeight: 700, marginLeft: 4 }}>
                              {isExpanded ? "▲ ซ่อน" : "▼ ดูรายชื่อ"}
                            </span>
                          )}
                        </div>
                        {/* Mini triage dots */}
                        {vPatients.length > 0 && !isExpanded && (
                          <div style={{ display: "flex", gap: 3, marginTop: 3 }}>
                            {vPatients.slice(0, 8).map(p => (
                              <span key={p.id} title={`${p.name} (${getEffectiveTriage(p)})`} style={{ width: 8, height: 8, borderRadius: "50%", background: TRIAGE_COLORS[getEffectiveTriage(p)]?.bg || "#94A3B8" }} />
                            ))}
                            {vPatients.length > 8 && <span style={{ fontSize: 9, color: "#94A3B8" }}>+{vPatients.length - 8}</span>}
                          </div>
                        )}
                      </td>
                      <td style={{ padding: "8px 10px" }}><span style={{ background: tripColor(a.tripStatus), color: "#fff", padding: "2px 10px", borderRadius: 10, fontSize: 11, fontWeight: 700 }}>{a.tripStatus || "-"}</span></td>
                      <td style={{ padding: "8px 10px", fontSize: 11, color: "#64748B" }}>
                        {a.arrivalTime && <div>มา: {a.arrivalTime}</div>}
                        {a.departureTime && <div>ออก: {a.departureTime}</div>}
                      </td>
                      <td style={{ padding: "8px 6px", whiteSpace: "nowrap" }} onClick={e => e.stopPropagation()}>
                        <button onClick={() => onEditTrip(a)} style={{ background: "#EFF6FF", border: "none", borderRadius: 4, padding: "4px 8px", cursor: "pointer", marginRight: 4 }}>✏️</button>
                        <button onClick={() => onDeleteTrip(a.id)} style={{ background: "#FEF2F2", border: "none", borderRadius: 4, padding: "4px 8px", cursor: "pointer" }}>🗑</button>
                      </td>
                    </tr>
                    {/* Expanded patient list */}
                    {isExpanded && vPatients.length > 0 && (
                      <tr>
                        <td colSpan={9} style={{ padding: 0 }}>
                          <div style={{ background: "#FFF7ED", borderLeft: "4px solid #FB923C", margin: "0 12px 8px 24px", borderRadius: "0 8px 8px 0", overflow: "hidden" }}>
                            <div style={{ padding: "8px 12px", background: "#FFEDD5", fontWeight: 700, fontSize: 12, color: "#9A3412", display: "flex", justifyContent: "space-between" }}>
                              <span>👤 รายชื่อผู้ป่วยบนรถ {a.vehicleName} ({vPatients.length} ราย)</span>
                              {a.hospital && <span>🏥 → {a.hospital}</span>}
                            </div>
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                              <thead><tr style={{ color: "#9A3412", fontWeight: 600 }}>
                                <th style={{ padding: "6px 10px", textAlign: "left" }}>#</th>
                                <th style={{ padding: "6px 10px", textAlign: "left" }}>Scene</th>
                                <th style={{ padding: "6px 10px", textAlign: "left" }}>Triage</th>
                                <th style={{ padding: "6px 10px", textAlign: "left" }}>ชื่อ-นามสกุล</th>
                                <th style={{ padding: "6px 10px", textAlign: "left" }}>HN</th>
                                <th style={{ padding: "6px 10px", textAlign: "left" }}>วินิจฉัย</th>
                                <th style={{ padding: "6px 10px", textAlign: "left" }}>ส่ง รพ.</th>
                              </tr></thead>
                              <tbody>
                                {vPatients.map((p, pi) => (
                                  <tr key={p.id} style={{ borderTop: "1px solid #FED7AA" }}>
                                    <td style={{ padding: "6px 10px", color: "#9A3412" }}>{pi + 1}</td>
                                    <td style={{ padding: "6px 10px", fontWeight: 600 }}>{p.scene}</td>
                                    <td style={{ padding: "6px 10px" }}><TriageBadge triage={getEffectiveTriage(p)} /></td>
                                    <td style={{ padding: "6px 10px", fontWeight: 700 }}>{p.name}</td>
                                    <td style={{ padding: "6px 10px", color: "#64748B" }}>{p.hn}</td>
                                    <td style={{ padding: "6px 10px" }}>{p.diagnosis || "-"}</td>
                                    <td style={{ padding: "6px 10px", fontWeight: 600, color: "#EA580C" }}>{p.referHospital || a.hospital || "-"}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
          {ambulances.length === 0 && <div style={{ padding: 40, textAlign: "center", color: "#94A3B8" }}>ยังไม่มีบันทึกเที่ยวส่งต่อ — กดปุ่ม "+ บันทึกเที่ยว"</div>}
        </div>
      </div>

      <FleetSourceFormModal open={fleetModal.open} onClose={() => setFleetModal({ open: false, source: null })} source={fleetModal.source} onSave={saveFleetSource} />
    </div>
  );
}

// ====== MAIN DASHBOARD ======
function MCIDashboard({ mci, onUpdate, onBack, onPublicBoard }) {
  const [patientModal, setPatientModal] = useState({ open: false, patient: null });
  const [tripModal, setTripModal] = useState({ open: false, vehicle: null });
  const [hospModal, setHospModal] = useState({ open: false, hospital: null });
  const [tab, setTab] = useState("patients");
  const [activeTriageColor, setActiveTriageColor] = useState(null);

  const savePatient = p => { const i = mci.patients.findIndex(x => x.id === p.id); const u = i >= 0 ? mci.patients.map((x, j) => j === i ? p : x) : [...mci.patients, p]; onUpdate({ ...mci, patients: u }); };
  const deletePatient = id => { if (confirm("ลบผู้ป่วยนี้?")) onUpdate({ ...mci, patients: mci.patients.filter(p => p.id !== id) }); };
  const saveTrip = a => { const ambs = mci.ambulances || []; const i = ambs.findIndex(x => x.id === a.id); const u = i >= 0 ? ambs.map((x, j) => j === i ? a : x) : [...ambs, a]; onUpdate({ ...mci, ambulances: u }); };
  const deleteTrip = id => { if (confirm("ลบรายการนี้?")) onUpdate({ ...mci, ambulances: (mci.ambulances || []).filter(a => a.id !== id) }); };
  const saveHospital = h => { const i = mci.hospitals.findIndex(x => x.id === h.id); const u = i >= 0 ? mci.hospitals.map((x, j) => j === i ? h : x) : [...mci.hospitals, h]; onUpdate({ ...mci, hospitals: u }); };
  const deleteHospital = id => { if (confirm("ลบ รพ. นี้?")) onUpdate({ ...mci, hospitals: mci.hospitals.filter(h => h.id !== id) }); };

  return (
    <div style={{ minHeight: "100vh", background: "#F1F5F9", fontFamily: font }}>
      <div style={{ background: "linear-gradient(135deg, #1E293B, #0F172A)", color: "#fff", padding: "14px 20px" }}>
        <div style={{ maxWidth: 1400, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 28 }}>🔥</span>
            <div>
              <h1 style={{ margin: 0, fontSize: 20, fontWeight: 900, display: "flex", alignItems: "center", gap: 8 }}>{mci.name} <span style={{ background: mci.status === "open" ? "#16A34A" : "#64748B", padding: "2px 10px", borderRadius: 10, fontSize: 11, fontWeight: 700 }}>● {mci.status === "open" ? "LIVE" : "ปิด"}</span></h1>
              <div style={{ fontSize: 12, color: "#94A3B8" }}>📅 {mci.date} | 📍 {mci.location}</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            <button onClick={onBack} style={{ ...btnSecondary, fontSize: 12, padding: "6px 14px" }}>≡ รายการ MCI</button>
            <button onClick={onPublicBoard} style={{ ...btnSecondary, fontSize: 12, padding: "6px 14px", background: "#2563EB" }}>📺 บอร์ดญาติ</button>
            <button onClick={() => setPatientModal({ open: true, patient: null })} style={{ ...btnSuccess, fontSize: 12, padding: "6px 14px" }}>+ เพิ่มผู้ป่วย</button>
            <button onClick={() => onUpdate({ ...mci, status: mci.status === "open" ? "closed" : "open" })} style={{ ...btnWarning, fontSize: 12, padding: "6px 14px", background: mci.status === "open" ? "#DC2626" : "#16A34A" }}>{mci.status === "open" ? "✕ ปิดแผน" : "↻ เปิดแผน"}</button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1400, margin: "0 auto", padding: 16 }}>
        <TriageSummaryCards patients={mci.patients} onClickColor={c => setActiveTriageColor(c)} activeColor={activeTriageColor} />
        {activeTriageColor && <FilteredPatientPanel patients={mci.patients} color={activeTriageColor} onClose={() => setActiveTriageColor(null)} onEditPatient={p => setPatientModal({ open: true, patient: p })} />}

        {/* TABS */}
        <div style={{ display: "flex", gap: 4, marginBottom: 16, background: "#fff", borderRadius: 10, padding: 4, border: "1px solid #E2E8F0" }}>
          {[["patients", "📋 รายชื่อผู้ป่วย"], ["transfers", "🚑 รถส่งต่อ"], ["hospitals", "🏥 รพ.ส่งต่อ"]].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)} style={{ flex: 1, padding: "10px 16px", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 700, fontFamily: font, background: tab === key ? "#1E293B" : "transparent", color: tab === key ? "#fff" : "#64748B" }}>{label}</button>
          ))}
        </div>

        {tab === "patients" && (
          <>
            <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #E2E8F0", overflow: "auto", marginBottom: 16 }}>
              <div style={{ background: "#1E293B", color: "#fff", padding: "10px 14px", fontWeight: 700, fontSize: 14, display: "flex", justifyContent: "space-between" }}>
                <span>≡ รายชื่อผู้ป่วย ({mci.patients.length} ราย)</span>
                <button onClick={() => setPatientModal({ open: true, patient: null })} style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", padding: "3px 12px", borderRadius: 4, cursor: "pointer", fontSize: 12, fontWeight: 700 }}>+ เพิ่ม</button>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 1100 }}>
                  <thead><tr style={{ background: "#F8FAFC", color: "#475569", fontWeight: 700 }}>
                    {["#", "Scene", "Triage", "ชื่อ-นามสกุล", "HN", "อายุ", "ED Triage", "วินิจฉัย", "สถานะ", "Destination", "O2", "Arrival", ""].map((h, i) => (
                      <th key={i} style={{ padding: "8px 10px", textAlign: "left", whiteSpace: "nowrap", borderBottom: "2px solid #E2E8F0" }}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {mci.patients.map((p, i) => {
                      const eff = getEffectiveTriage(p);
                      const uEd = p.edTriage && p.edTriage.trim() && Object.keys(TRIAGE_COLORS).includes(p.edTriage);
                      return (
                        <tr key={p.id} style={{ borderBottom: "1px solid #F1F5F9", opacity: activeTriageColor && eff !== activeTriageColor ? 0.4 : 1, transition: "opacity 0.2s" }}>
                          <td style={{ padding: "8px 10px", color: "#64748B" }}>{i + 1}</td>
                          <td style={{ padding: "8px 10px", fontWeight: 600 }}>{p.scene}</td>
                          <td style={{ padding: "8px 10px" }}><TriageBadge triage={p.triage} />{!uEd && <div style={{ fontSize: 9, color: "#94A3B8", marginTop: 1 }}>⬤ ใช้อยู่</div>}</td>
                          <td style={{ padding: "8px 10px", fontWeight: 600 }}>{p.name}</td>
                          <td style={{ padding: "8px 10px", color: "#64748B" }}>{p.hn}</td>
                          <td style={{ padding: "8px 10px", color: "#64748B" }}>{p.age}</td>
                          <td style={{ padding: "8px 10px" }}>{uEd ? <><TriageBadge triage={p.edTriage} /><div style={{ fontSize: 9, color: "#7C3AED", marginTop: 1, fontWeight: 700 }}>⬤ ใช้อยู่</div></> : <span style={{ color: "#CBD5E1" }}>—</span>}</td>
                          <td style={{ padding: "8px 10px" }}>{p.diagnosis}</td>
                          <td style={{ padding: "8px 10px" }}>
                            <StatusBadge status={p.status} />
                            {p.status === "Refer" && p.transferVehicleId && (() => {
                              const v = (mci.ambulances || []).find(a => a.id === p.transferVehicleId);
                              return v ? <div style={{ fontSize: 10, color: "#EA580C", fontWeight: 700, marginTop: 2 }}>🚑 {v.vehicleName}</div> : null;
                            })()}
                          </td>
                          <td style={{ padding: "8px 10px", fontSize: 12, color: "#475569" }}>
                            {p.destination}
                            {p.referHospital && <div style={{ fontSize: 10, color: "#EA580C", fontWeight: 600 }}>→ {p.referHospital}</div>}
                          </td>
                          <td style={{ padding: "8px 10px" }}>{p.o2 && <span style={{ background: "#DBEAFE", color: "#1D4ED8", padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 700 }}>{p.o2}</span>}</td>
                          <td style={{ padding: "8px 10px", color: "#64748B", fontSize: 12 }}>{p.arrival}</td>
                          <td style={{ padding: "8px 6px", whiteSpace: "nowrap" }}>
                            <button onClick={() => setPatientModal({ open: true, patient: p })} style={{ background: "#EFF6FF", border: "none", borderRadius: 4, padding: "4px 8px", cursor: "pointer", marginRight: 4 }}>✏️</button>
                            <button onClick={() => deletePatient(p.id)} style={{ background: "#FEF2F2", border: "none", borderRadius: 4, padding: "4px 8px", cursor: "pointer" }}>🗑</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {mci.patients.length === 0 && <div style={{ padding: 40, textAlign: "center", color: "#94A3B8" }}>ยังไม่มีข้อมูลผู้ป่วย</div>}
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 14 }}>
              <StatusSummaryPanel patients={mci.patients} />
              <EDTriageSummary patients={mci.patients} />
              <BloodPanel blood={mci.blood} onChange={b => onUpdate({ ...mci, blood: b })} />
              <VentPanel vents={mci.ventilators} onChange={v => onUpdate({ ...mci, ventilators: v })} />
            </div>
          </>
        )}

        {tab === "transfers" && <TransferVehicleTab mci={mci} onUpdate={onUpdate} onAddTrip={() => setTripModal({ open: true, vehicle: null })} onEditTrip={a => setTripModal({ open: true, vehicle: a })} onDeleteTrip={deleteTrip} />}

        {tab === "hospitals" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 14 }}>
            <HospitalSummaryPanel hospitals={mci.hospitals} onAdd={() => setHospModal({ open: true, hospital: null })} onEdit={h => setHospModal({ open: true, hospital: h })} onDelete={deleteHospital} />
            <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #E2E8F0", overflow: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ background: "#F0FDFA", fontWeight: 700, color: "#0D9488" }}>
                  {["#", "ชื่อ รพ.", "เบอร์ติดต่อ", "ความจุ", "แดง", "เหลือง", "เขียว", "ดำ", "รวมรับ", "หมายเหตุ"].map((h, i) => (
                    <th key={i} style={{ padding: "8px 10px", textAlign: "left", borderBottom: "2px solid #99F6E4" }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {mci.hospitals.map((h, i) => (
                    <tr key={h.id} style={{ borderBottom: "1px solid #F1F5F9" }}>
                      <td style={{ padding: "8px 10px" }}>{i + 1}</td>
                      <td style={{ padding: "8px 10px", fontWeight: 700 }}>{h.name}</td>
                      <td style={{ padding: "8px 10px" }}>{h.contact || "-"}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center" }}>{h.capacity || "-"}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", color: "#DC2626", fontWeight: 700 }}>{h.redCount || 0}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", color: "#EAB308", fontWeight: 700 }}>{h.yellowCount || 0}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", color: "#16A34A", fontWeight: 700 }}>{h.greenCount || 0}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", color: "#64748B", fontWeight: 700 }}>{h.blackCount || 0}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", fontWeight: 900, fontSize: 15 }}>{h.received || 0}</td>
                      <td style={{ padding: "8px 10px", color: "#64748B" }}>{h.note || "-"}</td>
                    </tr>
                  ))}
                  {mci.hospitals.length > 0 && (
                    <tr style={{ background: "#F0FDFA", fontWeight: 900, borderTop: "2px solid #0D9488" }}>
                      <td colSpan={4} style={{ padding: "8px 10px", textAlign: "right" }}>รวมทั้งหมด</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", color: "#DC2626" }}>{mci.hospitals.reduce((s, h) => s + (h.redCount || 0), 0)}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", color: "#EAB308" }}>{mci.hospitals.reduce((s, h) => s + (h.yellowCount || 0), 0)}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", color: "#16A34A" }}>{mci.hospitals.reduce((s, h) => s + (h.greenCount || 0), 0)}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", color: "#64748B" }}>{mci.hospitals.reduce((s, h) => s + (h.blackCount || 0), 0)}</td>
                      <td style={{ padding: "8px 10px", textAlign: "center", fontSize: 16 }}>{mci.hospitals.reduce((s, h) => s + (h.received || 0), 0)}</td>
                      <td></td>
                    </tr>
                  )}
                </tbody>
              </table>
              {mci.hospitals.length === 0 && <div style={{ padding: 40, textAlign: "center", color: "#94A3B8" }}>ยังไม่มีข้อมูล</div>}
            </div>
          </div>
        )}
      </div>

      <PatientFormModal open={patientModal.open} onClose={() => setPatientModal({ open: false, patient: null })} patient={patientModal.patient} onSave={savePatient} ambulances={mci.ambulances || []} />
      <TransferVehicleFormModal open={tripModal.open} onClose={() => setTripModal({ open: false, vehicle: null })} vehicle={tripModal.vehicle} onSave={saveTrip} fleetSources={mci.fleetSources || []} />
      <HospitalFormModal open={hospModal.open} onClose={() => setHospModal({ open: false, hospital: null })} hospital={hospModal.hospital} onSave={saveHospital} />
    </div>
  );
}

// ====== MAIN APP ======
function App() {
  const [mcis, setMcis] = useState([]);
  const [selectedMCI, setSelectedMCI] = useState(null);
  const [view, setView] = useState("list");
  const [createOpen, setCreateOpen] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => { (async () => { const d = await store.get("mci-data"); if (d) setMcis(d); setLoading(false); })(); }, []);
  const saveMcis = useCallback(async (n) => { setMcis(n); await store.set("mci-data", n); }, []);
  const handleCreateMCI = m => { saveMcis([m, ...mcis]); setSelectedMCI(m); setView("dashboard"); };
  const handleSelectMCI = m => { setSelectedMCI(m); setView("dashboard"); };
  const handleUpdateMCI = u => { saveMcis(mcis.map(m => m.id === u.id ? u : m)); setSelectedMCI(u); };

  if (loading) return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F1F5F9", fontFamily: font }}>
      <div style={{ textAlign: "center" }}><div style={{ fontSize: 48, marginBottom: 12, animation: "pulse 1.5s infinite" }}>🏥</div><div style={{ color: "#64748B" }}>กำลังโหลดระบบ MCI...</div><style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}`}</style></div>
    </div>
  );

  if (view === "publicBoard" && selectedMCI) return <PublicBoard mci={selectedMCI} onBack={() => setView("dashboard")} />;
  if (view === "dashboard" && selectedMCI) return <MCIDashboard mci={selectedMCI} onUpdate={handleUpdateMCI} onBack={() => { setView("list"); setSelectedMCI(null); }} onPublicBoard={() => setView("publicBoard")} />;

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
      <MCIListPage mcis={mcis} onSelect={handleSelectMCI} onCreateNew={() => setCreateOpen(true)} />
      <CreateMCIModal open={createOpen} onClose={() => setCreateOpen(false)} onSave={handleCreateMCI} />
    </>
  );
}

// ====== RENDER ======
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
    </script>
</body>
</html>
